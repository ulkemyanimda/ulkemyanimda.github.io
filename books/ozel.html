<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="https://ulkemyanimda.github.io/icons/favicon.ico" rel="icon" type="image/x-icon"/>
    <title>Özel Eğitim Kaynakları</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Premium Stylesheet -->
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

    <!-- Hero Banner Header -->
    <header>
        <div class="banner">
            <div class="banner-overlay">
                <h1>Özel Eğitim Kaynakları</h1>
                <p>Özel eğitim ihtiyacı olan öğrencilerimiz için özenle uyarlanmış akademik destek çalışma sayfaları, yaşam becerileri kitapları ve materyaller.</p>
            </div>
        </div>
    </header>

    <!-- App Container -->
    <main class="app-container">
        
        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" id="search-input" class="search-input" placeholder="Kaynak adı, kategori veya kapak içeriği ara..."/>
                <button id="search-clear" class="search-clear-btn" title="Aramayı Temizle">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Category Filters -->
        <div class="filters-section">
            <div id="filters-container" class="filters-wrapper">
                <!-- Dynamic filter pills will render here -->
            </div>
        </div>

        <!-- Empty State Container -->
        <div id="empty-state" class="empty-state">
            <svg viewBox="0 0 24 24">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <h3>Aradığınız içerik bulunamadı</h3>
            <p>Lütfen farklı anahtar kelimeler kullanarak aramayı tekrar deneyin ya da filtreleri sıfırlayın.</p>
        </div>

        <!-- Categories and Items Container -->
        <div id="categories-container">
            <!-- Dynamic category sections and book cards will render here -->
        </div>

    </main>

    <!-- JavaScript Data and Core Logic -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>

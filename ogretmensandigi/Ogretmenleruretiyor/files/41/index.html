<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinle ve Seç - Eğitici Oyun</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f39c12;
            --success: #2ecc71;
            --danger: #e74c3c;
            --light: #f8f9fa;
            --dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        /* Başlık ve İlerleme */
        header {
            margin-bottom: 30px;
        }

        .progress-container {
            height: 15px;
            background: #eee;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.3s ease;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Ses Butonu */
        .sound-trigger {
            background: var(--primary);
            color: white;
            border: none;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            font-size: 3rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.4);
            margin: 20px 0;
        }

        .sound-trigger:hover {
            transform: scale(1.1);
            background: #357abd;
        }

        .sound-trigger.playing {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(74, 144, 226, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(74, 144, 226, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(74, 144, 226, 0); }
        }

        /* Seçenekler Alanı */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .option-card {
            background: var(--light);
            border: 4px solid transparent;
            border-radius: 15px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .option-card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            border-radius: 10px;
        }

        .option-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .option-card.correct {
            border-color: var(--success);
            background: #e8f8f0;
        }

        .option-card.wrong {
            border-color: var(--danger);
            background: #fdecea;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Sonuç Ekranı */
        #result-screen {
            display: none;
        }

        .btn-restart {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-restart:hover {
            background: #e67e22;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr 1fr;
            }
            .option-card img {
                height: 120px;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="game-screen">
            <header>
                <h1>Dinle ve Bul!</h1>
                <div class="stats">
                    <span>Puan: <span id="score">0</span></span>
                    <span>Soru: <span id="current-quest">1</span>/5</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </header>

            <p>Aşağıdaki düğmeye bas ve sesi dinle, sonra doğru resmi seç!</p>
            
            <button class="sound-trigger" id="play-sound">
                <i class="fas fa-volume-up"></i>
            </button>

            <div class="options-grid" id="options-container">
                </div>
        </div>

        <div id="result-screen">
            <i class="fas fa-trophy" style="font-size: 5rem; color: var(--secondary);"></i>
            <h2>Tebrikler! Oyunu Tamamladın.</h2>
            <p style="font-size: 1.5rem;">Toplam Puanın: <span id="final-score">0</span></p>
            <button class="btn-restart" onclick="location.reload()">
                <i class="fas fa-redo"></i> Tekrar Oyna
            </button>
        </div>
    </div>

    <audio id="audio-success" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="audio-wrong" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        /***********************************************************
         * DATA - Burayı istediğiniz gibi düzenleyebilirsiniz
         ***********************************************************/
        const GAME_DATA = [
            { id: 1, name: "Türkiye", img: "1.jpg", snd: "1.m4a" },
            { id: 2, name: "Azerbaycan", img: "2.jpg", snd: "2.m4a" },
            { id: 3, name: "Kazakistan", img: "3.jpg", snd: "3.m4a" },
            { id: 4, name: "KKTC", img: "4.jpg", snd: "4.m4a" },
            { id: 5, name: "Türkmenistan", img: "5.jpg", snd: "5.m4a" }
        ];

        // Durum Değişkenleri
        let currentQuestionIndex = 0;
        let score = 0;
        let shuffledQuestions = [];
        let currentAudio = new Audio();
        let isChecking = false;

        // Elementler
        const optionsContainer = document.getElementById('options-container');
        const playBtn = document.getElementById('play-sound');
        const scoreEl = document.getElementById('score');
        const currentQuestEl = document.getElementById('current-quest');
        const progressBar = document.getElementById('progress-bar');
        const gameScreen = document.getElementById('game-screen');
        const resultScreen = document.getElementById('result-screen');
        const finalScoreEl = document.getElementById('final-score');

        // Oyunu Başlat
        function initGame() {
            shuffledQuestions = [...GAME_DATA].sort(() => Math.random() - 0.5);
            loadQuestion();
        }

        // Soru Yükle
        function loadQuestion() {
            isChecking = false;
            const currentQuestion = shuffledQuestions[currentQuestionIndex];
            
            // Arayüzü güncelle
            currentQuestEl.innerText = currentQuestionIndex + 1;
            progressBar.style.width = `${(currentQuestionIndex / GAME_DATA.length) * 100}%`;
            
            // Ses dosyasını ayarla
            currentAudio.src = currentQuestion.snd;
            
            // Seçenekleri oluştur (Rastgele 3 seçenek gösterelim)
            displayOptions(currentQuestion);
        }

        function displayOptions(correctItem) {
            optionsContainer.innerHTML = '';
            
            // Yanlış seçenekleri al (doğru olan hariç diğerleri içinden rastgele)
            let wrongOptions = GAME_DATA
                .filter(item => item.id !== correctItem.id)
                .sort(() => Math.random() - 0.5)
                .slice(0, 2); // Toplam 3 seçenek olması için 2 tane yanlış alıyoruz

            let options = [...wrongOptions, correctItem].sort(() => Math.random() - 0.5);

            options.forEach(item => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.innerHTML = `<img src="${item.img}" alt="Seçenek">`;
                card.onclick = () => checkAnswer(item.id, card);
                optionsContainer.appendChild(card);
            });
        }

        // Ses Çalma
        playBtn.onclick = () => {
            currentAudio.play();
            playBtn.classList.add('playing');
            currentAudio.onended = () => playBtn.classList.remove('playing');
        };

        // Cevap Kontrolü
        function checkAnswer(selectedId, cardElement) {
            if (isChecking) return;
            isChecking = true;

            const correctId = shuffledQuestions[currentQuestionIndex].id;

            if (selectedId === correctId) {
                // Doğru
                score += 20;
                scoreEl.innerText = score;
                cardElement.classList.add('correct');
                document.getElementById('audio-success').play();
                
                setTimeout(() => {
                    nextQuestion();
                }, 1500);
            } else {
                // Yanlış
                cardElement.classList.add('wrong');
                document.getElementById('audio-wrong').play();
                
                setTimeout(() => {
                    cardElement.classList.remove('wrong');
                    isChecking = false;
                }, 1000);
            }
        }

        // Sonraki Soru veya Bitiş
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < shuffledQuestions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            progressBar.style.width = '100%';
            gameScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            finalScoreEl.innerText = score;
        }

        // Başlat
        window.onload = initGame;

    </script>
</body>
</html>

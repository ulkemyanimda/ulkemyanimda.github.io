<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinle ve Seç Oyunu</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #4caf50;
            --error-color: #f44336;
            --bg-color: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 800px;
            width: 90%;
            position: relative;
        }

        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid #dee2e6;
            min-width: 100px;
        }

        .left-stats { text-align: left; }
        .right-stats { text-align: right; }

        .label { font-size: 0.8rem; color: #666; text-transform: uppercase; display: block; }
        .value { font-size: 1.3rem; font-weight: bold; color: #333; }

        #play-btn {
            background-color: var(--primary-color);
            border: none;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3);
        }

        #play-btn:hover { transform: scale(1.1); }
        #play-btn svg { fill: white; width: 40px; height: 40px; }

        #options-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .option-card {
            border: 4px solid #eee;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            aspect-ratio: 1 / 1;
            background: #fff;
        }

        .option-card:hover { transform: translateY(-5px); border-color: #ddd; }
        .option-card img { width: 100%; height: 100%; object-fit: cover; }

        /* Geri bildirim yazısı alanı güncellendi */
        .feedback { 
            height: 50px; 
            margin-top: 25px; 
            font-weight: 800; 
            font-size: 2rem; /* Punto büyütüldü */
            transition: all 0.3s ease;
        }
        
        .correct { border-color: var(--success-color) !important; pointer-events: none; }
        .wrong { border-color: var(--error-color) !important; animation: shake 0.5s; }

        /* Doğru cevap verildiğinde yazıya pop-up efekti */
        .pop-text {
            animation: pop 0.4s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header-stats">
        <div class="left-stats">
            <div class="stat-box">
                <span class="label">SORU</span>
                <span id="question-count" class="value">1</span>
            </div>
        </div>
        <div class="right-stats">
            <div class="stat-box" style="margin-bottom: 5px;">
                <span class="label">PUAN</span>
                <span id="score" class="value">0</span>
            </div>
            <div class="stat-box">
                <span class="label">BAŞARI</span>
                <span id="accuracy" class="value">0 / 0</span>
            </div>
        </div>
    </div>
    
    <div id="audio-controls">
        <button id="play-btn" onclick="playCurrentAudio()">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <p style="color: #777; font-size: 0.9rem;">Sesi dinle ve doğru resmi seç!</p>
    </div>

    <div id="options-container"></div>
    <div id="feedback" class="feedback"></div>
</div>

<script>
    const totalFiles = 12;
    let currentId = null;
    let score = 0;
    let totalQuestionsAttempted = 0;
    let correctAnswers = 0;
    let lastId = null;

    const audioPlayer = new Audio();
    const optionsContainer = document.getElementById('options-container');
    const scoreDisplay = document.getElementById('score');
    const questionDisplay = document.getElementById('question-count');
    const accuracyDisplay = document.getElementById('accuracy');
    const feedbackDisplay = document.getElementById('feedback');

    function initGame() {
        do {
            currentId = Math.floor(Math.random() * totalFiles) + 1;
        } while (currentId === lastId);
        
        lastId = currentId;

        let options = [currentId];
        while (options.length < 5) {
            let randomId = Math.floor(Math.random() * totalFiles) + 1;
            if (!options.includes(randomId)) options.push(randomId);
        }
        options.sort(() => Math.random() - 0.5);

        optionsContainer.innerHTML = '';
        options.forEach(id => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.onclick = () => checkAnswer(id, card);
            
            const img = document.createElement('img');
            img.src = `${id}.jpg`;
            
            card.appendChild(img);
            optionsContainer.appendChild(card);
        });

        audioPlayer.src = `${currentId}.m4a`;
        feedbackDisplay.innerText = '';
        feedbackDisplay.classList.remove('pop-text'); // Animasyonu sıfırla
        
        questionDisplay.innerText = totalQuestionsAttempted + 1;
    }

    function playCurrentAudio() {
        audioPlayer.play().catch(e => console.log("Ses oynatılamadı."));
    }

    function checkAnswer(selectedId, cardElement) {
        if (selectedId === currentId) {
            score += 10;
            correctAnswers++;
            totalQuestionsAttempted++;
            
            updateStats();
            cardElement.classList.add('correct');
            feedbackDisplay.innerText = "Harika! 🎉";
            feedbackDisplay.style.color = "var(--success-color)";
            feedbackDisplay.classList.add('pop-text'); // Animasyonu başlat
            
            setTimeout(initGame, 1500);
        } else {
            cardElement.classList.add('wrong');
            feedbackDisplay.innerText = "Tekrar dene! ❌";
            feedbackDisplay.style.color = "var(--error-color)";
            feedbackDisplay.classList.remove('pop-text');
            setTimeout(() => cardElement.classList.remove('wrong'), 500);
        }
    }

    function updateStats() {
        scoreDisplay.innerText = score;
        accuracyDisplay.innerText = `${correctAnswers} / ${totalQuestionsAttempted}`;
    }

    window.onload = initGame;
</script>

</body>
</html>

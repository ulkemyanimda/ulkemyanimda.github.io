<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Anlam Macerası - Oyun</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800;900&family=Lexend:wght@400;500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
:root {
  --egg-w: 108px;
  --egg-h: 136px;
  --plane-h: 130px;
  --banner-font: 30px;
  --banner-padding: 10px 32px;
}
@media (max-width: 900px) {
  :root {
    --egg-w: 90px;
    --egg-h: 115px;
    --plane-h: 100px;
    --banner-font: 24px;
    --banner-padding: 8px 24px;
  }
}
@media (max-width: 600px) {
  :root {
    --egg-w: 65px;
    --egg-h: 82px;
    --plane-h: 70px;
    --banner-font: 16px;
    --banner-padding: 5px 12px;
  }
  .score-panel, .lives-panel, .level-badge { transform: scale(0.75); top: 5px !important; }
  .score-panel { left: 5px !important; }
  .lives-panel { right: 5px !important; }
  .airplane-rig { top: 15% !important; transform-origin: left center; }
  .egg-wrap[style*="left:8%"] { left: 5% !important; top: 40% !important; }
  .egg-wrap[style*="left:26%"] { left: 24% !important; top: 56% !important; }
  .egg-wrap[style*="left:44%"] { left: 44% !important; top: 35% !important; }
  .egg-wrap[style*="left:61%"] { left: 63% !important; top: 54% !important; }
  .egg-wrap[style*="left:78%"] { left: 83% !important; top: 38% !important; }
}
@media (max-width: 400px) {
  :root {
    --egg-w: 55px;
    --egg-h: 70px;
    --plane-h: 60px;
    --banner-font: 14px;
  }
  .airplane-rig { transform: scale(0.8); }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;height:100vh;width:100vw;
  background:linear-gradient(180deg,#5bb8f5 0%,#87ceeb 45%,#b8e4b8 78%,#5cb85c 100%)}
.cloud{position:absolute;pointer-events:none;font-family:'Material Symbols Outlined';
  font-variation-settings:'FILL' 1;color:white;line-height:1;user-select:none}
.cloud-float{animation:cloudFloat 7s ease-in-out infinite}
@keyframes cloudFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.grass{position:absolute;bottom:0;left:0;right:0;height:80px;
  background:linear-gradient(180deg,#5cb85c 0%,#3d9140 60%,#2d7a30 100%);
  border-radius:60% 60% 0 0/30px 30px 0 0;z-index:5}
@keyframes flyAcross{0%{transform:translateX(-100%)}100%{transform:translateX(100vw)}}
.airplane-rig{position:absolute;top:6%;display:flex;align-items:center;
  animation:flyAcross 22s linear infinite;white-space:nowrap;z-index:20;will-change:transform;left:0}
.plane-img{height:var(--plane-h);mix-blend-mode:multiply;filter:drop-shadow(0 6px 14px rgba(0,0,0,0.3));user-select:none;pointer-events:none;transition:height 0.3s}
.rope{width:40px;height:3px;background:rgba(100,70,20,0.6);margin:0 2px}
.banner{background:#fffdf0;border:3px solid #c9b97a;border-radius:10px;
  padding:var(--banner-padding);box-shadow:3px 5px 18px rgba(0,0,0,0.18);
  position:relative;min-width:120px;max-width:60vw;text-align:center;transition:padding 0.3s}
.banner::before,.banner::after{content:'';position:absolute;top:0;bottom:0;width:12px;
  background:repeating-linear-gradient(180deg,#c9b97a 0,#c9b97a 4px,transparent 4px,transparent 10px)}
.banner::before{left:6px}.banner::after{right:6px}
.banner-label{font-size:11px;font-weight:700;color:#92700a;letter-spacing:.12em;
  text-transform:uppercase;font-family:'Lexend',sans-serif;margin-bottom:2px}
.banner-word{font-size:var(--banner-font);font-weight:900;color:#1a3a8f;letter-spacing:.06em;text-transform:uppercase;transition:font-size 0.3s}
.level-badge{position:absolute;top:16px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.35);backdrop-filter:blur(8px);border-radius:999px;
  padding:6px 20px;z-index:30;font-size:13px;font-weight:700;color:#1a3a8f;
  font-family:'Lexend',sans-serif;letter-spacing:.08em;box-shadow:0 2px 12px rgba(0,0,0,0.15)}
.lives-panel{position:absolute;top:16px;right:20px;display:flex;gap:8px;z-index:30;
  background:rgba(255,255,255,0.35);backdrop-filter:blur(8px);border-radius:999px;
  padding:8px 16px;box-shadow:0 2px 12px rgba(0,0,0,0.15)}
.heart{font-size:28px;line-height:1;transition:transform .3s,opacity .3s;
  filter:drop-shadow(0 2px 4px rgba(200,0,0,0.4))}
.heart.lost{opacity:.2;filter:grayscale(1);transform:scale(0.7)}
@keyframes hbeat{0%,100%{transform:scale(1)}40%{transform:scale(1.25)}}
.heart.pulse{animation:hbeat .5s ease}
.score-panel{position:absolute;top:16px;left:20px;z-index:30;
  background:rgba(255,255,255,0.35);backdrop-filter:blur(8px);border-radius:999px;
  padding:8px 20px;box-shadow:0 2px 12px rgba(0,0,0,0.15);display:flex;align-items:center;gap:8px}
.score-label{font-size:13px;font-weight:700;color:rgba(10,30,80,0.6);font-family:'Lexend',sans-serif;
  text-transform:uppercase;letter-spacing:.08em}
.score-val{font-size:22px;font-weight:900;color:#1a3a8f;min-width:32px}
.egg-wrap{position:absolute;cursor:pointer;-webkit-tap-highlight-color:transparent;
  background:none;border:none;outline:none;padding:0;transform-origin:center bottom;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1);z-index:15}
.egg-wrap:hover{transform:scale(1.1) translateY(-8px)}
.egg-wrap:active{transform:scale(0.95)}
.egg-shell{position:relative;width:var(--egg-w);height:var(--egg-h);
  border-radius:50% 50% 50% 50%/60% 60% 40% 40%;overflow:hidden;
  transition:width 0.3s, height 0.3s;
  box-shadow:0 10px 28px rgba(0,0,0,0.28),inset 0 4px 10px rgba(255,255,255,0.45),inset 0 -4px 8px rgba(0,0,0,0.12)}
.egg-cream{position:absolute;bottom:0;left:0;right:0;height:37%;
  background:linear-gradient(180deg,#f5ede0 0%,#efe4cc 100%)}
.egg-color{position:absolute;top:0;left:0;right:0;height:70%;
  clip-path:polygon(0% 0%,100% 0%,100% 82%,91% 70%,82% 84%,73% 70%,64% 84%,55% 70%,46% 84%,37% 70%,28% 84%,19% 70%,10% 84%,0% 70%)}
.egg-shine{position:absolute;top:8%;left:18%;width:28%;height:30%;
  background:radial-gradient(ellipse at 40% 30%,rgba(255,255,255,0.55) 0%,transparent 70%);
  border-radius:50%;pointer-events:none}
.egg-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  padding-bottom:30%;z-index:10;font-weight:900;font-size:calc(var(--egg-w) / 6.5);color:white;
  text-shadow:0 1px 5px rgba(0,0,0,0.55);text-align:center;padding-left:4px;
  padding-right:4px;letter-spacing:.04em;line-height:1.1;transition:font-size 0.3s}
.egg-red   {background:linear-gradient(150deg,#f87171 0%,#dc2626 100%)}
.egg-orange{background:linear-gradient(150deg,#fb923c 0%,#ea580c 100%)}
.egg-blue  {background:linear-gradient(150deg,#60a5fa 0%,#2563eb 100%)}
.egg-purple{background:linear-gradient(150deg,#c084fc 0%,#9333ea 100%)}
.egg-green {background:linear-gradient(150deg,#4ade80 0%,#16a34a 100%)}
@keyframes parachuteRise{
  0%{opacity:0;transform:translateX(-50%) translateY(60px) scale(0.4)}
  25%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  100%{opacity:1;transform:translateX(-50%) translateY(-130px) scale(1)}}
.parachute-pop{position:absolute;left:50%;bottom:100%;font-size:64px;line-height:1;
  font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 1;color:#ff6b35;
  pointer-events:none;z-index:50;animation:parachuteRise 1.1s cubic-bezier(.34,1.3,.64,1) forwards}
@keyframes eggFloatUp{0%{transform:translateY(0)}100%{transform:translateY(-160px);opacity:0}}
.egg-float-up{animation:eggFloatUp 1.2s ease-in forwards!important}
@keyframes crackShake{
  0%,100%{transform:translate(0,0) rotate(0)}
  20%{transform:translate(-8px,0) rotate(-4deg)}
  40%{transform:translate(8px,0) rotate(4deg)}
  60%{transform:translate(-5px,2px) rotate(-2deg)}
  80%{transform:translate(5px,-2px) rotate(2deg)}}
@keyframes halfLeft{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(-45px,40px) rotate(-35deg);opacity:0}}
@keyframes halfRight{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(45px,40px) rotate(35deg);opacity:0}}
@keyframes yolkDrop{0%{transform:translateY(0) scale(0.5);opacity:0}30%{opacity:1;transform:translateY(-10px) scale(1)}100%{transform:translateY(50px) scale(1.2);opacity:0}}
.crack-anim{animation:crackShake .35s ease forwards!important}
.broken-overlay{position:absolute;inset:0;pointer-events:none;z-index:60}
.crack-lines{position:absolute;inset:0;z-index:62;pointer-events:none}
.egg-half-left{position:absolute;left:0;top:0;width:calc(var(--egg-w) / 2);height:var(--egg-h);
  border-radius:50% 0 0 50%/60% 0 0 40%;overflow:hidden;
  animation:halfLeft .7s .3s ease-in forwards;z-index:61}
.egg-half-right{position:absolute;right:0;top:0;width:calc(var(--egg-w) / 2);height:var(--egg-h);
  border-radius:0 50% 50% 0/0 60% 40% 0;overflow:hidden;
  animation:halfRight .7s .3s ease-in forwards;z-index:61}
.yolk{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:44px;height:44px;border-radius:50%;
  background:radial-gradient(circle at 38% 35%,#ffe566 0%,#f59e0b 60%,#d97706 100%);
  box-shadow:0 3px 10px rgba(0,0,0,0.25);animation:yolkDrop .9s .25s ease-in forwards;z-index:63}
.progress-bar-wrap{position:absolute;bottom:88px;left:50%;transform:translateX(-50%);width:min(360px,80vw);z-index:20}
.progress-track{height:12px;background:rgba(255,255,255,0.35);border-radius:999px;overflow:hidden;backdrop-filter:blur(4px)}
.progress-fill{height:100%;background:linear-gradient(90deg,#fbbf24,#f59e0b);border-radius:999px;transition:width .5s ease}
.progress-label{text-align:center;font-size:12px;font-weight:700;color:rgba(255,255,255,0.8);font-family:'Lexend',sans-serif;margin-top:4px;letter-spacing:.08em}
.particle{position:fixed;pointer-events:none;border-radius:50%;animation:particleFly .7s ease-out forwards;z-index:50}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
.overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:100;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px)}
.panel-card{background:white;border-radius:28px;padding:40px 48px;text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,0.35);max-width:440px;width:90%}
.panel-title{font-size:38px;font-weight:900;margin-bottom:6px}
.panel-sub{font-size:17px;color:#555;font-family:'Lexend',sans-serif;margin-bottom:24px}
.stars-row{font-size:36px;margin-bottom:20px;letter-spacing:4px}
.btn-row{display:flex;flex-direction:column;gap:12px}
.panel-btn{display:block;width:100%;background:#fcd400;color:#4a3a00;font-size:20px;
  font-weight:900;padding:14px 32px;border-radius:999px;border:none;cursor:pointer;
  box-shadow:0 6px 0 #b8960a,0 10px 20px rgba(0,0,0,0.15);
  transition:transform .1s,box-shadow .1s;letter-spacing:.06em;text-transform:uppercase}
.panel-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #b8960a}
.panel-btn.secondary{background:#e0f2fe;color:#0369a1;box-shadow:0 6px 0 #0284c7}
.panel-btn.secondary:active{box-shadow:0 2px 0 #0284c7}
.panel-btn.danger{background:#fee2e2;color:#b91c1c;box-shadow:0 6px 0 #dc2626}
</style>
</head>
<body>
<script src="questions.js"></script>

<div class="score-panel">
  <span class="score-label">Puan</span>
  <span class="score-val" id="scoreVal">0</span>
</div>
<div class="level-badge" id="levelBadge">Level 1 — Kolay</div>
<div class="lives-panel">
  <span class="heart" id="h1">❤️</span>
  <span class="heart" id="h2">❤️</span>
  <span class="heart" id="h3">❤️</span>
</div>

<div class="cloud cloud-float" style="top:6%;left:4%;font-size:130px;opacity:.75;animation-delay:0s">cloud</div>
<div class="cloud cloud-float" style="top:3%;right:8%;font-size:190px;opacity:.65;animation-delay:1.5s">cloud</div>
<div class="cloud cloud-float" style="top:24%;left:52%;font-size:110px;opacity:.45;animation-delay:3s">cloud</div>

<div class="airplane-rig" id="airplaneRig">
  <img src="biplane.png" class="plane-img" alt="uçak"/>
  <div class="rope"></div>
  <div class="banner">
    <div class="banner-label">Eş anlamlısı nedir?</div>
    <div class="banner-word" id="questionWord">—</div>
  </div>
</div>

<button class="egg-wrap" id="egg0" style="left:8%;top:38%"  onclick="checkAnswer(0)">
  <div class="egg-shell" id="shell0"><div class="egg-cream"></div><div class="egg-color egg-red"></div><div class="egg-shine"></div><div class="egg-text" id="eggText0">—</div></div>
</button>
<button class="egg-wrap" id="egg1" style="left:26%;top:54%" onclick="checkAnswer(1)">
  <div class="egg-shell" id="shell1"><div class="egg-cream"></div><div class="egg-color egg-orange"></div><div class="egg-shine"></div><div class="egg-text" id="eggText1">—</div></div>
</button>
<button class="egg-wrap" id="egg2" style="left:44%;top:33%" onclick="checkAnswer(2)">
  <div class="egg-shell" id="shell2"><div class="egg-cream"></div><div class="egg-color egg-blue"></div><div class="egg-shine"></div><div class="egg-text" id="eggText2">—</div></div>
</button>
<button class="egg-wrap" id="egg3" style="left:61%;top:52%" onclick="checkAnswer(3)">
  <div class="egg-shell" id="shell3"><div class="egg-cream"></div><div class="egg-color egg-purple"></div><div class="egg-shine"></div><div class="egg-text" id="eggText3">—</div></div>
</button>
<button class="egg-wrap" id="egg4" style="left:78%;top:38%" onclick="checkAnswer(4)">
  <div class="egg-shell" id="shell4"><div class="egg-cream"></div><div class="egg-color egg-green"></div><div class="egg-shine"></div><div class="egg-text" id="eggText4">—</div></div>
</button>

<div class="grass"></div>

<div class="progress-bar-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">Soru 1 / 10</div>
</div>

<!-- Win Overlay -->
<div class="overlay" id="winOverlay" style="display:none">
  <div class="panel-card">
    <div class="panel-title">🎉 Tebrikler!</div>
    <div class="stars-row" id="starsDisplay">⭐⭐⭐</div>
    <div class="panel-sub" id="winSub">Level tamamlandı!</div>
    <div class="btn-row">
      <button class="panel-btn" id="nextLevelBtn" onclick="goNextLevel()" style="display:none">Sonraki Level →</button>
      <button class="panel-btn secondary" onclick="restartGame()">Tekrar Oyna</button>
      <button class="panel-btn secondary" onclick="goHome()">Ana Sayfa</button>
    </div>
  </div>
</div>

<!-- Lose Overlay -->
<div class="overlay" id="loseOverlay" style="display:none">
  <div class="panel-card">
    <div class="panel-title">😢 Oyun Bitti</div>
    <div class="panel-sub">Canların tükendi. Tekrar dene!</div>
    <div class="btn-row">
      <button class="panel-btn" onclick="restartGame()">Tekrar Dene</button>
      <button class="panel-btn secondary" onclick="goHome()">Ana Sayfa</button>
    </div>
  </div>
</div>

<script>
const EGG_COLORS = ['egg-red','egg-orange','egg-blue','egg-purple','egg-green'];
const params = new URLSearchParams(window.location.search);
if (!params.has('level')) {
  window.location.href = 'index.html';
}
const level  = Math.min(Math.max(parseInt(params.get('level')) || 1, 1), TOTAL_LEVELS);
const questions = LEVEL_QUESTIONS[level];
const TOTAL_Q   = questions.length;

let currentQ=0, lives=3, score=0, answered=false, wrong=0;

document.getElementById('levelBadge').textContent = `Level ${level} — ${LEVEL_NAMES[level-1]}`;

function loadQuestion() {
  if (currentQ >= TOTAL_Q) { showWin(); return; }
  answered = false;
  const q = questions[currentQ];
  document.getElementById('questionWord').textContent = q.word;
  const shuffled = [...q.options].sort(()=>Math.random()-0.5);
  for(let i=0;i<5;i++){
    document.getElementById('eggText'+i).textContent = shuffled[i]||'';
    const btn=document.getElementById('egg'+i);
    const shell=document.getElementById('shell'+i);
    btn.classList.remove('egg-float-up','crack-anim');
    btn.style.pointerEvents='auto'; btn.style.opacity='1'; btn.style.transform='';
    shell.querySelectorAll('.broken-overlay,.parachute-pop').forEach(e=>e.remove());
    shell.querySelector('.egg-color').className='egg-color '+EGG_COLORS[i];
  }
  document.getElementById('progressFill').style.width=(currentQ/TOTAL_Q*100)+'%';
  document.getElementById('progressLabel').textContent=`Soru ${currentQ+1} / ${TOTAL_Q}`;
  
  // Consistent on-screen duration: L1=12s, decreases with level
  const targetOnScreen = Math.max(4, 12 - (level - 1));
  const rig = document.getElementById('airplaneRig');
  const rigWidth = rig.offsetWidth || 500;
  const duration = targetOnScreen * (1 + rigWidth / window.innerWidth);
  
  rig.style.animation='none'; void rig.offsetWidth; 
  rig.style.animation=`flyAcross ${duration}s linear forwards`;

  // Timeout for airplane passing - we use the full duration
  clearTimeout(window.qTimeout);
  window.qTimeout = setTimeout(() => {
    if(!answered) handleTimeout();
  }, duration * 1000);
}

function handleTimeout() {
  if(answered) return;
  answered = true;
  loseLife();
  setTimeout(() => { if(lives > 0) { currentQ++; loadQuestion(); } }, 1000);
}

function checkAnswer(idx) {
  if(answered) return;
  const q=questions[currentQ];
  const chosen=document.getElementById('eggText'+idx).textContent;
  const btn=document.getElementById('egg'+idx);
  const shell=document.getElementById('shell'+idx);
  answered=true;
  for(let i=0;i<5;i++) document.getElementById('egg'+i).style.pointerEvents='none';

  if(chosen===q.correct) {
    spawnParticles(btn); score+=10;
    document.getElementById('scoreVal').textContent=score;
    const chute=document.createElement('div');
    chute.className='parachute-pop'; chute.textContent='paragliding';
    shell.appendChild(chute);
    btn.classList.add('egg-float-up');
    setTimeout(()=>{currentQ++; loadQuestion();},1300);
  } else {
    wrong++;
    btn.classList.add('crack-anim');
    setTimeout(()=>showBrokenEgg(shell, EGG_COLORS[idx]),380);
    loseLife();
    setTimeout(()=>{ if(lives>0){currentQ++; loadQuestion();} },1200);
  }
}

function showBrokenEgg(shell, colorClass) {
  const bgMap={'egg-red':'linear-gradient(150deg,#f87171,#dc2626)','egg-orange':'linear-gradient(150deg,#fb923c,#ea580c)','egg-blue':'linear-gradient(150deg,#60a5fa,#2563eb)','egg-purple':'linear-gradient(150deg,#c084fc,#9333ea)','egg-green':'linear-gradient(150deg,#4ade80,#16a34a)'};
  const bg=bgMap[colorClass]||bgMap['egg-red'];
  const o=document.createElement('div'); o.className='broken-overlay';
  o.innerHTML=`<div class="egg-half-left" style="background:${bg}"></div><div class="egg-half-right" style="background:${bg}"></div><div class="yolk"></div><svg class="crack-lines" viewBox="0 0 108 136" xmlns="http://www.w3.org/2000/svg"><polyline points="54,0 48,30 58,50 44,80 56,110" fill="none" stroke="rgba(0,0,0,0.35)" stroke-width="2.5" stroke-linecap="round"/><polyline points="54,40 65,55 58,72" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="1.8" stroke-linecap="round"/></svg>`;
  shell.appendChild(o);
}

function loseLife() {
  const h=document.getElementById('h'+lives);
  if(h){h.classList.add('lost','pulse'); setTimeout(()=>h.classList.remove('pulse'),600);}
  lives--;
  if(lives<=0) setTimeout(showLose,900);
}

function calcStars() {
  if(wrong===0) return 3;
  if(wrong<=1)  return 2;
  return 1;
}

function showWin() {
  document.getElementById('progressFill').style.width='100%';
  const stars=calcStars();
  document.getElementById('starsDisplay').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('winSub').textContent=`Puanın: ${score} / ${TOTAL_Q*10}`;

  // Save progress
  const currentUnlocked=parseInt(localStorage.getItem('anlamMacerasi_unlocked')||'1');
  if(level>=currentUnlocked) localStorage.setItem('anlamMacerasi_unlocked', Math.min(level+1, TOTAL_LEVELS+1));
  localStorage.setItem(`anlamMacerasi_stars_${level}`, stars);

  // Show next level button if available
  if(level < TOTAL_LEVELS) {
    document.getElementById('nextLevelBtn').style.display='block';
  }
  document.getElementById('winOverlay').style.display='flex';
}

function showLose() { document.getElementById('loseOverlay').style.display='flex'; }
function goNextLevel() { window.location.href=`game.html?level=${level+1}`; }
function restartGame() {
  currentQ=0; lives=3; score=0; answered=false; wrong=0;
  document.getElementById('scoreVal').textContent='0';
  document.getElementById('winOverlay').style.display='none';
  document.getElementById('loseOverlay').style.display='none';
  document.getElementById('nextLevelBtn').style.display='none';
  for(let i=1;i<=3;i++){const h=document.getElementById('h'+i); h.classList.remove('lost','pulse');}
  loadQuestion();
}
function goHome(){window.location.href='index.html';}

function spawnParticles(fromEl) {
  const r=fromEl.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
  const colors=['#fbbf24','#f472b6','#34d399','#60a5fa','#f87171','#a78bfa'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div'), ang=(i/18)*360, dist=55+Math.random()*65;
    p.className='particle';
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${8+Math.random()*8}px;height:${8+Math.random()*8}px;background:${colors[i%colors.length]};--tx:${Math.cos(ang*Math.PI/180)*dist}px;--ty:${Math.sin(ang*Math.PI/180)*dist}px`;
    document.body.appendChild(p); setTimeout(()=>p.remove(),750);
  }
}

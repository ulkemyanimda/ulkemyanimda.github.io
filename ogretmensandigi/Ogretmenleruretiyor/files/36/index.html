<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organlarımız Oyunu</title>
    <style>
        /* --- TEMEL AYARLAR --- */
        body {
            font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, cursive, sans-serif;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Kaydırma yok, her şey tek ekranda */
            background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
            color: #2c3e50;
            display: flex;
            flex-direction: column;
        }

        /* --- ARKA PLAN (NET) --- */
        #backgroundContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .bg-img {
            position: absolute;
            width: 15vw;
            opacity: 0.8; /* Resimler net */
            border-radius: 10px;
            background: rgba(255,255,255,0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        @keyframes floatAnim {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(10vw, 10vh) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* --- OYUN ALANI DÜZENİ (FLEX MİMARİSİ) --- */
        #gameUI {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.5); /* Buzlu cam */
            backdrop-filter: blur(5px);
            padding: 10px;
            box-sizing: border-box;
            align-items: center;
        }

        /* 1. ÜST BÖLÜM: PUAN (Sabit Alan) */
        #topSection {
            flex: 0 0 auto; /* Büyüyüp küçülmez */
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 5px;
        }
        #scoreBoard {
            font-size: clamp(20px, 3vh, 28px);
            font-weight: bold;
            background: #fff;
            color: #5f27cd;
            border: 3px solid #5f27cd;
            padding: 5px 30px;
            border-radius: 30px;
        }

        /* 2. ORTA BÖLÜM: SORU VE RESİMLER (Esnek Alan) */
        #middleSection {
            flex: 1; /* Kalan TÜM boşluğu burası kaplar */
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1000px; /* Çok geniş ekranlarda dağılmasın */
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Taşmayı engelle */
            padding: 5px 0;
        }

        #feedback {
            flex: 0 0 auto;
            font-size: clamp(18px, 4vh, 36px);
            font-weight: bold;
            text-align: center;
            background: #fff;
            padding: 5px 20px;
            border-radius: 15px;
            width: 80%;
            margin-bottom: 10px;
            border: 2px solid #ecf0f1;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* IZGARA YAPISI */
        #gridContainer {
            flex: 1; /* Orta bölümdeki kalan tüm alanı resimlere ver */
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            width: 100%;
            height: 100%; /* Mevcut alanın tamamını kullan */
            min-height: 0; /* İçeriğin taşmasını engellemek için kritik */
        }

        /* RESİM KARTLARI */
        .img-card {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #fff;
            border: 4px solid white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            overflow: hidden; /* Resim dışarı taşarsa gizle */
            cursor: pointer;
            transition: transform 0.2s;
        }
        .img-card:hover {
            transform: scale(1.02);
            border-color: #54a0ff;
            z-index: 10;
        }

        /* --- EN ÖNEMLİ KISIM: RESİM SIĞDIRMA --- */
        .img-card img {
            width: 100%;
            height: 100%;
            /* CONTAIN: Resmin tamamını görünecek şekilde küçültür/büyütür. Asla kesmez. */
            object-fit: contain; 
            display: block;
        }

        .hidden-option { opacity: 0; pointer-events: none; }

        /* 3. ALT BÖLÜM: BUTON (Sabit Alan) */
        #bottomSection {
            flex: 0 0 auto;
            width: 100%;
            display: flex;
            justify-content: center;
            padding-top: 5px;
            height: 50px; /* Buton için garanti yer */
        }

        button {
            padding: 0 40px;
            height: 45px;
            font-size: 20px;
            font-weight: bold;
            background-color: #ff9f43;
            color: white;
            border: 3px solid #fff;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        button:hover { background-color: #ff793f; transform: scale(1.05); }

        #replayBtn { background-color: #48dbfb; visibility: hidden; }
        #replayBtn:hover { background-color: #0abde3; }

        /* Başlangıç Ekranı */
        #startScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 20;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(5px);
        }
        h1 {
            font-size: clamp(40px, 8vw, 70px);
            color: #ff6b6b;
            text-shadow: 2px 2px 0 #fff;
            background: rgba(255,255,255,0.9);
            padding: 10px 40px; border-radius: 50px;
            margin-bottom: 30px;
        }
        
        .listening-animation { color: #0abde3; animation: bounce 1s infinite alternate; }
        @keyframes bounce { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        #errorMsg { margin-top:10px; color:red; background:white; padding:5px; border-radius:5px; display:none;}

    </style>
</head>
<body>

    <div id="backgroundContainer"></div>

    <div id="startScreen">
        <h1>Organlarımız</h1>
        <button id="startBtn">OYUNA BAŞLA ▶️</button>
        <div id="errorMsg"></div>
    </div>

    <div id="gameUI">
        <div id="topSection">
            <div id="scoreBoard">Puan: <span id="scoreValue">0</span></div>
        </div>

        <div id="middleSection">
            <div id="feedback"></div>
            
            <div id="gridContainer">
                </div>
        </div>

        <div id="bottomSection">
            <button id="replayBtn">Tekrar Dinle 🔊</button>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const levelData = [
            { id: 1, name: "AĞIZ" }, { id: 2, name: "AYAK" },
            { id: 5, name: "BURUN" }, { id: 6, name: "DİŞ" },
            { id: 8, name: "GÖZ" },{ id: 9, name: "KOL" }, { id: 10, name: "KULAK" },
            { id: 11, name: "EL" }, { id: 12, name: "SAÇ" }
        ];

        let currentLevelIndex = 0;
        let score = 0;

        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const gameUI = document.getElementById('gameUI');
        const backgroundContainer = document.getElementById('backgroundContainer');
        const feedbackEl = document.getElementById('feedback');
        const gridContainer = document.getElementById('gridContainer');
        const audioPlayer = document.getElementById('audioPlayer');
        const scoreValue = document.getElementById('scoreValue');
        const replayBtn = document.getElementById('replayBtn');
        const errorMsg = document.getElementById('errorMsg');

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Arka Plan
        function createBackground() {
            for (let i = 1; i <= levelData.length; i++) {
                let img = document.createElement('img');
                img.src = `${i}.jpg`;
                img.className = 'bg-img';
                img.style.left = Math.random() * 80 + '%';
                img.style.top = Math.random() * 80 + '%';
                img.style.animation = `floatAnim ${Math.random() * 20 + 20}s infinite linear alternate`;
                backgroundContainer.appendChild(img);
            }
        }

        startBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            gameUI.style.display = 'flex';
            playLevel();
        });

        function playLevel() {
            if (currentLevelIndex >= levelData.length) {
                gridContainer.style.display = 'none';
                replayBtn.style.visibility = 'hidden';
                feedbackEl.innerHTML = `🎉 OYUN BİTTİ! 🎉<br>Puan: ${score}`;
                feedbackEl.style.color = '#ff9f43';
                return;
            }

            const currentData = levelData[currentLevelIndex];
            
            gridContainer.style.display = 'none';
            replayBtn.style.visibility = 'hidden';
            feedbackEl.innerHTML = '<span class="listening-animation">👂 Dinleniyor...</span>';
            feedbackEl.style.color = '#2c3e50';

            audioPlayer.onerror = () => {
                startScreen.style.display = 'flex';
                gameUI.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = `HATA: ${currentData.id}.m4a dosyası bulunamadı.`;
            };

            audioPlayer.src = `${currentData.id}.m4a`;
            audioPlayer.play().catch(e => console.log(e));
        }

        audioPlayer.onended = () => {
            showOptions();
        };

        function showOptions() {
            feedbackEl.innerHTML = 'Hangi organ? 🤔';
            gridContainer.style.display = 'grid'; // Izgarayı aç
            replayBtn.style.visibility = 'visible';
            gridContainer.innerHTML = ''; 

            const currentData = levelData[currentLevelIndex];
            let options = [currentData.id];

            let distractors = [];
            for (let i = 1; i <= levelData.length; i++) {
                if (i !== currentData.id) distractors.push(i);
            }
            distractors = shuffleArray(distractors);
            options.push(distractors[0], distractors[1], distractors[2]);
            options = shuffleArray(options);

            options.forEach(fileId => {
                // KART OLUŞTUR
                const cardDiv = document.createElement('div');
                cardDiv.className = 'img-card';

                // RESİM OLUŞTUR
                const imgEl = document.createElement('img');
                imgEl.src = `${fileId}.jpg`;
                
                // Tıklama olayını karta ver
                cardDiv.addEventListener('click', (e) => checkAnswer(fileId, cardDiv));
                
                cardDiv.appendChild(imgEl);
                gridContainer.appendChild(cardDiv);
            });
        }

        function checkAnswer(selectedId, cardElement) {
            const currentData = levelData[currentLevelIndex];

            if (selectedId === currentData.id) {
                feedbackEl.innerHTML = `✅ ${currentData.name}`;
                feedbackEl.style.color = "#1dd1a1"; 
                score += 10;
                scoreValue.textContent = score;
                gridContainer.style.pointerEvents = 'none';

                setTimeout(() => {
                    currentLevelIndex++;
                    gridContainer.style.pointerEvents = 'auto';
                    playLevel();
                }, 2000);
            } else {
                score -= 10;
                scoreValue.textContent = score;
                feedbackEl.innerHTML = "❌ Tekrar dene!";
                feedbackEl.style.color = "#ff6b6b"; 
                cardElement.classList.add('hidden-option');
            }
        }

        replayBtn.addEventListener('click', () => {
            audioPlayer.currentTime = 0;
            audioPlayer.play();
        });

        window.onload = createBackground;
    </script>
</body>
</html>

<!doctype html>
<html lang="tr" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hayvan Sesleri Eşleştirme Oyunu</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
    
    * {
      font-family: 'Nunito', sans-serif;
    }
    
    .sound-card {
      cursor: grab;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .sound-card:active {
      cursor: grabbing;
    }
    
    .sound-card.dragging {
      opacity: 0.7;
      transform: scale(1.1) rotate(5deg);
      z-index: 1000;
    }
    
    .animal-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .animal-card.drag-over {
      transform: scale(1.1);
      box-shadow: 0 0 30px rgba(74, 222, 128, 0.6);
    }
    
    .animal-card.matched {
      animation: matchPop 0.5s ease-out forwards;
    }
    
    .sound-card.matched {
      animation: matchPop 0.5s ease-out forwards;
    }
    
    @keyframes matchPop {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
      100% { transform: scale(0); opacity: 0; }
    }
    
    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-10px); }
      40%, 80% { transform: translateX(10px); }
    }
    
    .wrong-shake {
      animation: wrongShake 0.5s ease-in-out;
    }
    
    @keyframes confetti-fall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      animation: confetti-fall linear forwards;
      z-index: 9999;
      pointer-events: none;
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }
      50% { box-shadow: 0 0 40px rgba(251, 191, 36, 0.8); }
    }
    
    .score-box {
      animation: pulse-glow 2s ease-in-out infinite;
    }
    
    @keyframes bounce-in {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .bounce-in {
      animation: bounce-in 0.5s ease-out forwards;
    }
    
    .speaker-btn {
      transition: all 0.2s ease;
    }
    
    .speaker-btn:hover {
      transform: scale(1.1);
    }
    
    .speaker-btn:active {
      transform: scale(0.95);
    }
    
    .speaker-btn.playing {
      animation: speaker-pulse 0.3s ease-in-out infinite;
    }
    
    @keyframes speaker-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    
    .feedback-popup {
      animation: popup-show 0.4s ease-out forwards;
    }
    
    @keyframes popup-show {
      0% { transform: scale(0) translateY(20px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    
    .win-modal {
      animation: modal-appear 0.6s ease-out forwards;
    }
    
    @keyframes modal-appear {
      0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gradient-to-br from-pink-200 via-rose-100 to-pink-300 overflow-auto">
  <div id="app" class="min-h-full w-full p-4 md:p-6"><!-- Header -->
   <header class="text-center mb-6">
    <h1 id="game-title" class="text-3xl md:text-4xl font-extrabold text-white drop-shadow-lg mb-2">🎵 Hayvan Sesleri Eşleştirme 🐾</h1>
    <p class="text-white/90 text-lg">Sesleri doğru hayvanlara sürükle!</p>
   </header><!-- Score Display -->
   <div class="flex justify-center mb-6">
    <div class="score-box bg-gradient-to-r from-amber-400 to-yellow-300 px-8 py-3 rounded-2xl shadow-xl"><span class="text-2xl font-bold text-amber-900">⭐ Puan: <span id="score">0</span></span>
    </div>
   </div><!-- Game Area -->
   <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8"><!-- Sound Cards Section -->
    <div class="bg-white/20 backdrop-blur-sm rounded-3xl p-6 shadow-2xl aspect-square flex flex-col">
     <h2 class="text-xl font-bold text-white text-center mb-4 flex items-center justify-center gap-2">🔊 Sesler</h2>
     <div id="sounds-container" class="grid grid-cols-2 sm:grid-cols-3 gap-3 flex-1 overflow-auto"><!-- Sound cards will be generated here -->
     </div>
    </div><!-- Animal Cards Section -->
    <div class="bg-white/20 backdrop-blur-sm rounded-3xl p-6 shadow-2xl aspect-square flex flex-col">
     <h2 class="text-xl font-bold text-white text-center mb-4 flex items-center justify-center gap-2">🐾 Hayvanlar</h2>
     <div id="animals-container" class="grid grid-cols-2 sm:grid-cols-3 gap-3 flex-1 overflow-auto"><!-- Animal cards will be generated here -->
     </div>
    </div>
   </div><!-- Feedback Popup -->
   <div id="feedback" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none z-50 hidden">
    <div class="feedback-popup bg-white rounded-2xl px-8 py-4 shadow-2xl text-center"><span id="feedback-icon" class="text-5xl block mb-2"></span> <span id="feedback-text" class="text-xl font-bold"></span>
    </div>
   </div><!-- Win Modal -->
   <div id="win-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="win-modal bg-gradient-to-br from-yellow-300 via-amber-400 to-orange-400 rounded-3xl p-8 mx-4 text-center shadow-2xl max-w-md">
     <div class="text-6xl mb-4">
      🎉🏆🎉
     </div>
     <h2 class="text-4xl font-extrabold text-white drop-shadow mb-4">TEBRİKLER!</h2>
     <p class="text-xl text-white/90 mb-2">Tüm hayvanları doğru eşleştirdin!</p>
     <p class="text-2xl font-bold text-white mb-6">Toplam Puan: <span id="final-score">0</span> ⭐</p><button id="play-again" class="bg-white text-amber-600 font-bold text-xl px-8 py-3 rounded-full shadow-lg hover:scale-105 transition-transform"> 🔄 Tekrar Oyna </button>
    </div>
   </div>
  </div>
  <script>
    // Game Configuration
    const animals = [
      { id: 1, name: 'kuş', emoji: '🐦', sound: '1.bird.wav' },
      { id: 2, name: 'köpek', emoji: '🐕', sound: '2.dog.wav' },
      { id: 3, name: 'kedi', emoji: '🐱', sound: '3.cat.wav' },
      { id: 4, name: 'inek', emoji: '🐄', sound: '4.cow.wav' },
      { id: 5, name: 'aslan', emoji: '🦁', sound: '5.lion.wav' },
      { id: 6, name: 'fil', emoji: '🐘', sound: '6.elephant.wav' },
      { id: 7, name: 'at', emoji: '🐴', sound: '7.horse.wav' },
      { id: 8, name: 'koyun', emoji: '🐑', sound: '8.sheep.wav' },
      { id: 9, name: 'horoz', emoji: '🐓', sound: '9.rooster.wav' },
      { id: 10, name: 'maymun', emoji: '🐒', sound: '10.monkey.wav' }
    ];

    // Game State
    let score = 0;
    let matchedCount = 0;
    let draggedElement = null;
    let draggedAnimalId = null;

    // Shuffle array helper
    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    // Create sound card HTML
    function createSoundCard(animal) {
      const card = document.createElement('div');
      card.className = 'sound-card bg-gradient-to-br from-rose-300 to-pink-400 rounded-2xl p-4 flex flex-col items-center justify-center gap-2 shadow-lg aspect-square';
      card.setAttribute('data-animal-id', animal.id);
      card.setAttribute('draggable', 'true');
      
      card.innerHTML = `
        <button class="speaker-btn bg-white/40 hover:bg-white/60 rounded-full p-4 transition-all flex items-center justify-center" onclick="event.stopPropagation(); playSound(${animal.id})">
          <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          </svg>
        </button>
      `;
      
      // Drag events
      card.addEventListener('dragstart', handleDragStart);
      card.addEventListener('dragend', handleDragEnd);
      
      // Touch events for mobile
      card.addEventListener('touchstart', handleTouchStart, { passive: false });
      card.addEventListener('touchmove', handleTouchMove, { passive: false });
      card.addEventListener('touchend', handleTouchEnd);
      
      return card;
    }

    // Create animal card HTML
    function createAnimalCard(animal) {
      const card = document.createElement('div');
      card.className = 'animal-card bg-gradient-to-br from-sky-300 to-blue-400 rounded-2xl p-4 flex flex-col items-center justify-center shadow-lg aspect-square';
      card.setAttribute('data-animal-id', animal.id);
      
      card.innerHTML = `
        <span class="text-6xl">${animal.emoji}</span>
        <span class="text-white text-sm font-semibold capitalize mt-2">${animal.name}</span>
      `;
      
      // Drop events
      card.addEventListener('dragover', handleDragOver);
      card.addEventListener('dragleave', handleDragLeave);
      card.addEventListener('drop', handleDrop);
      
      return card;
    }

    // Play animal sound from audio file
    function playSound(animalId) {
      const animal = animals.find(a => a.id === animalId);
      if (!animal) return;
      
      const btn = document.querySelector(`[data-animal-id="${animalId}"] .speaker-btn`);
      if (btn) {
        btn.classList.add('playing');
        setTimeout(() => btn.classList.remove('playing'), 800);
      }
      
      // Create and play audio element
      const audio = new Audio(animal.sound);
      audio.volume = 0.7;
      audio.play().catch(err => {
        console.error('Error playing sound:', err);
      });
    }

    // Play victory sound
    function playVictorySound() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
      notes.forEach((freq, i) => {
        setTimeout(() => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, ctx.currentTime);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.4);
        }, i * 150);
      });
    }

    // Play correct sound
    function playCorrectSound() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.2);
    }

    // Play wrong sound
    function playWrongSound() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.setValueAtTime(150, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    }

    // Drag and Drop Handlers
    function handleDragStart(e) {
      draggedElement = e.target.closest('.sound-card');
      draggedAnimalId = parseInt(draggedElement.getAttribute('data-animal-id'));
      draggedElement.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragEnd(e) {
      if (draggedElement) {
        draggedElement.classList.remove('dragging');
      }
      draggedElement = null;
      draggedAnimalId = null;
      document.querySelectorAll('.animal-card').forEach(card => {
        card.classList.remove('drag-over');
      });
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.target.closest('.animal-card').classList.add('drag-over');
    }

    function handleDragLeave(e) {
      e.target.closest('.animal-card').classList.remove('drag-over');
    }

    function handleDrop(e) {
      e.preventDefault();
      const targetCard = e.target.closest('.animal-card');
      targetCard.classList.remove('drag-over');
      
      const targetAnimalId = parseInt(targetCard.getAttribute('data-animal-id'));
      
      if (draggedAnimalId === targetAnimalId) {
        handleCorrectMatch(draggedElement, targetCard);
      } else {
        handleWrongMatch(draggedElement);
      }
    }

    // Touch event handlers for mobile
    let touchClone = null;
    let touchStartX = 0;
    let touchStartY = 0;

    function handleTouchStart(e) {
      const card = e.target.closest('.sound-card');
      if (!card || e.target.closest('.speaker-btn')) return;
      
      e.preventDefault();
      draggedElement = card;
      draggedAnimalId = parseInt(card.getAttribute('data-animal-id'));
      
      const touch = e.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      
      // Create visual clone for dragging
      touchClone = card.cloneNode(true);
      touchClone.style.position = 'fixed';
      touchClone.style.zIndex = '10000';
      touchClone.style.pointerEvents = 'none';
      touchClone.style.opacity = '0.8';
      touchClone.style.transform = 'scale(1.1) rotate(5deg)';
      const rect = card.getBoundingClientRect();
      touchClone.style.width = rect.width + 'px';
      touchClone.style.left = (touch.clientX - rect.width / 2) + 'px';
      touchClone.style.top = (touch.clientY - rect.height / 2) + 'px';
      document.body.appendChild(touchClone);
      
      card.style.opacity = '0.3';
    }

    function handleTouchMove(e) {
      if (!touchClone) return;
      e.preventDefault();
      
      const touch = e.touches[0];
      const rect = touchClone.getBoundingClientRect();
      touchClone.style.left = (touch.clientX - rect.width / 2) + 'px';
      touchClone.style.top = (touch.clientY - rect.height / 2) + 'px';
      
      // Highlight potential drop targets
      const elementBelow = document.elementFromPoint(touch.clientX, touch.clientY);
      document.querySelectorAll('.animal-card').forEach(card => card.classList.remove('drag-over'));
      
      if (elementBelow) {
        const animalCard = elementBelow.closest('.animal-card');
        if (animalCard) {
          animalCard.classList.add('drag-over');
        }
      }
    }

    function handleTouchEnd(e) {
      if (!touchClone || !draggedElement) return;
      
      const touch = e.changedTouches[0];
      const elementBelow = document.elementFromPoint(touch.clientX, touch.clientY);
      
      document.querySelectorAll('.animal-card').forEach(card => card.classList.remove('drag-over'));
      
      if (elementBelow) {
        const animalCard = elementBelow.closest('.animal-card');
        if (animalCard) {
          const targetAnimalId = parseInt(animalCard.getAttribute('data-animal-id'));
          if (draggedAnimalId === targetAnimalId) {
            handleCorrectMatch(draggedElement, animalCard);
          } else {
            handleWrongMatch(draggedElement);
          }
        } else {
          draggedElement.style.opacity = '1';
        }
      } else {
        draggedElement.style.opacity = '1';
      }
      
      if (touchClone && touchClone.parentNode) {
        touchClone.parentNode.removeChild(touchClone);
      }
      touchClone = null;
      draggedElement = null;
      draggedAnimalId = null;
    }

    // Match handlers
    function handleCorrectMatch(soundCard, animalCard) {
      playCorrectSound();
      
      // Update score
      score += 10;
      matchedCount++;
      document.getElementById('score').textContent = score;
      
      // Show feedback
      showFeedback(true);
      
      // Animate and remove cards
      soundCard.classList.add('matched');
      animalCard.classList.add('matched');
      
      setTimeout(() => {
        soundCard.style.display = 'none';
        animalCard.style.display = 'none';
        
        // Check for win
        if (matchedCount === animals.length) {
          setTimeout(handleWin, 500);
        }
      }, 500);
    }

    function handleWrongMatch(soundCard) {
      playWrongSound();
      
      // Show feedback
      showFeedback(false);
      
      // Shake animation
      soundCard.classList.add('wrong-shake');
      soundCard.style.opacity = '1';
      
      setTimeout(() => {
        soundCard.classList.remove('wrong-shake');
      }, 500);
    }

    function showFeedback(isCorrect) {
      const feedback = document.getElementById('feedback');
      const icon = document.getElementById('feedback-icon');
      const text = document.getElementById('feedback-text');
      
      if (isCorrect) {
        icon.textContent = '✅';
        text.textContent = 'Harika! +10 Puan';
        text.className = 'text-xl font-bold text-green-600';
      } else {
        icon.textContent = '❌';
        text.textContent = 'Tekrar Dene!';
        text.className = 'text-xl font-bold text-red-500';
      }
      
      feedback.classList.remove('hidden');
      
      setTimeout(() => {
        feedback.classList.add('hidden');
      }, 1500);
    }

    function handleWin() {
      playVictorySound();
      createConfetti();
      
      document.getElementById('final-score').textContent = score;
      document.getElementById('win-modal').classList.remove('hidden');
      
      // Speak congratulations
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance('Tebrikler! Tüm hayvanları doğru eşleştirdin!');
        utterance.lang = 'tr-TR';
        utterance.rate = 0.9;
        speechSynthesis.speak(utterance);
      }
    }

    function createConfetti() {
      const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500', '#ff1493'];
      
      for (let i = 0; i < 100; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.left = Math.random() * 100 + 'vw';
          confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
          confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
          
          if (Math.random() > 0.5) {
            confetti.style.borderRadius = '50%';
          }
          
          document.body.appendChild(confetti);
          
          setTimeout(() => {
            confetti.remove();
          }, 4000);
        }, i * 30);
      }
    }

    function resetGame() {
      score = 0;
      matchedCount = 0;
      document.getElementById('score').textContent = '0';
      document.getElementById('win-modal').classList.add('hidden');
      initGame();
    }

    function initGame() {
      const soundsContainer = document.getElementById('sounds-container');
      const animalsContainer = document.getElementById('animals-container');
      
      soundsContainer.innerHTML = '';
      animalsContainer.innerHTML = '';
      
      // Shuffle and create cards
      const shuffledSounds = shuffleArray(animals);
      const shuffledAnimals = shuffleArray(animals);
      
      shuffledSounds.forEach((animal, index) => {
        const card = createSoundCard(animal);
        card.style.animationDelay = (index * 50) + 'ms';
        card.classList.add('bounce-in');
        soundsContainer.appendChild(card);
      });
      
      shuffledAnimals.forEach((animal, index) => {
        const card = createAnimalCard(animal);
        card.style.animationDelay = (index * 50) + 'ms';
        card.classList.add('bounce-in');
        animalsContainer.appendChild(card);
      });
    }

    // Element SDK Integration
    const defaultConfig = {
      game_title: '🎵 Hayvan Sesleri Eşleştirme 🐾'
    };

    function applyConfig(config) {
      const titleEl = document.getElementById('game-title');
      if (titleEl) {
        titleEl.textContent = config.game_title || defaultConfig.game_title;
      }
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          applyConfig(config);
        },
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['game_title', config.game_title || defaultConfig.game_title]
        ])
      });
    }

    // Initialize
    document.getElementById('play-again').addEventListener('click', resetGame);
    initGame();
  </script>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
		<link rel="icon" href="https://ulkemyanimda.github.io/icons/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğretmenler Üretiyor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #667eea;
            margin-bottom: 25px;
            text-align: center;
            font-size: 2.5em;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .filter-group select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-group select:hover {
            border-color: #667eea;
        }

        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .reset-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
            align-self: flex-end;
        }

        .reset-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .card-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-title {
            font-size: 1.3em;
            font-weight: 700;
            color: #333;
            line-height: 1.3;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tag {
            padding: 6px 12px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 0.85em;
            color: #555;
            font-weight: 500;
        }

        .tag.ogrenme { background: #e3f2fd; color: #1976d2; }
        .tag.tema { background: #f3e5f5; color: #7b1fa2; }
        .tag.seviye { background: #fff3e0; color: #e65100; }
        .tag.yas { background: #e8f5e9; color: #2e7d32; }

        .card-footer {
            margin-top: auto;
            padding-top: 15px;
            border-top: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 0.9em;
        }

        .teacher-icon {
            font-size: 1.2em;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        .no-results h2 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .no-results p {
            color: #666;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .filters {
                grid-template-columns: 1fr;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

                icon: "icons/41.png",
                ogrenmeAlani: "Dinleme",
                tema: "Köklerden Geleceğe",
                seviye: "Dinler",
                yas: "11-16 Yaş",
                ogretmen: "Esra YARDIMCI",
                url: "files/41/index.html"
            }
];

        let filteredEtkinlikler = [...etkinlikler];

        function createCard(etkinlik) {
            return `
                <div class="card" onclick="openActivity('${etkinlik.url}')">
                    <div class="card-header">
                        <div class="card-icon">
                            <img src="${etkinlik.icon}" alt="${etkinlik.baslik}">
                        </div>
                        <div class="card-title">${etkinlik.baslik}</div>
                    </div>
                    <div class="card-tags">
                        <span class="tag ogrenme">${etkinlik.ogrenmeAlani}</span>
                        <span class="tag tema">${etkinlik.tema}</span>
                        <span class="tag seviye">${etkinlik.seviye}</span>
                        <span class="tag yas">${etkinlik.yas}</span>
                    </div>
                    <div class="card-footer">
                 <span class="teacher-icon">
  <img src="https://ulkemyanimda.github.io/araclar/logos/orjinal.svg" alt="logo" style="width:60px; height:15px; vertical-align:middle;">
</span>
                        <span>${etkinlik.ogretmen}</span>
                    </div>
                </div>
            `;
        }

        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            
            if (filteredEtkinlikler.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <h2>Sonuç Bulunamadı</h2>
                        <p>Seçtiğiniz kriterlere uygun etkinlik bulunamadı. Lütfen filtreleri değiştirin.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredEtkinlikler.map(createCard).join('');
        }

        function filterActivities() {
            const ogrenmeAlani = document.getElementById('ogrenmeAlani').value;
            const tema = document.getElementById('tema').value;
            const seviye = document.getElementById('seviye').value;
            const yas = document.getElementById('yas').value;

            filteredEtkinlikler = etkinlikler.filter(etkinlik => {
                return (
                    (!ogrenmeAlani || etkinlik.ogrenmeAlani === ogrenmeAlani) &&
                    (!tema || etkinlik.tema === tema) &&
                    (!seviye || etkinlik.seviye === seviye) &&
                    (!yas || etkinlik.yas === yas)
                );
            });

            renderCards();
        }

        function resetFilters() {
            document.getElementById('ogrenmeAlani').value = '';
            document.getElementById('tema').value = '';
            document.getElementById('seviye').value = '';
            document.getElementById('yas').value = '';
            filteredEtkinlikler = [...etkinlikler];
            renderCards();
        }

        function openActivity(url) {
            window.open(url, '_blank');
        }

        // Filtre değişikliklerini dinle
        document.getElementById('ogrenmeAlani').addEventListener('change', filterActivities);
        document.getElementById('tema').addEventListener('change', filterActivities);
        document.getElementById('seviye').addEventListener('change', filterActivities);
        document.getElementById('yas').addEventListener('change', filterActivities);

        // Sayfa yüklendiğinde kartları göster
        renderCards();
    </script>
	
	
	
	
	
	
	
	

	
	
</body>
</html>

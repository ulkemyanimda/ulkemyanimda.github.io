<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>iframe içerik görüntüleyici</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        iframe {
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe style="max-width:100%" src="New.html" width="1200" height="1000" frameborder="0" allowfullscreen></iframe>
    </div>
</body>
</html>

<!doctype html>
<html lang="tr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karga ile Bülbül - Masal Kitabı</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vollkorn:ital,wght@0,400;0,700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #F4F1EA;
      --page-color: #FFFFFF;
      --text-color: #2C1E12;
      --accent-color: #5D4037;
      --secondary: #A1887F;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      overflow: hidden;
    }

    .story-font { font-family: 'Vollkorn', serif; }

    /* Sayfa Çevirme Animasyonu */
    .page-flip-enter {
      animation: flipIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    
    @keyframes flipIn {
      from { opacity: 0; transform: rotateY(-15deg) translateX(30px); }
      to { opacity: 1; transform: rotateY(0) translateX(0); }
    }

    .book-container {
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 
                  inset 5px 0 15px rgba(0,0,0,0.05);
      border-radius: 4px 12px 12px 4px;
      background: var(--page-color);
      position: relative;
    }

    .book-container::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 15px;
      background: linear-gradient(90deg, rgba(0,0,0,0.1) 0%, rgba(255,255,255,0.5) 50%, rgba(0,0,0,0.05) 100%);
      z-index: 10;
      border-radius: 4px 0 0 4px;
    }

    .media-frame {
      aspect-ratio: 16 / 9;
      width: 100%;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      background: #eee;
    }

    .media-frame img, .media-frame video {
      width: 100%; height: 100%; object-fit: cover;
    }

    .dropcap::first-letter {
      font-size: 3.5rem;
      float: left;
      line-height: 1;
      margin-right: 10px;
      color: var(--accent-color);
      font-weight: 700;
      font-family: 'Vollkorn', serif;
    }

    .btn-nav {
      transition: all 0.2s;
      background: var(--accent-color);
    }
    .btn-nav:hover { transform: scale(1.05); opacity: 0.9; }
    .btn-nav:disabled { opacity: 0.3; transform: none; cursor: not-allowed; }

    .ornament {
      color: var(--secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
    }
    .ornament::before, .ornament::after {
      content: '';
      height: 1px;
      flex: 1;
      background: var(--secondary);
      opacity: 0.3;
    }
  </style>
</head>
<body class="h-full flex items-center justify-center p-4 md:p-8">

  <div class="w-full max-w-4xl h-full max-h-[900px] flex flex-col">
    <div id="book" class="book-container flex-1 overflow-hidden flex flex-col page-flip-enter">
      <div id="pageContent" class="flex-1 overflow-y-auto p-6 md:p-12">
        </div>

      <div class="p-4 bg-stone-50 border-t border-stone-200 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <button id="prevBtn" class="btn-nav text-white px-6 py-2 rounded-full text-sm font-bold flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg> Geri
            </button>
            
            <button id="fullscreenBtn" class="btn-nav text-white p-2 rounded-full flex items-center justify-center" title="Tam Ekran">
                <svg id="fsIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                </svg>
            </button>
        </div>
        
        <div class="text-xs font-bold uppercase tracking-widest text-stone-400">
          <span id="pageNumber">1</span> / <span id="totalPages">1</span>
        </div>

        <button id="nextBtn" class="btn-nav text-white px-6 py-2 rounded-full text-sm font-bold flex items-center">
          İleri <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const pages = [
      {
        type: 'cover',
        image: 'kapak.jpg',
        title: 'Karga ile Bülbül',
        subtitle: 'Bir Dostluk ve İbret Hikayesi',
        text: ''
      },
      {
        type: 'story',
        image: '1.jpg',
        text: 'Bir varmış, bir yokmuş. Evvel zaman içinde, kalbur saman içinde. Develer tellal, pireler berber iken, ben annemin beşiğini tingir mingir sallar iken, uzak diyarların birinde bir bülbül ile karga varmış. <br><br> Bülbülün sesi dört bir yana nam salmış. O kadar güzelmiş ki ötüşü.'
      },
      {
        type: 'story',
        video: '2.mp4',
        text: 'Ancak kargada bu yetenek yokmuş. Zamanla bu durum kara kargayı üzmeye başlamış. Karganın bu durumunu anlayan annesi ona nasihatlerde bulunmuş:',
        quote: 'Oğlum, ne gerek var bu kadar üzülmene. Sen sahip olduklarınla daha güzelsin. Sana lütfedilenden başkasını elde edemezsin.'
      },
      {
        type: 'story',
        image: '3.jpg',
        text: 'Karga kafasına koymuş bir kere. Diyar diyar gezerek sesini düzeltecek iksiri bulmaya karar vermiş. Annesinin öğütlerine, yalvarıp yakarmalarına aldırış etmeden yola koyulmuş.'
      },
      {
        type: 'story',
        image: '4.jpg',
        text: 'Yolda bir baykuşa rastlamış, derdini anlatmış. Ancak baykuş kargaları sevmediği gibi diğer kuşları da sevmez, kıskanırmış. Bu duygularla baykuş, kargaya şöyle demiş:',
        quote: 'Karga kardeş, bunun çaresi şu dağın arkasındaki sihirli derede saklı. Gidip o deredeki sudan içersen dileğine kavuşursun.',
        extra: 'Baykuşun söylediği bu sözlerin aslı yokmuş. Zira o derede öyle bir tesir varmış ki derenin suyunu içen konuşursa susar ve suyu içenin konuşan ağzı mühürlenirmiş.'
      },
      {
        type: 'story',
        image: '5.jpg',
        text: 'Karga da bu durumdan habersiz az gitmiş, uz gitmiş, dere tepe düz gitmiş, sihirli dereye varmış. Heyecanla gagasını daldırmış ve kana kana içmiş suyundan. <br><br> Karga sudan içmiş ama ne fayda. Sesinin güzelleşmesini beklerken sonuç istediği gibi olmamış, aksine o beğenmediği sesini de kaybetmiş. Çaresizlikler içinde annesinin yanına varmış.'
      },
      {
        type: 'story',
        image: '6.jpg',
        text: 'Annesi karganın bu durumuna üzülerek şöyle demiş:',
        quote: 'Oğlum, ben sana demedim mi? Elindeki ile yetinmeyi bil, bilmez isen onları da kaybedersin. Her şeyin değerini kaybetmeden önce bil. Sen kargasın, sesin karga gibi olmalı. Sana en çok senin olan yakışır.',
        extra: 'Karga da bu durumdan çok pişman olsa da bundan sonraki hayatına elindekilerin değerini bilerek devam etmiş.',
        isEnd: true
      }
    ];

    let currentPage = 0;

    function renderPage() {
      const page = pages[currentPage];
      const container = document.getElementById('pageContent');
      const bookElement = document.getElementById('book');
      
      bookElement.classList.remove('page-flip-enter');
      void bookElement.offsetWidth; 
      bookElement.classList.add('page-flip-enter');

      let contentHtml = '';

      if (page.type === 'cover') {
        contentHtml = `
          <div class="h-full flex flex-col items-center justify-center text-center space-y-8">
            <div class="media-frame max-w-md border-4 border-stone-100">
              <img src="${page.image}" alt="Kapak">
            </div>
            <div>
              <h1 class="story-font text-4xl md:text-6xl font-bold text-stone-800 tracking-tight">${page.title}</h1>
              <div class="ornament"><span>❧</span></div>
              <p class="text-stone-500 italic text-xl">${page.subtitle}</p>
            </div>
          </div>
        `;
      } else {
        const mediaHtml = page.video 
          ? `<video controls class="w-full h-full"><source src="${page.video}" type="video/mp4"></video>`
          : `<img src="${page.image}" alt="Hikaye Görseli">`;

        contentHtml = `
          <div class="space-y-6">
            <div class="media-frame">${mediaHtml}</div>
            <div class="story-font text-lg md:text-xl leading-relaxed dropcap">
              ${page.text}
            </div>
            ${page.quote ? `
              <div class="pl-6 border-l-4 border-stone-300 italic text-stone-600 my-6 py-2 story-font text-xl">
                "${page.quote}"
              </div>
            ` : ''}
            ${page.extra ? `<div class="story-font text-lg text-stone-700">${page.extra}</div>` : ''}
            ${page.isEnd ? `
              <div class="text-center pt-8">
                <div class="ornament"><span>SON</span></div>
              </div>
            ` : ''}
          </div>
        `;
      }

      container.innerHTML = contentHtml;
      document.getElementById('pageNumber').textContent = currentPage + 1;
      document.getElementById('totalPages').textContent = pages.length;
      document.getElementById('prevBtn').disabled = currentPage === 0;
      document.getElementById('nextBtn').disabled = currentPage === pages.length - 1;
      
      container.scrollTop = 0;
    }

    // Navigasyon Olayları
    document.getElementById('nextBtn').addEventListener('click', () => {
      if (currentPage < pages.length - 1) {
        currentPage++;
        renderPage();
      }
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentPage > 0) {
        currentPage--;
        renderPage();
      }
    });

    // Klavye desteği
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
      if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
      if (e.key === 'f' || e.key === 'F') toggleFullscreen();
    });

    // Tam Ekran Fonksiyonu
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const fsIcon = document.getElementById('fsIcon');

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          console.error(`Tam ekran hatası: ${err.message}`);
        });
      } else {
        document.exitFullscreen();
      }
    }

    fullscreenBtn.addEventListener('click', toggleFullscreen);

    // İkon Değişimi İzleyici
    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) {
        // Çıkış İkonu (X veya Küçültme)
        fsIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />';
      } else {
        // Tam Ekran İkonu
        fsIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />';
      }
    });

    renderPage();
  </script>
</body>
</html>

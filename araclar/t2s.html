<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Türkçe Metin Seslendirme (Hız Ayarlı)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .container {
            background: white; border-radius: 20px; padding: 40px;
            max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #667eea; text-align: center; margin-bottom: 25px; }
        textarea {
            width: 100%; padding: 15px; border: 2px solid #e0e0e0;
            border-radius: 10px; min-height: 120px; margin-bottom: 20px;
        }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; }
        .control-group { flex: 1; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 2px solid #e0e0e0; }
        .buttons { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 15px; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-play { background: #667eea; color: white; }
        .btn-download { background: #48bb78; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .status { margin-top: 15px; text-align: center; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎙️ Seslendirici</h1>
    
    <label>Metniniz:</label>
    <textarea id="textInput">Merhaba! Bu bir Türkçe metin okuma uygulamasıdır.</textarea>

    <div class="controls">
        <div class="control-group">
            <label>Hız Seviyesi:</label>
            <select id="speedSelect">
                <option value="0.5">Çok Yavaş</option>
                <option value="0.75">Yavaş</option>
                <option value="1" selected>Normal</option>
                <option value="1.25">Hızlı</option>
                <option value="1.5">Çok Hızlı</option>
            </select>
        </div>
    </div>

    <div class="buttons">
        <button id="playBtn" class="btn-play">🔊 Dinle</button>
        <button id="downloadBtn" class="btn-download">⬇️ İndir (MP3)</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script>
    const textInput = document.getElementById('textInput');
    const speedSelect = document.getElementById('speedSelect');
    const playBtn = document.getElementById('playBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const status = document.getElementById('status');

    // 1. DİNLEME (Tarayıcı Motoru)
    playBtn.addEventListener('click', () => {
        const text = textInput.value.trim();
        if(!text) return;

        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'tr-TR';
        utterance.rate = parseFloat(speedSelect.value); // Hız ayarı burada
        
        speechSynthesis.speak(utterance);
        status.innerText = "Oynatılıyor...";
    });

    // 2. İNDİRME (Google TTS Proxy)
    downloadBtn.addEventListener('click', async () => {
        const text = textInput.value.trim();
        if(!text) {
            status.innerText = "⚠️ Lütfen metin girin!";
            return;
        }

        status.innerText = "⏳ Dosya hazırlanıyor...";
        
        // Google TTS hız parametresi: normal 1'dir. 
        // Ancak API tarafında hız genellikle 0 ile 1 arası veya farklı katsayılarla çalışır.
        // Google translate_tts için 'speed' parametresi genelde 0.24 gibi değerler alır ama
        // en stabil yöntem q, tl ve ttsspeed parametrelerini kullanmaktır.
        
        const speed = speedSelect.value;
        // Not: Google'ın bu public API'si hız konusunda bazen kısıtlıdır.
        const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=tr&total=1&idx=0&textlen=${text.length}&client=tw-ob&ttsspeed=${speed}`;

        try {
            const response = await fetch(ttsUrl);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `ses-hiz-${speed}.mp3`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            
            status.innerText = "✅ Başarıyla indirildi!";
        } catch (err) {
            status.innerText = "❌ Bir hata oluştu. Sağ tıkla farklı kaydetmeyi deneyin.";
            window.open(ttsUrl, '_blank');
        }
    });
</script>

</body>
</html>

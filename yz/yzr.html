<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğitim İçin Yapay Zekâ Rehberi</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800">

    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white py-12 px-6 shadow-lg">
        <div class="max-w-6xl mx-auto text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">
                Eğitim İçin Yapay Zekâ Rehberi
            </h1>
            <p class="text-lg md:text-xl text-blue-100 max-w-2xl mx-auto">
                Hangi iş için hangi aracı kullanmalısınız? Etkileşimli ders materyallerinden, 
                otomatik notlandırmaya kadar öğretmenler için derlenmiş yapay zekâ ekosistemi.
            </p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto py-8 px-4">
        
        <!-- Search and Filter Controls -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <!-- Search Bar -->
            <div class="relative w-full md:w-1/3">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-search text-slate-400"></i>
                </div>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Araç adı veya kullanım amacı ara..."
                    class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                />
            </div>

            <!-- Category Buttons Container -->
            <div id="categoryButtons" class="flex flex-wrap justify-center gap-2 w-full md:w-2/3">
                <!-- Buttons will be generated by JavaScript -->
            </div>
        </div>

        <!-- Tools Grid -->
        <div id="toolsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Tool cards will be generated by JavaScript -->
        </div>

    </main>

    <script>
        // İki belgeden derlenen yapay zeka araçları veritabanı
        const toolsData = [
            { id: 1, name: "ChatGPT", category: "Sohbet & Metin", purpose: "Genel metin üretimi, planlama, soru hazırlama", strongPoint: "En yaygın LLM, geniş kullanım ve güçlü özelleştirme.", icon: "fas fa-comment-dots" },
            { id: 2, name: "Gemini", category: "Sohbet & Metin", purpose: "Metin, kod, fikir üretimi ve infografik", strongPoint: "Google ekosistemine entegre (Drive, Slaytlar). İnfografik üretiminde çok başarılı.", icon: "fas fa-comment-dots" },
            { id: 3, name: "Claude", category: "Sohbet & Metin", purpose: "Uzun metin işleme ve belge analizi", strongPoint: "Belge yükleyip içerik üretmede ve sunum taslağı çıkarmada tercih edilir. Halüsinasyon riski düşüktür.", icon: "fas fa-comment-dots" },
            { id: 4, name: "DeepSeek", category: "Sohbet & Metin", purpose: "Açık model alternatif metin üretimi", strongPoint: "Ücretsiz erişim olanakları geniştir.", icon: "fas fa-comment-dots" },
            { id: 5, name: "MagicSchool.ai", category: "Eğitime Özel", purpose: "Ders planı, BEP, veli iletişimi, etkinlik hazırlama", strongPoint: "60+ özel araç. Öğretmenler arasında en popüler platform.", icon: "fas fa-book-open" },
            { id: 6, name: "Eduaide.ai", category: "Eğitime Özel", purpose: "İçerik çeşitlendirme ve uyarlama", strongPoint: "Materyalleri farklı öğrenme stilleri ve seviyelerine göre uyarlar.", icon: "fas fa-book-open" },
            { id: 7, name: "Almanack", category: "Eğitime Özel", purpose: "Makro planlama (Müfredat, ünite planı)", strongPoint: "Tek ders saatinin ötesine geçer, haftalık akış planlar.", icon: "fas fa-book-open" },
            { id: 8, name: "SchoolAI", category: "Eğitime Özel", purpose: "Güvenli öğrenci-YZ etkileşimi", strongPoint: "Öğretmen sınırları belirler, odakta öğrenci vardır.", icon: "fas fa-book-open" },
            { id: 9, name: "Gamma App", category: "Sunum & Video", purpose: "Hızlı sunum, web sayfası ve belge oluşturma", strongPoint: "Tek satır istemle profesyonel sunum tasarımı. Tasarım YZ'ye kalır.", icon: "fas fa-play-circle" },
            { id: 10, name: "Curipod", category: "Sunum & Video", purpose: "Etkileşimli ders ve sunumlar", strongPoint: "Hazır sunumları quiz, kelime bulutu gibi etkinliklerle interaktif hale getirir.", icon: "fas fa-play-circle" },
            { id: 11, name: "CapCut", category: "Sunum & Video", purpose: "Video düzenleme ve altyazı", strongPoint: "Arka plan kaldırma ve otomatik altyazı ekleme.", icon: "fas fa-play-circle" },
            { id: 12, name: "HeyGen", category: "Sunum & Video", purpose: "Konuşan kafa (avatar) videoları", strongPoint: "Gerçekçi avatar ve dudak senkronizasyonu.", icon: "fas fa-play-circle" },
            { id: 13, name: "Leonardo.ai", category: "Görsel Üretimi", purpose: "Kaliteli illüstrasyonlar ve fen görselleri", strongPoint: "Yüksek kaliteli, tutarlı ders kitabı illüstrasyonları için ideal.", icon: "fas fa-image" },
            { id: 14, name: "Ideogram.ai", category: "Görsel Üretimi", purpose: "Üzerinde yazı olan görseller", strongPoint: "Görsel İÇİNE METİN yazmada rakipsiz. Poster tasarımları için harika.", icon: "fas fa-image" },
            { id: 15, name: "Recraft.ai", category: "Görsel Üretimi", purpose: "Vektör grafik ve ikon üretimi", strongPoint: "Ölçeklenebilir vektörel tasarımda uzman.", icon: "fas fa-image" },
            { id: 16, name: "Canva (Yapay Zeka)", category: "Görsel Üretimi", purpose: "Genel tasarım, sunum ve görsel üretimi", strongPoint: "Öğretmen dostu arayüz, hazır şablonlar ve tek tıkla Sihirli İçerik.", icon: "fas fa-image" },
            { id: 17, name: "ElevenLabs", category: "Ses & Müzik", purpose: "Metinden seslendirme (Dinleme metinleri)", strongPoint: "En doğal insan sesi ve ses klonlama özelliği.", icon: "fas fa-music" },
            { id: 18, name: "Suno", category: "Ses & Müzik", purpose: "Konuya uygun şarkı besteleme", strongPoint: "Saniyeler içinde sözlü/sözsüz şarkı üretir (Eğitsel tekerlemeler için ideal).", icon: "fas fa-music" },
            { id: 19, name: "Google AI Studio", category: "Ses & Müzik", purpose: "Karakter sesi ve yönerge okutma", strongPoint: "Farklı duygularda ses sentezleme (örn. sevecen çocuk sesi).", icon: "fas fa-music" },
            { id: 20, name: "Conker", category: "Ölçme & Değerlendirme", purpose: "Test ve boşluk doldurma soruları", strongPoint: "Hızlıca Google Forms'a aktarım sağlar.", icon: "fas fa-check-circle" },
            { id: 21, name: "Brisk Teaching", category: "Ölçme & Değerlendirme", purpose: "Geri bildirim ve intihal tespiti", strongPoint: "Chrome eklentisi ile Google Docs'ta anlık geri bildirim verir.", icon: "fas fa-check-circle" },
            { id: 22, name: "Gradescope", category: "Ölçme & Değerlendirme", purpose: "Sınav okuma ve notlandırma", strongPoint: "El yazısı sınavlar dahil grup notlandırma (Üniversite düzeyinde de yaygın).", icon: "fas fa-check-circle" },
            { id: 23, name: "NotebookLM", category: "Belge Analizi", purpose: "Kaynaklara dayalı araştırma, test ve slayt üretimi", strongPoint: "SADECE sizin yüklediğiniz kaynaklara odaklanır, halüsinasyon riski sıfıra yakındır.", icon: "fas fa-file-alt" },
            { id: 24, name: "H5P / Wordwall", category: "Etkileşimli İçerik", purpose: "Eşleştirme, sürükle-bırak, quiz oyunları", strongPoint: "Üretilen fikirleri ve görselleri öğrencinin dokunabileceği oyunlara dönüştürür.", icon: "fas fa-mouse-pointer" },
            { id: 25, name: "Google Stitch", category: "Etkileşimli İçerik", purpose: "Hızlı web prototipi ve UI tasarlama", strongPoint: "İstediğiniz masaüstü web deneyimini/oyun arayüzünü anında kodlayıp gösterir.", icon: "fas fa-mouse-pointer" }
        ];

        const categories = ["Tümü", "Sohbet & Metin", "Eğitime Özel", "Görsel Üretimi", "Sunum & Video", "Ses & Müzik", "Etkileşimli İçerik", "Ölçme & Değerlendirme", "Belge Analizi"];

        // State
        let activeCategory = "Tümü";
        let searchTerm = "";

        // DOM Elements
        const toolsGrid = document.getElementById('toolsGrid');
        const categoryButtonsContainer = document.getElementById('categoryButtons');
        const searchInput = document.getElementById('searchInput');

        // Initialize App
        function init() {
            renderCategories();
            renderTools();
            
            // Search Event Listener
            searchInput.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderTools();
            });
        }

        // Render Category Buttons
        function renderCategories() {
            categoryButtonsContainer.innerHTML = '';
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.textContent = cat;
                
                // Determine classes based on active state
                if (activeCategory === cat) {
                    btn.className = "px-4 py-2 rounded-full text-sm font-medium transition-all bg-blue-600 text-white shadow-md transform scale-105";
                } else {
                    btn.className = "px-4 py-2 rounded-full text-sm font-medium transition-all bg-white text-slate-600 border border-slate-200 hover:bg-slate-100";
                }
                
                // Click Event
                btn.addEventListener('click', () => {
                    activeCategory = cat;
                    renderCategories(); // Re-render buttons to update styles
                    renderTools();      // Re-render tools grid
                });
                
                categoryButtonsContainer.appendChild(btn);
            });
        }

        // Render Tool Cards
        function renderTools() {
            toolsGrid.innerHTML = '';
            
            // Filter Data
            const filteredTools = toolsData.filter(tool => {
                const matchesCategory = activeCategory === "Tümü" || tool.category === activeCategory;
                const matchesSearch = tool.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                      tool.purpose.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            // Empty State
            if (filteredTools.length === 0) {
                toolsGrid.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-100 text-slate-400 mb-4">
                            <i class="fas fa-search text-2xl"></i>
                        </div>
                        <h3 class="text-xl font-medium text-slate-600">Aradığınız kritere uygun araç bulunamadı.</h3>
                        <p class="text-slate-500 mt-2">Lütfen farklı bir arama terimi veya kategori deneyin.</p>
                    </div>
                `;
                return;
            }

            // Generate Cards
            filteredTools.forEach(tool => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl p-6 shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col h-full";
                
                card.innerHTML = `
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center shrink-0">
                            <i class="${tool.icon} text-xl"></i>
                        </div>
                        <div>
                            <h3 class="text-xl font-bold text-slate-800">${tool.name}</h3>
                            <span class="inline-block px-2 py-1 bg-indigo-50 text-indigo-600 text-xs font-semibold rounded-md mt-1">
                                ${tool.category}
                            </span>
                        </div>
                    </div>
                    
                    <div class="flex-grow">
                        <div class="mb-4">
                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Ne İçin Kullanılır?</h4>
                            <p class="text-slate-700 text-sm leading-relaxed">
                                ${tool.purpose}
                            </p>
                        </div>
                        
                        <div class="bg-slate-50 p-3 rounded-lg border border-slate-100 mt-auto">
                            <h4 class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-1">Güçlü Yönü / Püf Noktası</h4>
                            <p class="text-slate-600 text-sm">
                                ${tool.strongPoint}
                            </p>
                        </div>
                    </div>
                `;
                
                toolsGrid.appendChild(card);
            });
        }

        // Run the app
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>2026 - 2027 Çalışma Takvimi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --cream:#FBF6EC;
    --paper:#FFFFFF;
    --ink:#1F2A24;
    --pine:#1E3D32;
    --pine-light:#2E5A48;
    --gold:#C7A34C;
    --terra:#B23A2E;
    --sky:#3E6E8E;
    --line:#E4DCC8;
    --muted:#8A8270;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Georgia', 'Iowan Old Style', serif;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- HEADER ---------- */
  header.top{
    background:var(--pine);
    color:var(--cream);
    padding:38px 6vw 30px;
    position:relative;
    overflow:hidden;
    border-bottom:6px solid var(--gold);
  }
  header.top::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 90% -10%, rgba(199,163,76,.18), transparent 55%),
      radial-gradient(circle at 5% 120%, rgba(199,163,76,.12), transparent 50%);
    pointer-events:none;
  }
  .top-inner{
    display:flex;
    align-items:center;
    gap:26px;
    max-width:1180px;
    margin:0 auto;
    position:relative;
  }
.logo-slot{
    width:90px;
    height:90px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff;
    border-radius:14px;
    padding:8px;
}

.logo-slot .logo{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}
  .title-block .eyebrow{
    text-transform:uppercase;
    letter-spacing:.22em;
    font-size:12px;
    color:var(--gold);
    font-family:Georgia, serif;
    margin-bottom:6px;
  }
  .title-block h1{
    margin:0;
    font-size:clamp(28px, 4vw, 42px);
    font-weight:400;
    letter-spacing:.01em;
  }
  .title-block p{
    margin:8px 0 0;
    color:rgba(251,246,236,.75);
    font-size:15px;
  }

  /* ---------- LEGEND ---------- */
  .legend{
    max-width:1180px;
    margin:26px auto 0;
    padding:0 6vw;
    display:flex;
    flex-wrap:wrap;
    gap:10px 22px;
  }
  .legend-item{
    display:flex;
    align-items:center;
    gap:9px;
    font-size:13.5px;
    color:var(--ink);
  }
  .swatch{
    width:14px;height:14px;border-radius:4px;flex-shrink:0;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);
  }
  .swatch.school{background:var(--pine-light);}
  .swatch.holiday{background:var(--terra);}
  .swatch.atolye{background:var(--gold);}
  .swatch.yariyil{background:var(--sky);}
  .legend-note{
    font-size:12.5px;
    color:var(--muted);
    font-style:italic;
  }

  /* ---------- CALENDAR GRID ---------- */
  main{
    max-width:1180px;
    margin:0 auto;
    padding:34px 6vw 70px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
    gap:26px;
  }

  .month{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:16px;
    padding:20px 18px 22px;
    box-shadow:0 1px 2px rgba(31,42,36,.03);
  }
  .month-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:14px;
    padding-bottom:10px;
    border-bottom:1px solid var(--line);
  }
  .month-head h2{
    margin:0;
    font-size:18px;
    font-weight:600;
    color:var(--pine);
    letter-spacing:.01em;
  }
  .month-head span{
    font-size:11.5px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.1em;
  }

  .dow{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    margin-bottom:4px;
  }
  .dow div{
    text-align:center;
    font-size:10.5px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.06em;
    padding-bottom:6px;
  }

  .days{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:4px;
  }
  .day{
    aspect-ratio:1/1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    border-radius:8px;
    color:var(--ink);
    position:relative;
  }
  .day.empty{visibility:hidden;}

  .day.marked{
    cursor:pointer;
    color:#fff;
    font-weight:600;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .day.marked:hover{
    transform:translateY(-2px) scale(1.06);
    box-shadow:0 4px 10px rgba(0,0,0,.18);
  }
  .day.marked:focus-visible{
    outline:3px solid var(--gold);
    outline-offset:2px;
  }

  .day.school{background:var(--pine-light);}
  .day.holiday{background:var(--terra);}
  .day.atolye{background:var(--gold); color:var(--ink);}
  .day.yariyil{background:var(--sky);}

  .day.range-start{border-top-left-radius:8px;border-bottom-left-radius:8px;}
  .day.range-end{border-top-right-radius:8px;border-bottom-right-radius:8px;}

  /* ---------- MODAL ---------- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(20,28,24,.55);
    backdrop-filter:blur(2px);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:50;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--paper);
    max-width:420px;
    width:100%;
    border-radius:16px;
    padding:28px 26px 24px;
    position:relative;
    border-top:6px solid var(--gold);
    box-shadow:0 20px 50px rgba(0,0,0,.25);
    animation:rise .18s ease;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }
  .modal .tag{
    display:inline-block;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.1em;
    color:var(--gold);
    margin-bottom:10px;
    font-family:Georgia, serif;
  }
  .modal h3{
    margin:0 0 6px;
    font-size:21px;
    color:var(--pine);
    font-weight:600;
  }
  .modal .dates{
    font-size:13.5px;
    color:var(--muted);
    margin-bottom:14px;
  }
  .modal p.desc{
    font-size:14.5px;
    line-height:1.6;
    color:var(--ink);
    margin:0;
  }
  .modal .close{
    position:absolute;
    top:14px; right:16px;
    border:none;
    background:none;
    font-size:20px;
    color:var(--muted);
    cursor:pointer;
    line-height:1;
  }
  .modal .close:hover{color:var(--ink);}

  footer{
    text-align:center;
    padding:24px 6vw 40px;
    font-size:12.5px;
    color:var(--muted);
  }

  @media (max-width:480px){
    .top-inner{flex-direction:column; text-align:center; gap:14px;}
    main{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
<div class="logo-slot">
  <img
    src="https://ulkemyanimda.github.io/araclar/icons/uy.png"
    alt="Ülkem Yanımda"
    class="logo"
  >
</div>
    <div class="title-block">
      <div class="eyebrow">2026 — 2027</div>
      <h1>Çalışma Takvimi</h1>
      <p>14 Eylül 2026 – 27 Haziran 2027 · işaretli günlere tıklayarak detayları görüntüleyin</p>
    </div>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><span class="swatch school"></span> Eğitim - Öğretim</div>
  <div class="legend-item"><span class="swatch holiday"></span> Resmi / Dini Bayram Tatili</div>
  <div class="legend-item"><span class="swatch atolye"></span> Atölye</div>
  <div class="legend-item"><span class="swatch yariyil"></span> Yarıyıl Tatili</div>
  <div class="legend-note">Atölye isimleri yakında eklenecektir.</div>
</div>

<main id="calendar"></main>

<footer>Ülkem Yanım — 2026/2027 Eğitim-Öğretim Yılı Çalışma Takvimi</footer>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close" id="closeBtn" aria-label="Kapat">&times;</button>
    <div class="tag" id="modalTag">Etkinlik</div>
    <h3 id="modalTitle"></h3>
    <div class="dates" id="modalDates"></div>
    <p class="desc" id="modalDesc"></p>
  </div>
</div>

<script>
const monthNames = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const dowNames = ["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];

// Aylar: {year, month(0-11)}
const monthsToShow = [
  {y:2026,m:8},{y:2026,m:9},{y:2026,m:10},{y:2026,m:11},
  {y:2027,m:0},{y:2027,m:1},{y:2027,m:2},{y:2027,m:3},{y:2027,m:4},{y:2027,m:5}
];

// Etkinlik tanımları
function d(y,m,day){ return new Date(y,m,day).getTime(); }

const events = [
  {
    start:d(2026,8,14), end:d(2026,8,14),
    type:"school", tag:"Başlangıç",
    title:"Eğitim - Öğretim Başlangıcı",
    desc:"2026-2027 eğitim-öğretim yılı 14 Eylül 2026 tarihinde başlamaktadır."
  },
  {
    start:d(2026,10,16), end:d(2026,10,22),
    type:"atolye", tag:"Atölye",
    title:"Atölye Çalışması",
    desc:"16-22 Kasım 2026 tarihleri arasında atölye çalışması düzenlenecektir. (Atölye adı yakında eklenecek)"
  },
  {
    start:d(2027,0,25), end:d(2027,0,31),
    type:"atolye", tag:"Atölye",
    title:"Atölye Çalışması",
    desc:"25-31 Ocak 2027 tarihleri arasında atölye çalışması düzenlenecektir. (Atölye adı yakında eklenecek)"
  },
  {
    start:d(2027,1,1), end:d(2027,1,7),
    type:"yariyil", tag:"Tatil",
    title:"Yarıyıl Tatili",
    desc:"1-7 Şubat 2027 tarihleri arasında yarıyıl tatili uygulanacaktır."
  },
  {
    start:d(2027,2,8), end:d(2027,2,11),
    type:"holiday", tag:"Dini Bayram",
    title:"Ramazan Bayramı Tatili",
    desc:"8-11 Mart 2027 tarihleri arasında Ramazan Bayramı tatili uygulanacaktır."
  },
  {
    start:d(2027,2,12), end:d(2027,2,14),
    type:"atolye", tag:"Atölye",
    title:"Atölye Çalışması",
    desc:"12-14 Mart 2027 tarihleri arasında atölye çalışması düzenlenecektir. (Atölye adı yakında eklenecek)"
  },
  {
    start:d(2027,4,15), end:d(2027,4,19),
    type:"holiday", tag:"Dini Bayram",
    title:"Kurban Bayramı Tatili",
    desc:"15-19 Mayıs 2027 tarihleri arasında Kurban Bayramı tatili uygulanacaktır."
  },
  {
    start:d(2027,4,20), end:d(2027,4,21),
    type:"atolye", tag:"Atölye",
    title:"Atölye Çalışması",
    desc:"20-21 Mayıs 2027 tarihleri arasında atölye çalışması düzenlenecektir. (Atölye adı yakında eklenecek)"
  },
  {
    start:d(2027,5,27), end:d(2027,5,27),
    type:"school", tag:"Bitiş",
    title:"Eğitim - Öğretim Bitişi",
    desc:"2026-2027 eğitim-öğretim yılı 27 Haziran 2027 tarihinde sona ermektedir."
  }
];

function findEvent(timestamp){
  return events.find(e => timestamp >= e.start && timestamp <= e.end);
}

function formatDateRange(start, end){
  const opts = {day:"numeric", month:"long", year:"numeric"};
  const s = new Date(start), eD = new Date(end);
  if(start === end){
    return s.toLocaleDateString('tr-TR', opts);
  }
  if(s.getMonth() === eD.getMonth() && s.getFullYear() === eD.getFullYear()){
    return `${s.getDate()} - ${eD.toLocaleDateString('tr-TR', opts)}`;
  }
  return `${s.toLocaleDateString('tr-TR', opts)} - ${eD.toLocaleDateString('tr-TR', opts)}`;
}

const cal = document.getElementById('calendar');

monthsToShow.forEach(({y,m}) => {
  const monthEl = document.createElement('div');
  monthEl.className = 'month';

  const head = document.createElement('div');
  head.className = 'month-head';
  head.innerHTML = `<h2>${monthNames[m]}</h2><span>${y}</span>`;
  monthEl.appendChild(head);

  const dowRow = document.createElement('div');
  dowRow.className = 'dow';
  dowNames.forEach(dn => {
    const c = document.createElement('div');
    c.textContent = dn;
    dowRow.appendChild(c);
  });
  monthEl.appendChild(dowRow);

  const daysGrid = document.createElement('div');
  daysGrid.className = 'days';

  const firstDay = new Date(y, m, 1);
  let startOffset = firstDay.getDay() - 1; // Pazartesi=0
  if(startOffset < 0) startOffset = 6;

  for(let i=0;i<startOffset;i++){
    const e = document.createElement('div');
    e.className = 'day empty';
    daysGrid.appendChild(e);
  }

  const daysInMonth = new Date(y, m+1, 0).getDate();
  for(let day=1; day<=daysInMonth; day++){
    const cell = document.createElement('div');
    cell.className = 'day';
    cell.textContent = day;

    const ts = d(y, m, day);
    const ev = findEvent(ts);

    if(ev){
      cell.classList.add('marked', ev.type);
      if(ts === ev.start) cell.classList.add('range-start');
      if(ts === ev.end) cell.classList.add('range-end');
      cell.tabIndex = 0;
      cell.setAttribute('role','button');
      cell.setAttribute('aria-label', ev.title);
      cell.addEventListener('click', () => openModal(ev));
      cell.addEventListener('keypress', (ke) => { if(ke.key === 'Enter') openModal(ev); });
    }

    daysGrid.appendChild(cell);
  }

  monthEl.appendChild(daysGrid);
  cal.appendChild(monthEl);
});

const overlay = document.getElementById('overlay');
const modalTag = document.getElementById('modalTag');
const modalTitle = document.getElementById('modalTitle');
const modalDates = document.getElementById('modalDates');
const modalDesc = document.getElementById('modalDesc');

function openModal(ev){
  modalTag.textContent = ev.tag;
  modalTitle.textContent = ev.title;
  modalDates.textContent = formatDateRange(ev.start, ev.end);
  modalDesc.textContent = ev.desc;
  overlay.classList.add('open');
}
function closeModal(){
  overlay.classList.remove('open');
}
document.getElementById('closeBtn').addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if(e.target === overlay) closeModal(); });
document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });
</script>

</body>
</html>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
        }

        .header-section {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 60px 20px;
        }

        .header-section h1 {
            margin: 0 0 15px 0;
            font-size: 2.5em;
        }

        .header-section p {
            margin: 0;
            font-size: 1.2em;
            color: #ecf0f1;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.5;
        }

        /* Grid container */
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        /* Card styles */
        .card {
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
        }

        /* Hover effect on card */
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        /* Image container and image */
        .card-image-wrapper {
            width: 100%;
            height: 220px;
            overflow: hidden;
            position: relative;
        }

        /* Overlay to make it look clickable */
        .card-image-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.1);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        .card:hover .card-image-wrapper::after {
            opacity: 1;
        }

        .card-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Zoom image on hover */
        .card:hover .card-image-wrapper img {
            transform: scale(1.08);
        }

        /* Play icon or link indicator optional */
        .icon-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background-color: rgba(52, 152, 219, 0.9);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .card:hover .icon-overlay {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Arrow icon SVG */
        .icon-overlay svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Card content */
        .card-content {
            padding: 25px 20px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: #ffffff;
            border-top: 1px solid #f0f0f0;
        }

        .card-content h3 {
            margin: 0;
            font-size: 1.3em;
            color: #2c3e50;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .card:hover .card-content h3 {
            color: #3498db;
        }
    </style>
</head>

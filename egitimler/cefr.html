<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEFR Seviye ve Beceri Rehberi</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            color: white;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        header p { opacity: 0.9; font-size: 1.1rem; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
        }

        /* Sidebar (Filtreler) */
        .sidebar {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .filter-group { margin-bottom: 2rem; }
        .filter-group h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-sub);
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .level-filters { display: flex; flex-wrap: wrap; gap: 8px; }
        
        .level-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        
        .level-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .level-btn.active { color: white; border-color: transparent; }
        
        /* Seviye Renkleri */
        .level-btn[data-level="A1 Öncesi"].active { background: #94a3b8; }
        .level-btn[data-level="A1"].active, .level-btn[data-level="A1+"].active { background: #10b981; }
        .level-btn[data-level="A2"].active, .level-btn[data-level="A2+"].active { background: #059669; }
        .level-btn[data-level="B1"].active, .level-btn[data-level="B1+"].active { background: #3b82f6; }
        .level-btn[data-level="B2"].active, .level-btn[data-level="B2+"].active { background: #2563eb; }
        .level-btn[data-level="C1"].active { background: #7c3aed; }
        .level-btn[data-level="C2"].active { background: #5b21b6; }

        .skill-list { display: flex; flex-direction: column; gap: 10px; }
        .skill-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .skill-item input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }

        /* Main Content */
        .main-content { min-height: 50vh; }
        
        .search-bar {
            width: 100%;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 1rem;
            margin-bottom: 1.5rem;
            outline: none;
            transition: border 0.2s;
        }
        .search-bar:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .stats { margin-bottom: 1rem; color: var(--text-sub); font-weight: 500; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border-top: 4px solid transparent;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
        }

        .card-skill { font-size: 0.9rem; color: var(--text-sub); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .card-text { font-size: 1rem; color: var(--text-main); flex-grow: 1; }

        /* Kart Renk Eşleştirmeleri */
        .card.level-a1-oncesi { border-top-color: #94a3b8; }
        .card.level-a1, .card.level-a1-plus { border-top-color: #10b981; }
        .card.level-a2, .card.level-a2-plus { border-top-color: #059669; }
        .card.level-b1, .card.level-b1-plus { border-top-color: #3b82f6; }
        .card.level-b2, .card.level-b2-plus { border-top-color: #2563eb; }
        .card.level-c1 { border-top-color: #7c3aed; }
        .card.level-c2 { border-top-color: #5b21b6; }

        .no-results { text-align: center; padding: 3rem; color: var(--text-sub); font-size: 1.2rem; grid-column: 1 / -1; }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .sidebar { position: static; }
        }
    </style>
</head>
<body>

<header>
    <h1>📘 CEFR Dil Yeterlilik Rehberi</h1>
    <p>Temel beceri ve seviyelere göre detaylı tanımlayıcılar</p>
</header>

<div class="container">
    <aside class="sidebar">
        <div class="filter-group">
            <h3>Seviye Filtresi</h3>
            <div class="level-filters" id="levelFilters">
                <button class="level-btn active" data-level="all">Tümü</button>
                <button class="level-btn" data-level="A1 Öncesi">A1 Öncesi</button>
                <button class="level-btn" data-level="A1">A1</button>
                <button class="level-btn" data-level="A1+">A1+</button>
                <button class="level-btn" data-level="A2">A2</button>
                <button class="level-btn" data-level="A2+">A2+</button>
                <button class="level-btn" data-level="B1">B1</button>
                <button class="level-btn" data-level="B1+">B1+</button>
                <button class="level-btn" data-level="B2">B2</button>
                <button class="level-btn" data-level="B2+">B2+</button>
                <button class="level-btn" data-level="C1">C1</button>
                <button class="level-btn" data-level="C2">C2</button>
            </div>
        </div>

        <div class="filter-group">
            <h3>Temel Beceri</h3>
            <div class="skill-list" id="skillFilters">
                <!-- Python tarafından doldurulacak -->
            </div>
        </div>
    </aside>

    <main class="main-content">
        <input type="text" class="search-bar" id="searchInput" placeholder="🔍 Tanımlayıcılar içinde ara...">
        <div class="stats" id="stats">Toplam 0 sonuç gösteriliyor.</div>
        <div class="cards-grid" id="cardsGrid">
            <!-- Kartlar buraya gelecek -->
        </div>
    </main>
</div>

<script>
    // Veriyi Python'dan alıyoruz
    const rawData = [{"Temel Beceri": "0", "Seviye": "C2", "Tanımlayıcı": "Duyduğu veya okuduğu hemen hemen her şeyi kolaylıkla anlayabilir. Tutarlı bir sunumdaki savları ve açıklamaları yeniden yapılandırarak farklı sözlü ve yazılı kaynaklardan bilgileri özetleyebilir. Daha karmaşık durumlarda bile daha ince anlam nüanslarını ayırt ederek kendisini anında, çok akıcı ve kesin bir şekilde ifade edebilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Çeşitlilik gösteren zorlayıcı, uzun metinleri anlayabilir ve örtük anlamı fark edebilir. Açıkça ifade aramadan kendini akıcı ve doğal olarak ifade edebilir. Sosyal, akademik ve profesyonel amaçlar için dili esnek ve etkili bir şekilde kullanabilir. Karmaşık konularda düzenleme kalıplarının, bağlaçların ve bağdaşıklık öğelerinin kontrollü kullanımını sergileyerek net, iyi yapılandırılmış, ayrıntılı metinler üretebilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Uzmanlık alanlarındaki teknik tartışmalar da dâhil olmak üzere, hem somut hem de soyut konulardaki karmaşık metinlerin ana fikirlerini anlayabilir. Her iki taraf için de zorlanmadan anadili İngilizce olan kişilerle düzenli etkileşimi oldukça mümkün kılan bir derecede akıcılık ve kendiliğindenlikle etkileşim kurabilir. Çok çeşitli konuda net, ayrıntılı metinler üretebilir ve farklı seçeneklerin avantajlarını ve dezavantajlarını ortaya koyarak güncel bir konu hakkındaki bakış açısını açıklayabilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "İş, okul, boş zaman vb. ortamlarda düzenli olarak karşılaşılan bildik konulardaki açık standart girdilerin ana fikirlerini anlayabilir. Dilin konuşulduğu bir bölgede seyahat ederken ortaya çıkması muhtemel çoğu durumla başa çıkabilir. Bildik veya kişisel ilgi alanına giren konularda basit bağlantılı metinler üretebilir. Deneyimleri ve olayları, hayalleri, umutları ve tutkuları tanımlayabilir ve fikir ve planlar için kısaca nedenler ve açıklamalar verebilir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "En yakın ilgi alanlarıyla ilgili cümleleri ve sık kullanılan ifadeleri anlayabilir (örneğin, çok temel kişisel ve ailevi bilgiler, alışveriş, yerel coğrafya, istihdam). Bildik ve rutin konularda basit ve doğrudan bilgi alışverişini gerektiren basit ve rutin görevlerde iletişim kurabilir. Basit terimlerle geçmiş yaşantısını, yakın çevresini ve acil ihtiyaç alanlarındaki konuları tanımlayabilir."}, {"Temel Beceri": "0", "Seviye": "A1", "Tanımlayıcı": "Bilinen günlük ifadeleri ve somut ihtiyaçların karşılanmasına yönelik çok temel ifadeleri anlayabilir ve kullanabilir. Kendini ve başkalarını tanıtabilir ve nerede yaşadıkları, aşina olduları insanlar ve sahip oldukları şeyler gibi kişisel ayrıntılar hakkında soru sorabilir ve yanıtlayabilir. Diğer kişinin yavaş ve net konuşması ve yardım etmeye hazır olması koşuluyla basit bir şekilde iletişim kurabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "C2", "Tanımlayıcı": "İster canlı ister yayın olsun, doğal hızında sunulan her türlü dili neredeyse kolayca anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "C1", "Tanımlayıcı": "Ara sıra bazı ayrıntıları -özellikle ağız aşina değilse- doğrulamaya ihtiyaç duysa bile kendi alanı dışındaki soyut ve karmaşık konular hakkında uzayan söylemi takip edebilecek kadar anlayabilir. "}, {"Temel Beceri": "Dinleme", "Seviye": "C1", "Tanımlayıcı": "Üslubundaki geçişleri fark edip takdir ederek çok çeşitli deyimsel ifadeleri ve gündelik anlatımı tanıyabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "C1", "Tanımlayıcı": "Anlaşılır biçimde yapılandırılmadığında ve ilişkiler açıkça belirtilmeyip yalnızca ima edildiğinde bile uzayan söylemi takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B2+", "Tanımlayıcı": "Kişisel, sosyal, akademik veya mesleki yaşamda normal bir şekilde karşılaşılan hem aşina olan hem de aşina olmayan konularda ister canlı ister yayın olsun, standart dili veya aşina olduğu bir ağzı anlayabilir. Sadece aşırı [işitsel/görsel] arka plan sesleri, yetersiz söylem yapısı ve/veya deyimsel kullanım anlama yeteneğini etkiler. "}, {"Temel Beceri": "Dinleme", "Seviye": "B2", "Tanımlayıcı": "Uzmanlık alanındaki teknik tartışmalar da dâhil olmak üzere standart bir dil veya aşina olduğu bir ağız ile sunulan hem somut hem de soyut konularda önermesel ve dilsel olarak karmaşık söylemin ana fikirlerini anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B2", "Tanımlayıcı": "Konunun kabul edilebilir ölçüde aşina olması ve savların açık belirticiler ile gösterilmesi koşuluyla uzayan söylem ve karmaşık tartışma dizisini takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B1+", "Tanımlayıcı": "Genelde aşina olduğu bir ağızla ve açık bir şekilde sesletilmesi koşuluyla yaygın günlük veya işle ilgili konular hakkında hem genel mesajları hem de özel detayları tanımlayarak karmaşık olmayan olgusal bilgileri anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B1", "Tanımlayıcı": "Kısa anlatılar da dâhil olmak üzere işte, okulda, serbest zaman etkinliklerinde vs. düzenli olarak karşılaşılan aşina meselelerin açık standart bir dil veya aşina olduğu bir ağızla anlatılan ana fikirlerini anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A2+", "Tanımlayıcı": "Açık ve yavaş bir şekilde sesletilmesi koşuluyla somut türden ihtiyaçlarını karşılayabilecek kadar anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A2", "Tanımlayıcı": "Açık ve yavaş bir şekilde sesletilmesi koşuluyla en öncelikli alanlar (ör. çok temel kişisel ve ailevi bilgiler, alışveriş, yerel coğrafya, istihdam) ile ilgili öbekleri ve ifadeleri anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A1", "Tanımlayıcı": "Anlamı özümseyebilmesi için uzun duraklamalarla yapılan çok yavaş ve dikkatli sesletilmiş konuşmayı takip edebilir. "}, {"Temel Beceri": "Dinleme", "Seviye": "A1", "Tanımlayıcı": "Konuşmanın yavaş ve anlaşılır biçimde yapılması koşuluyla günlük hayatta karşılaşılan aşina olduğu konularla ilgili somut bilgileri (ör. yerler ve zamanlar) tanıyabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Konuşmanın yavaş ve anlaşılır biçimde yapılması ve anlamayı desteklemek için görseller ve el hareketleri ile desteklenmesi ve gerekirse tekrarlar yapılması koşuluyla kısa, çok basit soru ve ifadeleri anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Açık olarak tanımlanmış, aşina olduğu günlük bir bağlamda, anlaşılır ve yavaş bir biçimde sunulması koşuluyla gündelik, aşina olduğu kelimeleri/işaretleri tanıyabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Tanımlanmış, aşina olduğu günlük bir bağlamda, yavaş ve anlaşılır bir biçimde sunulması koşuluyla sayılar, fiyatlar, tarihler ve haftanın günlerini tanıyabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "C2", "Tanımlayıcı": "Doğal bir hızda gerçekleşen, gündelik anlatımdaki tartışmalarda kullanılan dilin çoğunun sosyokültürel çıkarımlarını belirleyebilir. "}, {"Temel Beceri": "Dinleme", "Seviye": "C1", "Tanımlayıcı": "Soyut, karmaşık ve aşina olmadığı konularda bile grup tartışması ve münazarada, üçüncü şahıslar arasındaki karmaşık etkileşimleri kolayca takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "C1", "Tanımlayıcı": "Doğal hızında, aşina olduğu ağızlarda yapılan, örtüşen konuşma sırası, konudan sapma ve gündelik anlatımı içeren canlı bir tartışmadaki her bir katılımcının tutumunu belirleyebilir. "}, {"Temel Beceri": "Dinleme", "Seviye": "B2+", "Tanımlayıcı": "Hedef dilin yetkin kullanıcıları arasında geçen canlı karşılıklı konuşmaya ayak uydurabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B2", "Tanımlayıcı": "Biraz çaba sarf ederek etrafında söylenenlerin çoğunu yakalayabilir fakat dilini hiçbir şekilde dinleyen için değiştirmeyen birkaç hedef dil kullanıcısı ile yapılan tartışmaya etkili bir şekilde katılmayı zor bulabilir. "}, {"Temel Beceri": "Dinleme", "Seviye": "B2", "Tanımlayıcı": "Standart dil veya aşina olduğu bir ağızda yapılan bir tartışmada bir sav veya görüşün lehindeki ve aleyhindeki ana nedenleri belirleyebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B2", "Tanımlayıcı": "Hikâye veya fıkra gibi uzayan resmî olmayan söylemde kronolojik sırayı takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B1+", "Tanımlayıcı": "Standart dil veya aşina olduğu bir ağızda açık bir şekilde sesletilmesi koşuluyla günlük karşılıklı konuşma ve tartışmaların çoğunu takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B1", "Tanımlayıcı": "Standart dil veya aşina olduğu bir ağızda açık bir şekilde sesletilmesi koşuluyla etrafındaki uzayan konuşmaların ana fikirlerini genellikle takip edebilir. "}, {"Temel Beceri": "Dinleme", "Seviye": "A2+", "Tanımlayıcı": "Yavaş ve açık bir şekilde yürütüldüğünde etrafındaki tartışmanın konusunu genellikle belirleyebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A2+", "Tanımlayıcı": "Yavaş ve açık bir şekilde yapılan bir konuşmada insanların ne zaman hemfikir olup olmadığını fark edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A2", "Tanımlayıcı": "Çok yavaş ve açık bir şekilde yapılan karşılıklı kısa, basit, sosyal konuşmaları ana hatlarıyla takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A1", "Tanımlayıcı": "Konuşmanın yavaş ve açık bir şekilde yapılması koşuluyla insanların aile, okul, hobiler ve etraftakiler hakkında konuşurken kullandığı bazı ifadeleri anlayabilir. "}, {"Temel Beceri": "Dinleme", "Seviye": "A1", "Tanımlayıcı": "Çok yavaş ve açık bir şekilde konuşması koşuluyla basit bir karşılıklı konuşmadaki (ör. bir dükkânda müşteri ve satıcı arasında geçen) kelimeleri/ işaretleri ve cümleleri anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "C2", "Tanımlayıcı": "Gündelik anlatım, bölgesel kullanım veya aşina olmayan terminoloji içeren uzmanlık konuşmalarını ve sunumlarını takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "C2", "Tanımlayıcı": "Bağlantılar veya çıkarımlar açığa kavuşturulmadığında, uygun çıkarımlarda bulunabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "C2", "Tanımlayıcı": "Bir sunumdaki esprilerin veya imaların amacını anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "C1", "Tanımlayıcı": "Çoğu dersi, tartışmayı veya münazarayı nispeten kolaylıkla takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B2+", "Tanımlayıcı": "Önermesel ve dilsel olarak karmaşık olan derslerin, konuşma ve raporların ve diğer akademik/mesleki sunumların ana hatlarını takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B2+", "Tanımlayıcı": "Konuşmanın standart dil veya aşina olduğu bir ağızda yapılması koşuluyla güncel ilgi alanı veya uzmanlık alanıyla ilgili konularda ifade edilen bakış açısını anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B2", "Tanımlayıcı": "Konunun kabul edilebilir ölçüde aşina olması koşuluyla açık bir şekilde sesletilen ders anlatımındaki karmaşık bir dizi savı takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B2", "Tanımlayıcı": "Bir ders anlatımı veya bir konuşmanın standart dil veya aşina olduğu bir ağızda yapılması koşuluyla ana temaları diğer temalardan ayırt edebilir. "}, {"Temel Beceri": "Dinleme", "Seviye": "B2", "Tanımlayıcı": "İfade edilen bakış açısını tanıyabilir ve bunu bildirilen gerçeklerden ayırt edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B1+", "Tanımlayıcı": "Konunun aşina olması ve sunumun karmaşık olmayan ve açık bir şekilde yapılandırılmış olması koşuluyla kendi alanındaki bir ders veya konuşmayı takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B1+", "Tanımlayıcı": "Açıkça ifade edilmiş standart bir dil veya aşina olduğu bir ağızda sesletilmesi koşuluyla bilinen konularla ilgili standart derslerdeki ana fikirler ve destekleyici detayları birbirinden ayırt edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B1", "Tanımlayıcı": "Verilen açıklamaları anlayarak kendi alanlarındaki bir konu veya ürünle ilgili görsel destekli (ör. slaytlar, çalışma notları) karmaşık olmayan bir konferans sunumunu veya tanıtım gösterisini takip edebilir.\n"}, {"Temel Beceri": "Dinleme", "Seviye": "B1", "Tanımlayıcı": "Konuşmanın açık ve oldukça yavaş olması koşuluyla karmaşık olmayan bir tekil konuşmada (ör. rehberli tur) söylenenlerin ana fikirlerini anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B1", "Tanımlayıcı": "Açıkça sesletilmiş standart bir dil veya aşina olduğu bir ağızda sunulması koşuluyla bilinen konulardaki karmaşık olmayan kısa konuşmaları ana hatlarıyla takip edebilir. "}, {"Temel Beceri": "Dinleme", "Seviye": "A2+", "Tanımlayıcı": "Mesajın basit bir dille yavaş ve açık bir şekilde ifade edildiği ve görsel desteklerin (ör. slaytlar, çalışma notları) olduğu aşina veya tahmin edilebilir bir konudaki tanıtım gösterisi veya sunumun genel taslağını takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A2", "Tanımlayıcı": "Slaytlar, somut örnekler veya şemalarla açıklanması, konuşmanın tekrarlarla yavaş ve anlaşılır bir biçimde yapılması ve konunun aşina olması koşuluyla, çok basit ve iyi yapılandırılmış bir sunum veya tanıtım gösterisini takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A2", "Tanımlayıcı": "Rehberli tur gibi öngörülebilir bir durumda verilen basit bilgilerin ana hatlarını anlayabilir (ör. “Burası Başkan’ın yaşadığı yerdir.”). "}, {"Temel Beceri": "Dinleme", "Seviye": "A1", "Tanımlayıcı": "Konuşmanın çok yavaş ve açık bir şekilde yapılması ve zaman zaman uzun duraksamaların olması koşuluyla rehberli tur gibi öngörülebilir bir durumda verilen basit bilgileri ana hatlarıyla anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "C1", "Tanımlayıcı": "Düşük kaliteli ve [işitsel ve/veya görsel] bozulmaların olduğu istasyon veya spor stadyumu veya eski bir kayıttaki kamusal duyurulardan belirli bilgileri alabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "C1", "Tanımlayıcı": "Aşina olduğu ürün veya servislerin kullanım yönergeleri ve teknik özellikleri gibi karmaşık teknik bilgiyi anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B2", "Tanımlayıcı": "Ayrıntılı yönergeleri başarılı bir şekilde takip edebilecek kadar iyi anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B2", "Tanımlayıcı": "Standart dil veya aşina olduğu bir ağızda normal hızda yapılması koşuluyla somut ve soyut konulardaki duyuru ve mesajları anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B1", "Tanımlayıcı": "Günlük araçların kullanım yönergeleri gibi basit teknik bilgiyi anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B1", "Tanımlayıcı": "Detaylı yönergeleri takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B1", "Tanımlayıcı": "Minimum derecede arka plan gürültülü [işitsel/görsel] ve açık bir şekilde sesletilmesi koşuluyla havaalanları, istasyonlardaki ve uçak, otobüs ve trenlerdeki kamusal duyuruları anlayabilir. "}, {"Temel Beceri": "Dinleme", "Seviye": "A2+", "Tanımlayıcı": "Spor yapma, yemek pişirme gibi aşina olduğu günlük etkinlikler için bir dizi yönergeyi yavaş ve açık bir şekilde verilmesi koşuluyla anlayabilir ve takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A2+", "Tanımlayıcı": "Karmaşık olmayan duyuruları (ör. sinema programı veya spor olayları, bir trenin gecikmesi), yavaş ve açık bir şekilde yapılması koşuluyla anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A2", "Tanımlayıcı": "Kısa, açık, basit mesaj ve duyurulardaki ana fikirleri yakalayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A2", "Tanımlayıcı": "X noktasından Y noktasına yürüyerek veya toplu taşımayla nasıl gidileceğine yönelik basit yol tariflerini anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A2", "Tanımlayıcı": "Saatler, tarihler, sayılar vb. ve gerçekleştirilecek rutin görev ve ödevlerle ilgili temel yönergeleri anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A1", "Tanımlayıcı": "Kendisine dikkatle ve yavaşça verilen yönergeleri anlayabilir ve kısa, basit yönlendirmeleri takip edebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A1", "Tanımlayıcı": "Örneğin bir tren istasyonu veya bir dükkânda hoparlörden yapılan bir anonsta yavaş ve açık bir şekilde verilen rakamları, fiyatları ve süreleri anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A1", "Tanımlayıcı": "Birisi bir şeyin nerede olduğunu kendisine yavaş ve açık bir şekilde söylediğinde nesnenin yakın çevresinde olması koşuluyla anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A1 Öncesi", "Tanımlayıcı": "“Dur.”, “Kapıyı kapat.” gibi kısa, basit eylemlerle ilgili yönergeleri, resim veya el hareketleri ile desteklenmesi ve gerektiğinde tekrarlanarak yavaşça ve yüz yüze verilmesi koşuluyla anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "C1", "Tanımlayıcı": "Bazı standart dışı kullanımlar da dâhil olmak üzere çok çeşitli kaydedilmiş ve yayımlanmış materyalleri anlayabilir ve örtük tutumlar ve insanlar arasındaki ilişkiler dâhil olmak üzere daha ince ayrıntı noktalarını belirleyebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B2+", "Tanımlayıcı": "Sosyal, mesleki veya akademik yaşamda karşılaşılması muhtemel, standart dildeki kayıtları anlayabilir ve bu kayıtlardaki bilgi içeriğinin yanı sıra bakış açıları ve tutumları belirleyebilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B2", "Tanımlayıcı": "Standart dilde sunulan çoğu belgesel ve diğer birçok kaydedilmiş veya yayımlanmış materyali anlayabilir ve bu materyallerdeki ruh durumunu, tutumu vb. tanıyabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B1+", "Tanımlayıcı": "Kişisel ilgi alanına giren konularda açık standart bir dilde sunulan çoğu kaydedilmiş veya yayımlanmış materyalin bilgi içeriğini anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B1", "Tanımlayıcı": "Aşina olduğu konularla ilgili oldukça yavaş ve açık bir şekilde sunulan haber bültenlerinin ve daha basit kaydedilmiş materyalin ana fikirlerini anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "B1", "Tanımlayıcı": "Anlatımın yavaş ve açık olması koşuluyla hikâye ve diğer anlatılardaki (ör. bir tatil anlatımı) ana fikirleri ve önemli detayları anlayabilir. "}, {"Temel Beceri": "Dinleme", "Seviye": "A2+", "Tanımlayıcı": "İlgi duyduğu ürün ve hizmetlerle ilgili (ör. CD’ler, video oyunları, seyahat) çok kısa reklamlardaki en önemli bilgileri anlayabilir. "}, {"Temel Beceri": "Dinleme", "Seviye": "A2+", "Tanımlayıcı": "Bir röportajda insanların serbest zamanlarında ne yaptıklarını, özellikle ne yapmaktan hoşlandıklarını ve ne yapmayı sevmediklerini yavaş ve anlaşılır konuşmaları koşuluyla anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A2", "Tanımlayıcı": "Yavaş ve açık bir şekilde iletilen, öngörülebilir günlük meselelerle ilgili kısa ve kaydedilmiş metinlerdeki gerekli bilgiyi anlayabilir ve bu bilginin özünü çıkarabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A2", "Tanımlayıcı": "Açık konuşulması koşuluyla kısa yayınlardaki (ör. hava durumu, konser duyuruları, spor sonuçları) önemli bilgileri anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A2", "Tanımlayıcı": "Yavaş ve açık bir şekilde anlatılması koşuluyla bir hikâyenin önemli noktalarını anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A1", "Tanımlayıcı": "Çok yavaş ve açık bir şekilde konuşulması koşuluyla, aşina olduğu günlük konularla ilgili kısa kayıtlardaki somut bilgiyi (ör. yerler ve zamanlar) anlayabilir."}, {"Temel Beceri": "Dinleme", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Çok yavaş ve açık bir şekilde konuşulması koşuluyla basit ve kısa kayıtlardaki hâlihazırda bildiği kelimeleri/işaretleri, isimleri ve rakamları tanıyabilir."}, {"Temel Beceri": "Dinleme, Görsel", "Seviye": "C1", "Tanımlayıcı": "Önemli ölçüde argo ve deyimsel kullanım içeren filmleri takip edebilir."}, {"Temel Beceri": "Dinleme, Görsel", "Seviye": "C1", "Tanımlayıcı": "Güncel olaylarla ilgili programları, röportajları, tartışma programları ve sohbet programları gibi zorlayıcı televizyon yayınlarında sunulan savları ayrıntılı bir şekilde anlayabilir. "}, {"Temel Beceri": "Dinleme, Görsel", "Seviye": "C1", "Tanımlayıcı": "Standart dil veya aşina olduğu bir ağızda konuşulması koşuluyla çoğu film, oyun ve TV programındaki ince ayrımları ve ima edilen anlamları anlayabilir. "}, {"Temel Beceri": "Dinleme, Görsel", "Seviye": "B2+", "Tanımlayıcı": "Haber ve güncel olaylarla ilgili programlardaki sav ve tartışmaların ana fikirlerini seçip çıkartabilir."}, {"Temel Beceri": "Dinleme, Görsel", "Seviye": "B2", "Tanımlayıcı": "Çoğu TV haberleri ve güncel olaylarla ilgili programları anlayabilir."}, {"Temel Beceri": "Dinleme, Görsel", "Seviye": "B2", "Tanımlayıcı": "Standart dilde veya aşina olduğu bir ağızda sunulan belgesellerin, canlı röportajların, sohbet programlarının, oyunların ve filmlerin çoğunu anlayabilir."}, {"Temel Beceri": "Dinleme, Görsel", "Seviye": "B1+", "Tanımlayıcı": "Konuşma oldukça yavaş ve açık olduğunda, kişisel ilgi alanına giren konulardaki röportajlar, kısa konferanslar ve haber bültenleri gibi birçok TV programının büyük bölümünü anlayabilir. "}, {"Temel Beceri": "Dinleme, Görsel", "Seviye": "B1", "Tanımlayıcı": "Olay örgüsünün çoğunun görseller ve eylemlerle anlatıldığı ve açık bir şekilde karmaşık olmayan bir dilde pek çok filmi anlayabilir."}, {"Temel Beceri": "Dinleme, Görsel", "Seviye": "B1", "Tanımlayıcı": "Sunum oldukça yavaş ve açık olduğunda aşina olan konularla ilgili TV programlarındaki ana fikirleri anlayabilir."}, {"Temel Beceri": "Dinleme, Görsel", "Seviye": "A2+", "Tanımlayıcı": "Anlatımın görsellerle desteklendiği olayları, kazaları vb. bildiren TV haberlerindeki ana fikri saptayabilir."}, {"Temel Beceri": "Dinleme, Görsel", "Seviye": "A2+", "Tanımlayıcı": "Görüntülerin anlamaya çok yardımcı olması ve konuşmanın açık ve oldukça yavaş yapılması koşuluyla hangi konu(lar) ile ilgili olduğunu anlayarak bir TV reklamı veya film fragmanını veya bir filmden bir sahneyi takip edebilir."}, {"Temel Beceri": "Dinleme, Görsel", "Seviye": "A2", "Tanımlayıcı": "Olgusal TV haberlerindeki konu değişikliklerini takip edebilir ve ana içerik hakkında bir fikir oluşturabilir."}, {"Temel Beceri": "Dinleme, Görsel", "Seviye": "A1", "Tanımlayıcı": "Aşina olduğu kelimeleri/işaretleri ve öbekleri tanıyabilir ve görseller ve genel bilgilerden yararlanarak manşet haber özetleri ile reklamlardaki pek çok ürünün konularını belirleyebilir."}, {"Temel Beceri": "Okuma", "Seviye": "C2", "Tanımlayıcı": "Soyut, yapısal olarak karmaşık veya son derece gündelik anlatıma özgü edebî ve edebî olmayan yazılar dâhil olmak üzere neredeyse tüm metin tiplerini anlayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "C2", "Tanımlayıcı": "İnce tarz farklılıklarını ve hem örtük hem açık anlamı fark edip takdir ederek çok çeşitli uzun ve karmaşık metinleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "C1", "Tanımlayıcı": "Zor bölümleri tekrar okuyabilmesi koşuluyla kendi uzmanlık alanıyla ilgili veya uzmanlık alanı dışında uzun ve karmaşık metinleri ayrıntılı bir şekilde anlayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "C1", "Tanımlayıcı": "Tekrar okuma fırsatı olması ve kaynak araçlara erişebilmesi koşuluyla edebî yazılar, gazete veya dergi makaleleri ve uzmanlık alanına ait akademik ve mesleki yayımları da kapsayan çok çeşitli metinleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B2", "Tanımlayıcı": "Okuma tarzını ve hızını farklı metin ve amaçlara uyarlayarak ve uygun başvuru kaynaklarını titizlikle seçip kullanarak büyük ölçüde bağımsız bir şekilde okuyabilir. Geniş bir aktif okuma sözcük birikimine sahiptir fakat düşük kullanım sıklığına sahip deyimlerde biraz zorluk yaşayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "İlgi alanlarıyla ilgili konularda karmaşık olmayan olgusal metinleri tatmin edici ölçüde kavrayarak okuyabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2+", "Tanımlayıcı": "Somut türde aşina olduğu meselelerle ilgili, yüksek kullanım sıklığına sahip günlük veya işle ilgili dilden oluşan kısa ve basit metinleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Bir kısmı ortak uluslararası kelime ögeleri olan yüksek kullanım sıklığına sahip kelimeleri içeren kısa ve basit metinleri anlayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "A1", "Tanımlayıcı": "Aşina olduğu isimleri, kelimeleri ve temel öbekleri seçerek ve gerektiğinde yeniden okuyarak her seferde tek bir öbek olmak üzere çok kısa ve basit metinleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Resimli hazır yemek restoran menüsü veya aşinaolduğu kelimeleri içeren resimli kitap gibi resimler eşliğindeki kelimeleri/işaretleri tanıyabilir."}, {"Temel Beceri": "Okuma", "Seviye": "C2", "Tanımlayıcı": "Karmaşık bir konuda uzmanlık gerektiren resmî yazışmaları anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "C1", "Tanımlayıcı": "Ara sıra sözlük kullanarak herhangi bir yazışmayı anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "C1", "Tanımlayıcı": "Tekrar okuma fırsatı olması ve kaynak araçlara erişebilmesi koşuluyla e-posta, tartışma forumları, vloglar/bloglar vb.de ifade edilen örtük ve açık tutumları, duyguları ve fikirleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "C1", "Tanımlayıcı": "Özel yazışmalardaki argo, deyimsel ifade ve şakaları anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B2", "Tanımlayıcı": "İlgi alanları hakkındaki yazışmaları okuyabilir ve temel anlamını anında kavrayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B2", "Tanımlayıcı": "Bazı yerlerinde gündelik anlatım kullanılsa bile kişisel e-posta ve ilanlarda söyleneni anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1+", "Tanımlayıcı": "Daha az aşina olduğu konulardaki resmî yazışmaları başkalarına yönlendirecek kadar iyi anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Kişisel mektuplardaki olay, duygu ve dilek betimlemelerini bir mektup arkadaşıyla düzenli yazışacak derecede iyi anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Nispeten ayrıntılı olay ve deneyim betimlemesi yapan karmaşık olmayan kişisel mektup, e-posta veya ilanları anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Mesleki ilgi alanına giren standart resmî yazışma ve çevrim içi ilanları anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2+", "Tanımlayıcı": "Yazan kişinin aşina konular (arkadaşlar ve aile gibi) hakkında konuştuğu veya bu konularda soru sorduğu basit bir kişisel mektup, e-posta veya ilanı anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2+", "Tanımlayıcı": "Aşina olduğu konularda temel standart rutin mektup veya faks türlerini (soruşturma, sipariş, onay mektupları gibi) anlayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Kısa ve basit kişisel mektupları anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Çok basit resmî e-posta ve mektupları (rezervasyon veya çevrim içi satın alma onayı gibi) anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A1", "Tanımlayıcı": "Sosyal medya veya e-posta yoluyla gönderilen kısa, basit mesajları (ör. ne yapılacağını, ne zaman ve nerede buluşulacağını öneren) anlayabilir"}, {"Temel Beceri": "Okuma", "Seviye": "A1", "Tanımlayıcı": "Kartpostallardaki kısa, basit mesajları anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Bir mektup, kart veya e-postadan davet edildiği etkinliği ve gün, saat ve yer hakkında verilmiş olan bilgiyi anlayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Arkadaşlarından veya meslektaşlarından gelen çok basit not ve mesajlardaki zamanları ve yerleri (ör. “Saat 4:00’te”, “Toplantı odasında”) kısaltmalar olmaması koşuluyla tanıyabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "B2+", "Tanımlayıcı": "Hem kendi alanındaki hem de ilgili alanlardaki birçok birbiriyle paralel kaynakları (makaleler, raporlar, web siteleri, kitaplar vb.) tarayabilir ve bu kaynaklardaki belirli bölümlerin üzerinde çalıştığı görevle ilgili uygunluğunu ve yararlılığını tanımlayabilir"}, {"Temel Beceri": "Okuma", "Seviye": "B2", "Tanımlayıcı": "İlgili ayrıntıları bularak uzun ve karmaşık metinleri hızla tarayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B2", "Tanımlayıcı": "Çok çeşitli mesleki konularla ilgili haberlerin, makalelerin ve raporların içerik ve uygunluğunu, bu metinleri daha detaylı okumanın faydalı olup olmadığına karar vererek belirleyebilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1+", "Tanımlayıcı": "Dergilerde, broşürlerde veya internetteki karmaşık olmayan olgusal metinleri tarayabilir, ne hakkında olduklarını belirleyebilir ve kullanışlı bilgi içerip içermediklerine karar verebilir. "}, {"Temel Beceri": "Okuma", "Seviye": "B1+", "Tanımlayıcı": "İstenen bilgiyi bulmak için nispeten uzun metinleri tarayabilir ve belirli bir görevi yerine getirmek için bir metnin farklı yerlerinden veya farklı metinlerden bilgi toplayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Gıda maddeleri ve ilaçların üzerinde yazan hazırlama ve kullanımla ilgili önemli bilgileri anlayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Bir makale, rapor veya eleştiri yazısının ihtiyaç duyulan konu ile ilgili olup olmadığını değerlendirebilir. "}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Çok fazla kısaltma olmaması koşuluyla gazete ve dergilerdeki basit ve anlaşılır şekilde hazırlanmış olan reklamlardaki önemli bilgiyi anlayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Mektup, broşür ve kısa resmî belgeler gibi gündelik materyallerdeki ilgili bilgileri bulabilir ve anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2+", "Tanımlayıcı": "Basit bir dilde ifade edilmeleri koşuluyla pratik, somut ve öngörülebilir metinlerdeki (ör. seyahat rehberleri, tarifler) belirli bilgileri bulabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2+", "Tanımlayıcı": "Broşür ve web sitelerinde yer alan ürünlerin (ör. taşınabilir dijital araçlar, kameralar) kısa ve basit açıklamalarındaki temel bilgileri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Reklamlar, tanıtım broşürleri, menüler, kaynak listeleri ve çizelgeler gibi basit gündelik materyallerdeki belirli ve öngörülebilir bilgileri bulabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Listelerdeki belirli bilgileri bulabilir ve gerekli bilgiyi ayırabilir (ör. hizmet veya satıcı bulmak için telefon rehberini kullanma)."}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Sokak, restoran, tren istasyonu gibi kamusal alanlardaki gündelik işaret, duyuru vb. ve iş yerlerindeki yönlendirme, yönerge ve tehlike uyarısı gibi metinleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A1", "Tanımlayıcı": "Mağaza kılavuzlarını (ör. bir reyonunhangi katta olduğuna yönelik bilgi) ve yönlendirmelerini (ör. asansörlerin nerede olduğu) anlayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "A1", "Tanımlayıcı": "Temel otel bilgilerini (ör. öğünlerinne zaman servis edildiğini) anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A1", "Tanımlayıcı": "Reklamlar, özel etkinlik programları, bildiri ve broşürlerdeki basit, önemli bilgileri (ör. önerilenleri, fiyatları, etkinlik tarihi ve yerini, hareket saatlerini) bulabilir ve anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A1", "Tanımlayıcı": "En yaygın gündelik durumlarla ilgili, basit uyarılardaki aşina olduğu isimleri, kelimeleri/işaretleri ve çok temel öbekleri tanıyabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "“Otopark”, “İstasyon”, “Kafeterya”, “Sigara İçilmez” gibi basit gündelik tabelaları anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Posterler, el ilanları ve duyurularda yer, zaman ve fiyat hakkındaki bilgiyi bulabilir."}, {"Temel Beceri": "Okuma", "Seviye": "C2", "Tanımlayıcı": "Kendi uzmanlık alanı dışında bile olsa karmaşık bir rapor veya makalenin daha ince detaylarını ve çıkarımlarını anlayabilir"}, {"Temel Beceri": "Okuma", "Seviye": "C1", "Tanımlayıcı": "Kendi uzmanlık alanıyla ilgili olsun ya da olmasın, zor bölümleri yeniden okuyabilmek koşuluyla, uzun ve karmaşık metinleri ayrıntılı olarak anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "C1", "Tanımlayıcı": "Sosyal, mesleki veya akademik hayatta karşılaşılması muhtemel çok çeşitli uzun, karmaşık metinleri, tutumları ve hem ima edilen hem de açıkça belirtilen fikirleri içeren daha ince ayrıntı noktalarını belirleyerek detaylı olarak anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B2+", "Tanımlayıcı": "Alanındaki son derece uzman kaynaklardan bilgi, fikir ve görüş alabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B2+", "Tanımlayıcı": "Terminoloji hakkındaki tahminlerini doğrulamak için zaman zaman sözlük kullanabilmesi koşuluyla alanı dışındaki bir uzmanlık alanına ait makaleleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B2", "Tanımlayıcı": "Bir metnin ne zaman olgusal bilgi verdiğini ve ne zaman okuyucuyu bir şeye ikna etmeye çalıştığını fark edebilir."}, {"Temel Beceri": "Okuma", "Seviye": "B2", "Tanımlayıcı": "Söylemsel metindeki farklı yapıları (karşıt savlar, sorun-çözüm sunumu ve sebep-sonuç ilişkisi) tanıyabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B2", "Tanımlayıcı": "Belirli duruş ve tutumun sergilendiği çağdaş sorunlarla ilgili makaleleri ve raporları anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1+", "Tanımlayıcı": "İlgi alanları ve çalışmalarıyla ilgili olan konularda karmaşık olmayan olgusal metinleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1+", "Tanımlayıcı": "İnsanların fikirlerini paylaştığı, aşina olduğu veya ilgi alanına giren güncel konulardaki kısa metinleri (ör. çevrim içi bir tartışma forumuna yapılan önemli katkılar veya editöre yazılmış okur mektupları) anlayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "B1+", "Tanımlayıcı": "Açıkça işaret edilen tartışmacı metinlerdeki ana sonuçları belirleyebilir. "}, {"Temel Beceri": "Okuma", "Seviye": "B1+", "Tanımlayıcı": "Sunulan konunun ele alınmasındaki bir dizi tartışmayı detaylı olmasa bile fark edebilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Tekrar okumak için yeterli zamanı olması koşuluyla ilgi alanına giren aşina olduğu konulardaki olgusal çoğu bilgiyi anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Müze sergileri ve sergilerdeki açıklayıcı panolarda yer alan betimleyici notların ana fikirlerini anlayabilirim. "}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Aşina olduğu konularla ilgili karmaşık olmayan haber makalelerindeki önemli noktaları ayırt edebilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2+", "Tanımlayıcı": "İçeriğin aşina ve tahmin edilebilir olması koşuluyla aşina olduğu türdeki bir olay üzerine olan bir haber bülteninin genel taslağını takip edebilir"}, {"Temel Beceri": "Okuma", "Seviye": "A2+", "Tanımlayıcı": "Sayıların, isimlerin, resimlerin ve başlıkların önemli bir rol oynadığı ve metnin anlamını desteklediği kısa haber metinleri veya basit makalelerdeki temel bilgileri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2+", "Tanımlayıcı": "Gündelik konularla (ör. yaşam tarzı, hobiler, spor, hava) ilgili kısa metinlerin ana fikirlerini anlayabilirim."}, {"Temel Beceri": "Okuma", "Seviye": "A2+", "Tanımlayıcı": "Olayları betimleyen mektup, broşür ve kısa haber makaleleri gibi daha basit materyallerdeki belirli bilgiyi bulabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Basit bir dil kullanması koşuluyla insanlar, yerler, gündelik hayat ve kültür vb. konuları anlatan metinleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Resimli broşür ve haritalarda verilen bilgileri (ör. bir şehrin başlıca turistik yerleri) anlayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Kişisel ilgi alanına giren konulardaki (ör. spor, ünlüler) kısa haber metinlerinin ana fikirlerini anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Basit bir dil kullanması ve tahmin edilemeyen bir ayrıntı içermemesi koşuluyla kendi alanıyla ilgili kısa olgusal bir betimleme veya raporu anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "İnsanların kısa bir ilan veya gönderide kendileri hakkında söylediklerinin ve diğer insanlarda neleri sevdikleriyle ilgili söylediklerinin çoğunu anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A1", "Tanımlayıcı": "Çok basit bir dilde yazılmış ve çizim ve resimlerle desteklenmiş, kişisel ilgi alanına giren konular (ör. spor, müzik, seyahat hakkındaki sıcak gelişmeler veya hikâyeler) hakkındaki kısa metinleri anlayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "A1", "Tanımlayıcı": "Daha basit bilgilendirici metinler ve kısa, basit betimlemelerin içeriği hakkında, özellikle de görsel destek varsa, fikir edinebilir."}, {"Temel Beceri": "Okuma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Hazır yiyecek satan resimli lokanta menüsü veya çok basit gündelik kelimeler/ işaretlerle oluşturulmuş resimli bir hikâye gibi en basit bilgilendirici materyali anlayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "C1", "Tanımlayıcı": "Zor bölümleri tekrar okuyabilmesi koşuluyla, yeni bir makine veya prosedürle ilgili uzun ve karmaşık yönergeleri, bu yönergelerin kendi uzmanlık alanlarıyla ilgili olup olmadığını detaylı bir şekilde anlayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "B2", "Tanımlayıcı": "Zor bölümleri tekrar okuyabilmesi koşuluyla koşullar ve uyarılar hakkındaki ayrıntılar da dâhil olmak üzere alanındaki uzun karmaşık yönergeleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1+", "Tanımlayıcı": "İlgili süreç ve ürüne aşina olması koşuluyla kullanma kılavuzu gibi aralıksız metin şeklindeki yönerge ve prosedürleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Bir teçhizat parçası için açıkça ifade edilmiş karmaşık olmayan yönergeleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Ambalaj üzerinde verilen basit yönergeleri (ör. pişirme yönergeleri) takip edebilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Çoğu kısa güvenlik yönergelerini (ör. toplu taşımada veya elektrikli bir teçhizat kullanım kılavuzundakileri) anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2+", "Tanımlayıcı": "Basit bir dille ifade edildiğinde güvenlik talimatnamesi gibi düzenlemeleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2+", "Tanımlayıcı": "Adım adım resmedilen kısa yönergeleri (ör. yeni bir teknoloji kurmak için) anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Halka açık bir telefon gibi gündelik hayatta karşılaşılan araç gereçlerle ilgili basit yönergeleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Resimlendirilmiş olmaları ve aralıksız olmamaları koşuluyla basit kısa yönergeleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Basit bir komut (ör. “Yemeklerden önce alınız!” veya “Araç kullanıyorsanız almayınız!”) şeklinde ifade edilen ilaç prospektüslerindeki yönergeleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Özellikle en önemli adımları gösteren resimler varsa basit bir yemek tarifini takip edebilir."}, {"Temel Beceri": "Okuma", "Seviye": "A1", "Tanımlayıcı": "Kısa, basit yönlendirmeleri (X noktasından Y noktasına gitmek gibi) takip edebilir."}, {"Temel Beceri": "Okuma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Özellikle resimler varsa aşina olduğu gündelik bağlamlarda kullanılan çok kısa ve basit yönergeleri (ör. “Park yasaktır!”, “Yemek veya içmek yasaktır!”) anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "C2", "Tanımlayıcı": "İnce tarz ayrımlarını ve hem örtük hem de açık anlamı fark edip takdir ederek farklı türlerde klasik olan veya gündelik anlatım içeren edebî veya edebî olmayan metinler de dâhil olmak üzere hemen hemen tüm metin tiplerini okuyabilir"}, {"Temel Beceri": "Okuma", "Seviye": "C1", "Tanımlayıcı": "Belli bölümleri yeniden okuyabilmesi ve dilerse kaynak araçlara ulaşabilmesi koşuluyla çeşitli edebî metinleri okuyabilir ve fark edip takdir edebilir."}, {"Temel Beceri": "Okuma", "Seviye": "C1", "Tanımlayıcı": "Dilin standart biçiminde veya aşina olduğu bir ağzında üretilmiş çağdaş edebî ve kurgu olmayan metinleri, biraz zorluk yaşayarak ve örtük anlam ve fikirleri fark edip takdir ederek okuyabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B2", "Tanımlayıcı": "Büyük ölçüde bağımsız olarak, okuma tarzı ve hızını farklı metinlere (ör. dergiler, daha karmaşık olmayan romanlar, tarih kitapları, biyografiler, gezi günlükleri, rehberler, şarkı sözleri, şiirler) uyarlayarak ve uygun başvuru kaynaklarını titizlikle kullanarak kendi zevki için okuyabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B2", "Tanımlayıcı": "Yeterli zamanı olması ve sözlük kullanabilmesi koşuluyla güçlü bir olay örgüsü olan ve karmaşık olmayan, ağdalı dil kullanmayan romanları okuyabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1+", "Tanımlayıcı": "Daha geniş bir izleyici için hazırlanmış gazete/dergilerin film, kitap, konser vb. anlatımlarını okuyabilir ve ana fikirlerini anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1+", "Tanımlayıcı": "Karmaşık olmayan bir dil ve tarz kullanılması koşuluyla basit şiir ve şarkı sözlerini anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Yüksek kullanım sıklığına sahip gündelik dil kullanan anlatılardaki, kılavuzlardaki ve dergi makalelerindeki yer, olay, açıkça ifade edilen duygu ve bakış açısı betimlemelerini anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Temelde bir yolculuktaki olayları ve yazarın tecrübe ve keşiflerini anlatan bir seyahat günlüğünü anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "B1", "Tanımlayıcı": "Düzenli sözlük kullanımı yardımıyla açık ve doğrusal bir akışa ve yüksek sıklık derecesi olan günlük dil kullanımına sahip hikâyelerin, basit romanların ve çizgi romanların olay örgüsünü takip edebilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2+", "Tanımlayıcı": "Yüksek kullanım sıklığına sahip sözcüklerle gündelik dilde, aşina olduğu somut durumları betimleyen kısa, basit hikâyeleri ve çizgi romanları okuyabilecek kadar anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2+", "Tanımlayıcı": "Somut, gündelik konularla (ör. hobiler, spor, serbest zaman etkinlikleri, hayvanlar) ilgili kısa dergi raporları veya kılavuz girişlerinde belirtilen ana fikirleri anlayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Kısa anlatıları ve birinin hayatını anlatan basit bir dille oluşturulmuş betimlemeleri anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Bir fotoğraf hikâyesinde (ör. yaşam tarzı üzerine bir dergide) neler olduğu ve karakterlerin nasıl olduğu hakkında izlenim oluşturabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Bir kişinin (ör. bir ünlünün) kısa betimlemesinde verilen bilginin çoğunu anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A2", "Tanımlayıcı": "Basit bir dilde ve açık bir şekilde oluşturulmuş olması koşuluyla öngörülebilir bir yapı izleyen bir olayı (ör. Oscar Ödülleri) bildiren kısa bir makalenin ana fikrini anlayabilir. "}, {"Temel Beceri": "Okuma", "Seviye": "A1", "Tanımlayıcı": "Basit kelimelerle anlatılmış gündelik etkinliklerle ilgili kısa, resimli anlatımları anlayabilir."}, {"Temel Beceri": "Okuma", "Seviye": "A1", "Tanımlayıcı": "Görsellerin içerik hakkında çok fazla tahminde bulunmasına yardımcı olması koşuluyla resimli hikâyelerdeki kısa metinleri ana hatlarıyla anlayabilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "C2", "Tanımlayıcı": "Anlamın, yan anlam derecelerinin farkında olup deyimsel ifadelere ve gündelik anlatıma iyi derecede hâkimdir. Kabul edilebilir bir doğrulukla ve çok çeşitli niteleme ögelerini kullanarak, anlamın daha ince ayrımlarını tam olarak iletebilir. Bir zorluk yaşadığında, muhatabın farkına varamayacağı kadar sorunsuz bir şekilde geriye dönüp ifadesini yeniden yapılandırabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Kendini akıcı ve spontane bir şekilde, neredeyse hiç çaba harcamadan ifade edebilir. Dolaylı ifadeler kullanarak boşlukları anında doldurmasına izin veren geniş bir sözcük birikimine iyi derecede hâkimdir. Uygun ifadeleri veya kaçınma stratejilerini bulmaya çalışırken çok fazla belli etmez; sadece kavramsal olarak zor bir konu, doğal ve pürüzsüz bir dil akışını engelleyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Fikirler arasındaki ilişkileri açıkça belirleyerek çok çeşitli genel, akademik, mesleki veya serbest zamanla ilgili konularda dili akıcı, doğru ve etkili bir şekilde kullanabilir. Koşullara uygun bir resmiyet düzeyi benimseyerek söylemek istediklerini sınırlamak zorunda olduğunu çok belli etmeden, iyi bir dil bilgisel kontrol ile spontane iletişim kurabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Hedef dil kullanıcılarıyla her iki tarafı da zorlamadan düzenli etkileşim ve kesintisiz ilişki sağlayabilecek bir akıcılık ve spontanlık derecesiyle etkileşime girebilir. Olayların ve deneyimlerin kişisel önemini vurgulayabilir, uygun açıklamalar ve savlar sunarak görüşlerini belirgin bir biçimde açıklayabilir ve destekleyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "İlgi alanları ve mesleki alanıyla ilgili rutin veya rutin olmayan aşina olduğu meselelerde biraz güvenle iletişim kurabilir. Bilgi alışverişinde bulunabilir, bilgiyi denetleyebilir veya onaylayabilir, daha az rutin olan durumlarla ilgilenebilir ve bir şeyin neden sorun olduğunu açıklayabilir. Filmler, kitaplar, müzik vb. gibi daha soyut ve kültürel konular hakkında düşüncelerini ifade edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Seyahatte ortaya çıkması muhtemel birçok durumla başa çıkabilmek için çok çeşitli basit dil yapılarından yararlanabilir. Aşina olduğu konularda hazırlıksız olarak karşılıklı konuşmaya katılabilir ve kişisel ilgi alanına giren veya günlük yaşamla ilgili (ör. aile, hobiler, iş, seyahat ve güncel olaylar) aşina olduğu konularda şahsi görüşlerini ifade edebilir ve bilgi alışverişinde bulunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Karşı tarafın gerektiğinde yardım etmesi koşuluyla yapılandırılmış durumlar ve kısa karşılıklı konuşmalarda kabul edilebilir bir rahatlıkla etkileşime girebilir. Aşırı çaba harcamadan basit, rutin bilgi alışverişlerini yönetebilir; öngörülebilir olan günlük durumlarla ilgili aşina olduğu konular hakkında soru sorup yanıtlayabilir, fikir ve bilgi alışverişinde bulunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "İş ve serbest zamanla ilgili aşina ve rutin meseleler hakkında, basit ve doğrudan doğruya bilgi alışverişi gerektiren görevlerde iletişim kurabilir. Çok kısa sosyal alışverişleri idare edebilir ancak karşılıklı bir konuşmayı nadiren kendi isteğiyle devam ettirecek kadar anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Basit bir şekilde etkileşime girebilir ancak iletişim tamamen yavaş bir hızda konuşmayı tekrarlamaya, yeniden ifade etmeye ve onarmaya bağlıdır. Basit sorular sorup yanıtlayabilir, öncelikli ihtiyaç duyulan alanlarda veya çok aşina olduğu konularda basit açıklamalarla konuşma başlatabilir ve yanıt verebilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Kısa, kalıplaşmış ifadeler kullanarak ve bilgiyi pekiştirme amacıyla jestlerinden yararlanarak kendi ve günlük rutinleri hakkında sorular sorup yanıtlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C2", "Tanımlayıcı": "Daha aşina olduğu bir ağza uyum sağlama fırsatı verildiğinde, kendi alanı dışında, uzmanlık gerektiren soyut ve karmaşık konularda bile herhangi bir muhatabı anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Özellikle ağız aşina değilse, ara sıra ayrıntıları doğrulaması gerekmesine rağmen, bir muhatabı kendi alanının ötesinde uzmanlık gerektiren soyut ve karmaşık konularda ayrıntılı olarak anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "(İşitsel/görsel olarak) gürültülü bir ortamda bile standart dilde veya aşina olduğu bir ağızda kendine söylenenleri ayrıntılı olarak anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Günlük karşılıklı konuşmada kendisine yöneltilen açıkça sesletilmiş konuşmaları/işaretleri takip edebilir ancak bazen belirli sözcüklerin/işaretlerin ve öbeklerin tekrarını istemek zorunda kalabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Fazla çaba sarf etmeden basit, rutin bilgi alışverişle başa çıkacak kadar anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Zaman zaman tekrar veya yeniden ifade edilmesini isteyebilmesi koşuluyla kendisine yöneltilen aşina olduğu meselelerdeki açık, standart konuşmayı/işareti genel hatlarıyla anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Basit günlük karşılıklı konuşmalarda açıkça, yavaşça ve doğrudan doğruya kendisine söyleneni anlayabilir; eğer muhatabı uğraşırsa bir şeyi anlaması sağlanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Anlayışlı bir muhatap tarafından tekrarlanarak açık ve yavaş bir şekilde kendisine doğrudan doğruya iletilen, somut, basit ihtiyaçların karşılanmasına yönelik günlük ifadeleri anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Dikkatli ve yavaş bir şekilde kendisine yöneltilen soruları ve yönergeleri anlayabilir ve kısa, basit yönlendirmeleri takip edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Yavaş ve açık bir şekilde sorulursa kendisini doğrudan doğruya ilgilendiren basit soruları (ör. isim, yaş ve adres) anlayabilir.\n"}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Diğer insanlar kendilerini yavaş ve açık bir şekilde, doğrudan doğruya tanıttıklarında, basit kişisel bilgileri (ör. isim, yaş, ikamet yeri, köken) ve bu konularla ilgili kendisine yöneltilen soruları anlayabilir ancak soruların tekrarlanması gerekebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Konuşmanın çok yavaş olması ve gerektiğinde tekrarlanması koşuluyla bir dizi aşina olduğu kelimeyi/işareti anlayabilir ve önemli bilgileri (ör. sayılar, fiyatlar, tarihler ve haftanın günleri) tanıyabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C2", "Tanımlayıcı": "Sosyal ve kişisel yaşamını tam anlamıyla sürdürmek için herhangi bir dilsel sınırlamadan etkilenmeden, rahat ve uygun bir şekilde karşılıklı konuşabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Duygusal, kinayeli ve şaka amaçlı kullanım dâhil olmak üzere, sosyal amaçlar için dili esnek ve etkili bir şekilde kullanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Karşılıklı anlayış içeren sorgulama ve anlaşma ifadeleri ve ek olarak da eğer uygunsa üçüncü taraflar veya ortak koşullar hakkındaki yorumlar aracılığıyla muhataplarla ilişki kurabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Çekince ve isteksizliğini belirtebilir, teklifleri kabul ederken veya izin verirken koşulları belirtebilir ve kendi konumunun anlaşılmasını isteyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "[İşitsel/görsel olarak] gürültülü bir ortamda bile çoğu genel konu hakkında açıkça katılımcı bir tarzda uzayan karşılıklı konuşmalara katılabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Hedef dil kullanıcıları ile ilişkilerini, istemeyerek onları güldürmeden veya kızdırmadan veya onların başka bir yetkin dil kullanıcısıyla iletişimleri esnasında davranacaklarından daha farklı davranmalarını gerektirmeden sürdürebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Duygularının derecelerini ifade edebilir ve olayların ve deneyimlerin kişisel önemini vurgulayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "İnsanlara özel bir deneyim veya olay hakkında nispeten spontane sorular sorarak aşina olduğu konularda tepkilerini ve görüşlerini ifade etmek suretiyle bir konuşma başlatabilir ve karşılıklı konuşmanın devam etmesine yardımcı olabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Muhatabın anlamayı desteklemek için çaba göstermesi koşuluyla ortak ilgi alanlarındaki konularda nispeten uzun karşılıklı konuşmalar yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Aşina olduğu konulardaki karşılıklı konuşmalara hazırlıksız girebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Günlük karşılıklı konuşmada kendisine yöneltilen açık şekilde sesletilmiş dili takip edebilir ancak bazen belirli kelimelerin/işaretlerin tekrarını istemek zorunda kalabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Karşılıklı bir konuşmayı veya tartışmayı sürdürebilir ancak bazen tam olarak ne istediğini ifade etmeye çalışırken onu takip etmek zor olabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Şaşırma, mutluluk, üzüntü, ilgi ve kayıtsızlık gibi duyguları ifade edebilir ve bu duygulara yanıt verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Sosyal bağlantı kurabilir (ör. selamlaşma ve vedalaşma, tanışma, teşekkür etme)."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Zaman zaman tekrar veya yeniden ifade edilmesini isteyebilmesi koşuluyla kendisine yöneltilen aşina olduğu meselelerdeki açık, standart dili genellikle anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "İlgilendiği konulardaki rutin bağlamlarda kısa karşılıklı konuşmalara katılabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Nasıl hissettiğini basit terimlerle ifade edebilir, teşekkürlerini ifade edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Bir iyilik isteyebilir (ör. bir şey ödünç almak için), bir iyilik yapmayı teklif edebilir ve biri kendisinden bir iyilik yapmasını isterse karşılık verebilir"}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Sosyal bağlamda çok kısa karşılıklı konuşmayı idare edebilir ancak nadiren konuşma gidişatını kendisine göre devam ettirecek derecede anlayabilir ama yine de muhatap eğer çaba gösterirse anlaması sağlanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Akranları, meslektaşları veya konuk olduğu evin sahibi aile üyeleriyle çoğu rutin meselelerle ilgili sorular sorarak ve yanıtları anlayarak basit bir dille konuşabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Selamlaşmanın ve hitap etmenin basit, günlük nezaket yapılarını kullanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Davet edebilir, öneriler verebilir ve özür dileyebilir ve davete, önerilere ve özürlere yanıt verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Nasıl hissettiğini çok basit hazır ifadelerle açıklayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Neleri sevip sevmediğini söyleyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Giriş yapabilir ve temel selamlama ve vedalaşma ifadelerini kullanabilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Öngörülebilir bir konuda (ör. kendi ülkesi, ailesi, okulu) temel olgusal nitelikteki basit bir karşılıklı konuşmaya katılabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "İnsanların nasıl olduğunu sorabilir ve haberlere tepki verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Anlayışlı bir muhatap tarafından açık, yavaş ve tekrarlanan bir dille doğrudan doğruya kendisine iletilen, somut türde basit ihtiyaçların karşılanmasına yönelik günlük ifadeleri anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "“Evet.”, “Hayır.”, “Affedersiniz.’, “Teşekkür ederim.”, “Hayır, teşekkür ederim.”, “Üzgünüm.’’ gibi temel kalıplaşmış ifadeleri anlayabilir ve kullanabilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Basit selamlama biçimlerini tanıyabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "İnsanları selamlayabilir, isimlerini söyleyebilir ve basit bir şekilde izin alabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C2", "Tanımlayıcı": "Gündelik anlatımdaki gönderimleri anlayarak ve anlaşmazlık ve eleştirilerle diplomatik olarak başa çıkarak, hassas konular hakkında uygunsuz kaçmayacak tavsiyelerde bulunabilir veya tartışabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Soyut, karmaşık aşina olmadığı konularda bile grup tartışması esnasında üçüncü taraflar arasındaki karmaşık etkileşimleri kolayca takip edebilir ve etkileşime katkıda bulunabilir.\n"}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Hedef dilin yetkin kullanıcıları arasında canlı bir tartışmaya ayak uydurabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Fikirlerini ve görüşlerini net olarak ifade edebilir, karmaşık tartışma serisini ikna edici bir şekilde sunabilir ve karşı tarafınkileri yanıtlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Yorum yaparak, bir bakış açısını açık bir şekilde ortaya koyarak, alternatif önerileri değerlendirerek ve varsayımlarda bulunup farklı varsayımlara yanıt vererek, aşina olduğu bağlamlardaki resmî olmayan tartışmalarda aktif rol alabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Biraz çaba ile tartışma esnasında etrafında söylenenlerin çoğunu yakalayabilir ancak dilini hiçbir şekilde değiştirmeyen birden çok hedef dil kullanıcısıyla tartışmaya etkin bir şekilde katılmayı zor bulabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Uygun açıklamalarda bulunarak, savlar sunarak ve yorumlar yaparak, tartışmada görüşünü açıklayabilir ve onu destekleyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Muhatapların deyimsel kullanımlardan kaçınmaları ve anlaşılır biçimde sesletmeleri hâlinde, genel konular çevresinde söylenenlerin çoğunu takip edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Müzik veya filmler gibi soyut veya kültürel konular hakkında düşüncelerini ifade edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Bir şeyin neden bir problem olduğunu açıklayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Başkalarının görüşleri hakkında kısa yorumlar yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Ne yapılacağını, nereye gidileceğini, kimin veya neyin seçileceğini vb. tartışarak seçenekleri kıyaslayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Açık bir şekilde, standart bir dilde veya aşina olduğu bir ağızda sesletilmesi koşuluyla arkadaşlarla yapılan resmî olmayan bir tartışmada ana fikirleri genellikle takip edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "İlgi duyduğu konularda konuşurken kişisel görüş ve fikir isteyebilir, kendininkileri paylaşabilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Sorunlara getirilen çözümlere veya nereye gidileceği, ne yapılacağı veya bir etkinliğin nasıl organize edileceği (ör. bir gezi) ile ilgili pratik sorulara yönelik görüşlerini ve tepkilerini anlaşılır hâle getirebilir"}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "İnançları, görüşleri, anlaşma ve anlaşmazlıkları nazikçe ifade edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Yavaş ve açık bir şekilde yürütüldüğünde genellikle etrafındaki tartışma konusunu anlayabilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Basit bir dil kullanarak fikir alışverişinde bulunabilir, eşyaları ve insanları karşılaştırabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Akşam veya haftasonu ne yapacağını anlatabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Önerilerde bulunabilir, önerilere yanıt verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Diğerleriyle aynı fikirde olabilir ve olmayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Açık, yavaş ve kendisine doğrudan doğruya hitap edildiğinde günlük pratik sorunları basit bir şekilde tartışabilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Ne yapacağını, nereye gideceğini tartışabilir ve buluşma için düzenlemeler yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Görüşlerini sınırlı bir şekilde ifade edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Açık, yavaş ve doğrudan doğruya kendisine hitap edildiğinde sınırlı bir ifade birikimi kullanarak spor, yiyecek vb. için beğenilerini karşılıklı dile getirebilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "C2", "Tanımlayıcı": "Karmaşık meselelerle ilgili resmî tartışmada diğer katılımcıları güç duruma düşürmeden, açık ve ikna edici bir sav ortaya koyarak yerini koruyabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C2", "Tanımlayıcı": "Gerekli uzmanlık bilgisine sahip olmaları koşuluyla karmaşık, hassas veya tartışmalı konularda tavsiyede bulunabilir veya bunlarla baş edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C2", "Tanımlayıcı": "Tartışmada kötü niyetli sorularla güvenle baş edebilir, söz sırasını koruyabilir ve karşı savları diplomatik olarak çürütebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Soyut, karmaşık, aşina olmadığı konularda bile tartışmaya kolayca ayak uydurabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Soruları ve yorumları yanıtlayarak ve karmaşık karşı sav serisine akıcı, spontane ve uygun bir şekilde cevap vererek resmî bir durumu ikna edici bir şekilde savunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Akademik veya mesleki yetkinlikleri dâhilindeki meselelerde diğer katılımcıların yaptığı katkıları yeniden ifade edebilir, değerlendirebilir ve sorgulayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Kritik yorumlar yapabilir veya aynı fikirde olmadığını diplomatik biçimde ifade edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Daha fazla ayrıntı elde etmek için takip soruları sorabilir ve yanlış anlaşılması durumda sorularını yeniden ifade edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Görüşleri destekleyen ve onlara karşı çıkan savları doğru bir şekilde belirleyerek canlı bir tartışmaya ayak uydurabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Uzmanlık alanı ile ilgili diğer uzmanlarla tartışırken uygun teknik terminolojiyi kullanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Fikirlerini ve görüşlerini net olarak ifade edebilir, karmaşık bir sav serisi ikna edici bir şekilde sunabilir ve yanıt verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Rutin olan ve olmayan resmî tartışmalara aktif olarak katılabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Alanıyla ilgili meselelerdeki tartışmaları takip edebilir, öne çıkan noktaları detaylı olarak anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Katkıda bulunabilir, görüşlerini açıklayabilir ve onları destekleyebilir, alternatif önerileri değerlendirebilir ve varsayımlarda bulunabilir veya varsayımlar hakkında yorum yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Muhatapların fazla sayıda deyimsel kullanımından kaçınması ve anlaşılır biçimde sesletilmesi koşuluyla kendi alanıyla ilgili söylenenlerin çoğunu takip edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Bir bakış açısını açık bir şekilde ortaya koyabilir ancak tartışmaya girmekte güçlük çeker."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Standart bir dilde veya aşina olduğu bir ağızda anlaşılır biçimde sesletilenve olgusal bilgi alışverişine talimat almaya veya pratik sorunların çözümüne ilişkin tartışma içeren aşina olduğu konular üzerine rutin resmî tartışmalara katılabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Anlatılmak istenen noktaların nispeten basit bir dilde ifade edilmesi ve/veya tekrarlanması ve açıklama için fırsat verilmesi koşuluyla aşina olan veya tahmin edilebilir bir konuda oluşturulan savları ve tartışmayı takip edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Alanı ile ilgili yavaş ve açık bir şekilde yürütülen resmî tartışmalarda genellikle konu değişikliklerini takip edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Formülleştirirken biraz yardım alması ve gerekirse anahtar noktaların tekrarını isteyebilmesi koşuluyla konuyla ilgili bilgi alışverişi yapabilir ve doğrudan doğruya sorulduğunda pratik sorunlar hakkında fikir verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Gerektiğinde anahtar noktaların tekrarını isteyebilmesi koşuluyla resmî bir toplantıda kendisine doğrudan doğruya hitap edildiğinde konuyla ilgili fikrini söyleyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Başkalarının söylediklerini aktararak ve birden fazla bakış açısını özetleyerek, detaylandırarak ve değerlendirerek bir ortakla veya grupla bir eylem planına karar vermek için bir tartışma şekillendirebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Ayrıntılı yönergeleri güvenilir bir şekilde anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Başkalarını [yapılan işe] katılmaya ve düşündüklerini ifade etmeye vb. davet ederek işin ilerlemesine yardımcı olabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Sebepler veya sonuçlar hakkında tahminlerde bulunarak ve farklı yaklaşımların avantaj ve dezavantajlarını değerlendirerek bir konuyu veya sorunu açık bir şekilde özetleyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Söylenenleri takip edebilir ancak hızlı ve uzayan bir tartışmaysa zaman zaman tekrar veya açıklama istemek zorunda kalabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Bir şeyin neden sorun olduğunu açıklayabilir, bir sonraki adımda ne yapılacağını tartışabilir ve seçenekleri karşılaştırabilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Diğerlerinin görüşleri hakkında kısa yorumlarda bulunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Genellikle söylenenleri takip edebilir ve gerektiğinde karşılıklı anlaşmayı doğrulamak için birinin söylediklerinin bir kısmını tekrarlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Olası çözümlere veya bir sonraki adımda ne yapılacağı sorusuna yönelik görüşlerini ve tepkilerini kısa sebepler ve açıklamalar sunarak anlaşılır hâle getirebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Başkalarını nasıl ilerleyecekleri konusunda görüşlerini bildirmeye davet edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Basit, rutin görevleri anlamadığında çok basit bir şekilde tekrar edilmesini isteyerek bu görevleri fazla çaba harcamadan halledecek kadar anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Önerilerde bulunarak, diğer önerilere yorum yaparak, yönlendirmeler isteyerek ve yönlendirmelerde bulunarak bir sonraki adımda ne yapılacağını tartışabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Ne zaman takip edebildiğini belirtebilir ve muhatap olan kişi anlaması için uğraşırsa gerekenleri anlaması sağlanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Bir şeyler istemek veya sunmak, temel bilgiler edinmek ve bir sonraki adımda nelerin yapılacağını görüşmek için basit öbekler kullanarak basit ve rutin görevlerde iletişim kurabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Dikkatli ve yavaş bir şekilde yöneltilen soruları ve yönergeleri anlayabilir ve kısa, basit yönlendirmeleri takip edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Zaman, yer, sayı vb. içeren temel yönergelere göre hareket edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "İnsanlardan bir şeyler isteyebilir ve onlara bir şeyler verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Kamusal, mesleki veya akademik yaşamdaki karmaşık veya hassas işlemleri müzakere edebilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Hak edilmemiş bir trafik cezası, bir dairedeki hasarın mali sorumluluğu veya bir kazayla ilgili suçlama gibi anlaşmazlıkların çözümüne yönelik müzakerelerle dilsel olarak başa çıkabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "İkna edici bir dil kullanarak bir konudaki zararının giderilmesi için kendisini tatmin edecek adımların ana hatlarını belirleyebilir ve kendisine verilmesine hazır olunması gereken her türlü tavizin sınırlarını açıkça ifade edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Daha karmaşık hizmetlerle ilgili gereksinimleri belirtebilir ve ayrıntılı sorular sorabilir, ör. kira sözleşmeleri."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Ortaya çıkan bir sorunu açıklayabilir ve hizmet sağlayıcısının/müşterinin bir taviz vermesi gerektiğini açıkça belirtebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Seyahat ederken, seyahat veya konaklama ayarlarken veya bir yurt dışı ziyareti sırasında yetkililerle uğraşırken ortaya çıkması muhtemel çoğu işlemle ilgilenebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Bir karar vermek için bir mağazada aynı amaca hizmet eden iki veya daha fazla ürün arasındaki farkın açıklamasını, gerektiğinde takip soruları sorarak, isteyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Mağazalarda, postanelerde, bankalarda daha az rutin olan durumlarla (ör. tatmin etmeyen bir satın alma işlemi sonrası ürünü iade etme) başa çıkabilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Şikâyette bulunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Bir acente aracılığıyla seyahat düzenlemeleri yaparken veya seyahat ederken, ortaya çıkması muhtemel çoğu durumla başa çıkabilir, ör. aşina olmadığı bir yere giderken bir yolcuya nerede inmesi gerektiğini sormak."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Seyahat etme, konaklama, yemek yeme ve alışveriş yapma gibi günlük yaşamın sıradan durumlarıyla başa çıkabilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Geniş çeşitlilikte basit ifade kullanarak öngörülebilir günlük durumlarda (ör. postane, istasyon, mağaza) etkileşim kurabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Karmaşık olmayan, uzmanlık gerektirmeyen bir yapıda olduğu sürece, ihtiyaç duyulan tüm bilgileri bir turizm ofisinden alabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Günlük mal ve hizmetleri talep edebilir ve sağlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Seyahat hakkında basit bilgiler alabilir, toplu taşıma araçlarını kullanabilir (ör. otobüs, tren, taksi), yol sorabilir ve yol tarifi verebilir ve bilet satın alabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Mağazalarda, postanelerde veya bankalarda bir şeyler sorabilir ve basit işlemler yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Miktarlar, sayılar, fiyatlar vb. hakkında bilgi verebilir ve alabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Ne istediğini belirterek ve fiyat sorarak basit alışverişler yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Yemek siparişi verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Bir

şeylerin yanlış olduğunu söyleyebilir (ör. “Yemekler soğuk” veya “Odamda ışık yok”)."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "(Yüz yüze) tıbbi bir randevu talep edebilir ve verilen yanıtı anlayabilir. Bir sağlık çalışanına bir sorunun kaynağını, bir ihtimalle jestleri ve beden dilini kullanarak, gösterebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "İnsanlardan bir şeyler isteyebilir ve onlara bir şeyler verebilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Basit ifadeler kullanarak yiyecek ve içecek isteyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Sayıları, miktarları, maliyeti ve zamanı anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "İşaret ederek veya başka bir jestle sözlü gönderimleri destekleyebilir ve basit alışverişler yapabilir, yiyecek veya içecek sipariş edebilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Mesleki rolleriyle ilgili tüm çeşitlilikteki konularda karmaşık bilgi ve tavsiyeleri anlayabilir ve bilgi alışverişi yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Diğer uzmanlarla bilgi alışverişinde bulunurken veya uzmanlık alanını tartışırken uygun teknik terminolojiyi kullanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Ayrıntılı bilgileri güvenilir bir şekilde aktarabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Bir işlemin nasıl yürütüleceğine dair net ve ayrıntılı bir açıklama yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Çeşitli kaynaklardan bilgi ve savları sentezleyebilir ve raporlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Biraz güvenle kendi alanındaki rutin ve rutin olmayan aşina konularda bir araya getirilmiş olgusal bilgileri verebilir, kontrol edebilir ve onaylayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Kısa bir hikâye, makale, konuşma, tartışma, mülakat veya belgeseli özetleyebilir, bunlarla ilgili görüşünü bildirebilir ve daha ayrıntılı soruları yanıtlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Karmaşık olmayan olgusal bilgileri bulabilir ve iletebilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Ayrıntılı yönlendirme sorabilir ve verilen yönlendirmeyi takip edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Daha detaylı bilgi alabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Kendi deneyim alanlarındaki basit konular hakkında tavsiyelerde bulunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Aşırı çaba sarf etmeden basit, rutin bilgi alışverişlerini idare edecek kadar anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Karmaşık olmayan, olgusal bilgileri bularak ve aktararak, pratik günlük taleplerle başa çıkabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Alışkanlıklar ve rutinler hakkında sorular sorabilir ve cevaplayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Eğlenceli uğraşlar ve geçmiş etkinlikler hakkında sorular sorabilir ve cevaplayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Planlar ve niyetler hakkında sorular sorabilir ve cevaplayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Basit yönlendirmeler ve yönergeler verebilir veya onları takip edebilir, ör. bir yere nasıl gidileceği."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Basit ve doğrudan doğruya bilgi alışverişi gerektiren basit ve rutin görevlerde iletişim kurabilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Aşina olduğu rutin işlevsel konularda sınırlı bilgi alışverişinde bulunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "İş yerinde ve serbest zamanlarında yaptıkları ile ilgili sorular sorabilir ve cevaplayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Bir harita veya plana atıfta bulunarak bir yön sorabilir ve bir yön tarifi yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Kişisel bilgi isteyebilir ve verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Bir olay hakkında basit sorular sorabilir ve cevaplayabilir (ör. olayın nerede ve ne zaman gerçekleştiğini, orada kimin olduğunu ve nasıl gerçekleştiğini sorabilir)."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Dikkatli ve yavaş bir şekilde yöneltilen soruları ve yönergeleri anlayabilir ve kısa, basit yönlendirmeleri takip edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Basit sorular sorabilir ve cevaplayabilir, öncelikli ihtiyaç duyulan alanlarda veya çok aşina olduğu konularda basit açıklamalarla konuşma başlatabilir veya bu açıklamalara yanıt verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Kendisi ve diğer insanlarla ilgili, nerede yaşadığı, tanıdığı insanlar, sahip olduğu şeyler hakkında sorular sorup cevaplayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "“Gelecek hafta”, “Geçen Cuma”; “Kasım’da”; “Saat 3’te” gibi sözcükselleşmiş öbekler kullanarak zaman belirtebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Sayıları, miktarları ve maliyeti sınırlı bir şekilde ifade edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Giysilerin veya diğer aşina olduğu nesnelerin rengini adlandırabilir ve onların rengini sorabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "İnsanlara kendi ismini söyleyebilir ve diğer insanlara isimlerini sorabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Günlük karşılıklı konuşmalarda basit sayıları kullanabilir ve onları anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Hangi gün, saat ve tarih olduğunu sorup söyleyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Doğum tarihi isteyip verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Telefon numarası isteyip verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "İnsanlara yaşını söyleyebilir ve onlarınkini sorabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Bilgi için “Bu nedir?” gibi çok basit sorular sorabilir ve işaret dilinde verilen bir iki kelimelik yanıtları anlayabilir"}, {"Temel Beceri": "Konuşma", "Seviye": "C2", "Tanımlayıcı": "Mülakat yapan veya mülakata giren olarak, diğer katılımcıları güç duruma düşürmeden, zahmetsiz bir akıcılıkla konuşmayı şekillendirerek ve yetkin bir biçimde etkileşimde bulunarak, diyalogdaki kendi kısmını son derece iyi takip edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Mülakata giren veya mülakat yapan olarak, tartışılan konuyu herhangi bir destek almadan akıcı bir şekilde genişleterek ve geliştirerek ve ünlem belirten ifadeleri iyi kullanarak bir mülakata tam katılım sağlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Hazırlanmış sorulardan spontane bir şekilde ayrılarak, takip soruları sorarak ve ilginç cevaplar almaya yönelik ek sorular sorarak etkin, akıcı bir mülakat gerçekleştirebilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Bir mülakatta inisiyatif alabilir ve mülakatı yapandan çok az yardım veya teşvik alarak fikirlerini genişletebilir ve geliştirebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Bir mülakatta/danışmada gerekli olan somut bilgileri sağlayabilir (ör. bir doktora belirtileri tarif edebilir) ancak netlik açısından biraz kısıtlıdır. "}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Diğer kişinin hızlı ve uzayan bir yanıtı olursa, ara sıra tekrar istemek zorunda kalsa bile, bilgileri kontrol ederek ve onaylayarak yapılandırılmış bir görüşme yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Bir görüşmede/danışmada biraz inisiyatif alabilir (ör. yeni bir konuyu gündeme getirmek için) ancak etkileşimde mülakat yapana çok bağlıdır."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Belirtileri basit bir şekilde betimleyebilir, sağlık hizmetlerini kullanırken tavsiye isteyebilir ve günlük dilde açık bir şekilde verilmesi koşuluyla cevabı anlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Bazı spontane takip soruları içeren, yapılandırılmış bir mülakat yapmak için hazır bir anket kullanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Ara sıra açıklama isteyebilmesi ve istediğini ifade etmesi için biraz yardım alması koşuluyla bir mülakatta kendini anlatabilir ve aşina olduğu konular hakkında fikir ve bilgi verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Soğuk algınlığı veya grip gibi çok temel belirtileri ve rahatsızlıkları bir doktora tarif edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Bir mülakatta basit soruları yanıtlayabilir ve basit açıklamalara karşılık verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Bir sağlık çalışanına, belki de jest ve beden dilini kullanarak yaşadığı sorunun doğasını basit bir dille belirtebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Deyimsel olmayan bir dille, çok yavaş ve açık bir şekilde, bir mülakatta kişisel bilgileri hakkında doğrudan doğruya sorulan soruları yanıtlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Mesajı güçlendirmek için jest ve beden dilini kullanmak zorunda olsa bile, bir sağlık çalışanına bir problemin nedenini basit bir dille ifade edebilir ve “Bu acıtıyor mu?” gibi basit soruları yanıtlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C2", "Tanımlayıcı": "Biraz parazit (gürültü) veya arayanın daha az aşina olduğu bir aksanı olsa bile iletişim/haberleşme araçlarını hem kişisel hem de mesleki amaçlar için güvenle ve etkili bir şekilde kullanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Çoğu mesleki veya kişisel amaçlar için iletişim/ haberleşme araçlarını etkin bir şekilde kullanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Aksan veya terminoloji aşina değilse, açıklama talep edebilmesi koşuluyla, iletişim/haberleşme araçlarını çeşitli kişisel ve mesleki amaçlar için kullanabilir"}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Aşina olduğu bir kişiyle çeşitli konularda telefon üzerinden uzayan, gündelik karşılıklı konuşmaya katılabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Zaman zaman açıklama talep edebilmesi koşuluyla iletişim/haberleşme araçlarını günlük kişisel veya mesleki amaçlar için kullanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Beklenmeyen bir olayla ilgili önemli ayrıntıları (görüntülü) telefon üzerinden verebilir (ör. otelle, seyahat düzenlemeleriyle veya kiralık arabayla ilgili bir sorun)."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Kişisel olarak tanıdığı insanlarla nispeten basit ama uzayan görüşmeler yapmak için iletişim/haberleşme araçlarını kullanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Rutin mesajlar (ör. bir toplantı için düzenlemeler) ve temel hizmetleri almak (ör. bir otel odası rezervasyonu yapmak veya tıbbi randevu almak) için iletişim/haberleşme araçlarını kullanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Arkadaşlarıyla basit haber alışverişi yapmak, planlar yapmak ve buluşma ayarlamak için iletişim/haberleşme araçlarını kullanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Tekrarlar ve açıklamalar verildiğinde aşina olduğu bir kişiyle öngörülebilir bir konuda kısa, basit bir telefon görüşmesine katılabilir, ör. varış saatleri, buluşma ayarlamaları."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Basit bir mesajı anlayabilir (ör. “Uçağım gecikti. Saat 10:00’da varacağım.”), mesajın ayrıntılarını onaylayabilir ve ilgili diğer kişilere telefonla iletebilir."}, {"Temel Beceri": "Yazma", "Seviye": "C2", "Tanımlayıcı": "Hemen hemen her türlü resmî ve resmî olmayan etkileşimde kendini uygun bir ton ve tarzda ifade edebilir."}, {"Temel Beceri": "Yazma", "Seviye": "C1", "Tanımlayıcı": "Hitap edilen kişi ile esnek ve etkili bir şekilde ilişki kurarak kendini açıklıkla ve net bir şekilde ifade edebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2", "Tanımlayıcı": "Haberleri ve görüşleri etkili bir şekilde yazılı olarak ifade edebilir ve başkalarının ifadeleriyle ilişki kurabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1+", "Tanımlayıcı": "Hem somut hem de soyut konular hakkında bilgi ve fikir iletebilir, bilgileri kontrol edebilir ve sorunlar hakkında makul bir netlikte soru sorabilir veya problemleri açıklayabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1", "Tanımlayıcı": "Önemli olduğunu düşündüğü noktayı izah ederek konuyla yakından ilgili basit bilgiler isteyen veya bunları ileten kişisel mektuplar ve notlar oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "Öncelikli ihtiyaç duyulan alanlardaki meselelerle ilgili kısa, basit kalıp notlar oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A1", "Tanımlayıcı": "Kişisel bilgiler sorabilir veya verebilir. "}, {"Temel Beceri": "Yazma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Bir sözlük kullanarak temel bilgileri (ör. ad, adres, aile) kısa öbekler hâlinde bir formda veya bir notta iletebilir."}, {"Temel Beceri": "Yazma", "Seviye": "C2", "Tanımlayıcı": "Mesleki yaşamı boyunca gerekli olan hemen hemen her türlü yazışmayı uygun bir ton ve tarzla oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "C1", "Tanımlayıcı": "Duygusal, kinayeli ve şakacı kullanım da dâhil olmak üzere, dili esnek ve etkili bir şekilde kullanarak, kişisel yazışmalarda kendisini açıklıkla ve net bir biçimde ifade edebilir."}, {"Temel Beceri": "Yazma", "Seviye": "C1", "Tanımlayıcı": "Açıklama, başvuru, tavsiye, referans, şikâyet, taziye ve başsağlığı mektupları gibi resmî yazışmaları, iyi bir ifadeyle ve doğrulukla oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2+", "Tanımlayıcı": "Deneyimlerin ayrıntılı betimlemelerini yapmak, anlayışlı bir şekilde sorular sormak ve karşılıklı çıkar meselelerini takip etmek için dili akıcı ve etkili bir şekilde kullanarak kişisel yazışmalar yoluyla bir ilişki sürdürebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2+", "Tanımlayıcı": "Çoğu durumda yazışmalardaki ve diğer iletişimlerdeki deyimsel ifadeleri ve gündelik anlatımı anlayabilir ve duruma uygun olarak en yaygın olanları kullanabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2+", "Tanımlayıcı": "Uygun üslup, dil yapısı ve kuralları kullanarak sorgu, talep, başvuru ve şikâyet mektupları gibi resmî yazışmalar oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2+", "Tanımlayıcı": "Destekleyici ayrıntılar ve istenen sonucun bir beyanını da içeren, güçlü ancak nazik bir şikâyet mektubu oluşturabilirler."}, {"Temel Beceri": "Yazma", "Seviye": "B2", "Tanımlayıcı": "Duyguların derecelerini ifade eden, olayların ve deneyimlerin kişisel önemini vurgulayan ve mektuplaştığı kişinin haberleri ve görüşleri hakkında yorum yapan mektuplar oluşturabilir. "}, {"Temel Beceri": "Yazma", "Seviye": "B2", "Tanımlayıcı": "Kişisel ve mesleki mektup ve e-posta yazarken, bağlama uygun resmiyeti ve kurallarını kullanabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2", "Tanımlayıcı": "Uygun üslup ve kuralları kullanarak resmî davet, teşekkür veya özür mektupları/ e-postaları oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2", "Tanımlayıcı": "Olgularla sınırlı olmaları koşuluyla uygun dil yapısı ve kuralları kullanarak rutin olmayan mesleki mektuplar oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2", "Tanımlayıcı": "Belirli bir amaç için gerekli bilgileri mektup veya e-posta yoluyla elde edebilir, derleyebilir ve e-posta yoluyla diğer kişilere iletebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1+", "Tanımlayıcı": "Müzik veya film gibi soyut veya kültürel konular hakkında bilgi veren ve düşüncelerini ifade eden kişisel mektuplar oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1+", "Tanımlayıcı": "Farklı görüşleri ifade eden ve kişisel duygu ve deneyimlerinin ayrıntılı açıklamalarını yapan mektuplar oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1+", "Tanımlayıcı": "Bir reklama yazılı olarak yanıt verebilir ve ilgisini çeken ürün hakkında daha fazla bilgi isteyebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1+", "Tanımlayıcı": "Başlıca resmî e-postaları/mektupları oluşturabilir (ör. şikâyette bulunmak ve eylem talep etmek için)."}, {"Temel Beceri": "Yazma", "Seviye": "B1", "Tanımlayıcı": "Deneyimleri, duyguları ve olayları ayrıntılı olarak anlatan kişisel mektuplar oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1", "Tanımlayıcı": "Olgusal nitelikteki temel e-postaları/mektupları oluşturabilir (ör. bilgi talep etmek veya onay istemek ve vermek için)."}, {"Temel Beceri": "Yazma", "Seviye": "B1", "Tanımlayıcı": "Sınırlı seviyede destekleyici ayrıntılarla temel bir başvuru mektubu oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2+", "Tanımlayıcı": "Kısa mesaj, e-posta veya kısa mektuplarla, diğer kişiden gelen sorulara (ör. yeni bir ürün veya etkinlik hakkında) yanıt vererek bilgi alışverişinde bulunabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "Teşekkür eden ve özür dileyen çok basit kişisel mektuplar oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "Kendini tanıtan kısa bir e-posta veya mektup gibi rutin nitelikteki kişisel bilgileri iletebilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "Kısa, basit notlar, e-postalar ve metin mesajları oluşturabilir (ör. bir davetiye göndermek veya daveti yanıtlamak, bir düzenlemeyi onaylamak veya değiştirmek için)."}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "Bir tebrik kartında kısa bir metin oluşturabilir (ör. birinin doğum günü için veya ona mutlu yıllar dilemek için)."}, {"Temel Beceri": "Yazma", "Seviye": "A1", "Tanımlayıcı": "Sözlük kullanarak, basit sözcükler ve kalıplaşmış ifadelerle, hobileri ve hoşlandığı/hoşlanmadığı şeyler hakkında bir dizi çok kısa cümleden oluşan mesajlar ve çevrim içi gönderiler oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A1", "Tanımlayıcı": "Kısa, basit bir kartpostal oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A1", "Tanımlayıcı": "Arkadaşlarına bir miktar bilgi vermek veya bir soru sormak için kısa, çok basit bir mesaj (ör. SMS mesajı) oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Sözlük kullanarak, temel kişisel bilgileri kısa öbekler ve cümleler hâlinde aktarabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2", "Tanımlayıcı": "Gerektiğinde açıklama veya detaylandırma talebinde bulunabilmesi koşuluyla karmaşık kişisel veya mesleki mesajlar alabilir veya bırakabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1+", "Tanımlayıcı": "Kişisel, mesleki veya akademik bağlamda ortaya çıkması muhtemel rutin mesajları alabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1+", "Tanımlayıcı": "Sorguları ileten ve sorunları açıklayan mesajlar alabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1", "Tanımlayıcı": "Önemli olduğunu düşündüğü noktaları anlaşılır bir şekilde ileterek arkadaşlarına, hizmetlilere, öğretmenlere ve günlük yaşamında yer alan diğer kişilere konuyla yakından ilgili basit bilgileri aktaran notlar oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1", "Tanımlayıcı": "Arayanın açıkça ve anlayışlı bir biçimde dikte ettirmesi koşuluyla telefonda birkaç nokta içeren mesajları alabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2+", "Tanımlayıcı": "[Karşı tarafın] tekrar ve yeniden ifade etmesini isteyebilmesi koşuluyla kısa, basit bir mesaj alabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "Öncelikli ihtiyaç duyulan alanlardaki meselelerle ilgili kısa, basit notlar ve mesajlar oluşturabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "Günlük formların çoğunda (ör. bir banka hesabı açmak veya taahhütlü teslimat yoluyla bir mektup göndermek) kişisel ve diğer ayrıntıları doldurabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A1", "Tanımlayıcı": "Bir form üzerinde (ör. otel kayıt formunda), numaraları ve tarihleri, kendi adını, uyruğunu, adresini, yaşını, doğum tarihini veya ülkeye varış tarihini vb. doldurabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A1", "Tanımlayıcı": "Örneğin nereye gittiği veya ne zaman döneceği hakkında bilgi veren basit bir mesaj bırakabilir (ör. “Alışveriş: 17:00’de dönüş”)."}, {"Temel Beceri": "Yazma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Çok basit kayıt formlarını isim, adres, uyruk, medeni hâl gibi temel kişisel bilgileri ile doldurabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C2", "Tanımlayıcı": "Gerçek zamanlı çevrim içi tartışmalarda, dili esnek ve bağlama duyarlı bir şekilde ayarlayarak duygusal, kinaye içeren ve şaka amaçlı kullanım dâhil olmak üzere, kendini açıklık ve netlik içinde ifade edebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C2", "Tanımlayıcı": "Çevrim içi bir tartışmada olası yanlış anlamaları (kültürel olanlar dâhil olmak üzere), iletişim sorunlarını ve duygusal tepkileri öngörebilir ve bunlarla etkin bir şekilde başa çıkabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C2", "Tanımlayıcı": "Üslubunu ve tarzını, farklı çevrim içi ortamlara iletişim amaçlarına ve söz eylem biçimlerine göre kolayca ve hızlı bir şekilde uyarlayabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Birden fazla katılımcıyla çeşitli katkıların iletişimsel niyetlerini ve kültürel imalarını anlayarak gerçek zamanlı çevrim içi [bilgi/görüş] alışverişinde bulunabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Canlı, çevrim içi mesleki veya akademik tartışmalara gerektiğinde karmaşık ve soyut konulara ilişkin ek açıklamalar isteyerek ve açıklama yaparak etkin bir şekilde katılabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Gerekirse aynı [bilgi/görüş] alışverişinde bir üsluptan diğerine geçerek, çevrim içi etkileşim bağlamına göre üslubunu uyarlayabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Mesleki veya akademik canlı çevrim içi karşılıklı konuşma ve tartışmada savları değerlendirebilir, yeniden ifade edebilir ve sorgulayabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2+", "Tanımlayıcı": "Katkılarını mesaj dizisindeki önceki katkılara bağlayarak, kültürel imaları anlayarak ve uygun şekilde onlara tepki vererek çevrim içi [bilgi/görüş] alışverişine katılabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Katkıda bulunanların olağandışı veya karmaşık bir dilden kaçınması ve yanıtlar için zaman tanıması koşuluyla ilgi alanına giren konularda belirli bir uzunlukta görüş bildirerek ve bildirilen görüşlere karşılık vererek çevrim içi tartışmalara aktif olarak katılabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Bir moderatörün tartışmayı yönetmeye yardımcı olması koşuluyla katkısını mesaj dizisindeki önceki katkılara etkin bir şekilde bağlayarak birden fazla katılımcının bulunduğu çevrim içi [bilgi/görüş] alışverişine katılabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Muhatabın/muhatapların iş birliği yapmaya istekli olması koşuluyla çevrim içi bir etkileşimde ortaya çıkan yanlış anlamaları ve anlaşmazlıkları fark edip bunlarla baş edebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1+", "Tanımlayıcı": "Her katılımcının iletişimsel niyetini fark ederek birden fazla katılımcıyla gerçek zamanlı çevrim içi bilgi alışverişlerinde bulunabilir ancak ek açıklama yapılmadan ayrıntıları veya sonuçları anlayamayabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1+", "Tanımlayıcı": "Gömülü bağlantılara ve medyaya gönderimde bulunarak ve kişisel duygularını ifade ederek çevrim içi sosyal olaylara, deneyimlere, etkinliklere yönelik anlatısal paylaşımda bulunabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1", "Tanımlayıcı": "Metni önceden hazırlayabilmesi ve dildeki açıkları kapatmak ve doğruluğunu kontrol etmek için çevrim içi araçları kullanabilmesi koşuluyla ilgi alanına giren aşina olduğu bir konu hakkında çevrim içi bir tartışmada anlaşılır bir katkı paylaşabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1", "Tanımlayıcı": "Sözcüksel kısıtlar nedeniyle kimi zaman tekrarlar ve uygun olmayan yapılar kullansa bile deneyimler, duygular ve olaylar hakkında kişisel çevrim içi paylaşımlar yapabilir ve başkalarının yorumlarına bir miktar ayrıntıya girerek bireysel olarak yanıt verebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2+", "Tanımlayıcı": "Yanıtlarını ifade etmek için yeterli zaman verilmesi ve her seferinde tek bir muhatap ile etkileşime girmesi koşuluyla sorular sorarak ve yanıtlayarak ve öngörülebilir günlük konular hakkında fikir alışverişinde bulunarak kendisini tanıtabilir ve çevrim içi olarak basit bir [bilgi] alışverişinde bulunabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2+", "Tanımlayıcı": "Basit temel ayrıntılarla günlük konular, sosyal etkinlikler ve duygular hakkında kısa, açıklayıcı çevrim içi paylaşımda bulunabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2+", "Tanımlayıcı": "Basit bir dilde yazılmış/işaretlenmiş olmaları koşuluyla gömülü medyaya yönelik şaşkınlık, ilgi ve kayıtsızlık duygularını basit bir şekilde ifade ederek diğer kişilerin çevrim içi gönderilerine yorum yapabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2", "Tanımlayıcı": "Çevrim içi olarak temel sosyal iletişim kurabilir (ör. sanal ortamda bir karta özel durumlar için basit bir mesaj yazma, haber paylaşma ve buluşma ayarlamaları yapma/ayarlamaları teyit etme)."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2", "Tanımlayıcı": "Genel olarak bir çevrim içi çeviri aracına ve diğer kaynaklara başvurması gerekmesine rağmen temel dil birikimini kullanarak gömülü bağlantılar ve gömülü medya hakkında olumlu veya olumsuz çevrim içi kısa yorumlar yapabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A1", "Tanımlayıcı": "Bir çeviri aracının yardımıyla hobiler, beğenilip beğenilmeyenler vb. hakkında çok basit mesajlar ve kişisel çevrim içi bildirimleri bir dizi çok kısa cümle hâlinde düzenleyebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A1", "Tanımlayıcı": "Basit çevrim içi gönderilere ve bunların gömülü bağlantılarına ve medyalarına basit sözcüklerle/işaretlerle olumlu veya olumsuz kısa tepkiler veren ifadeler düzenleyebilir, daha sonraki yorumlara standart teşekkür ve özür ifadeleriyle yanıt verebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Temel kalıplaşmış ifadeler ve yüz ifadelerini belirten ikonlar [emoticons] kullanarak basit çevrim içi kutlama bildirimlerinde bulunabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Bir menüden seçebilmesi ve/veya çevrim içi bir çeviri aracına başvurması koşuluyla kendisi hakkında (ör. ilişki durumu, uyruk, meslek) çevrim içi kısa basit bildirimlerde bulunabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C2", "Tanımlayıcı": "Yanlış anlamaları çözüme kavuşturabilir ve iş birliği sürecinde ortaya çıkan sürtüşmelerle etkin şekilde baş edebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C2", "Tanımlayıcı": "İş birliğine dayalı çalışmanın düzeltme ve düzenleme aşamalarında bir gruba rehberlik edebilir ve çalışmaya netlik katabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Ayrıntılı yönergeleri düzenleyerek ve tekrar gözden geçirip düzelterek, ekip üyelerinden gelen önerileri değerlendirerek ve paylaşılan görevleri gerçekleştirmek amacıyla açıklamalar sağlayarak çevrim içi bir proje üzerinde çalışan bir grubu koordine edebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Tartışmaları ve müzakereleri yönetmek için kullandığı dili esnek bir şekilde uyarlayarak bir hizmet rolündeki (ör. karmaşık gereksinimlere sahip uygulamalar) çevrim içi işlemlerle ilgilenebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Hedefe ulaşmak amacıyla yönergeleri net bir biçimde takip ederek ve aktararak diğer çevrim içi iş birliği\nbiçimlerinin yanı sıra ortak yazma ve gözden geçirip yeniden düzenleme gerektiren karmaşık projelere\nkatılabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Çevrim içi iş birliğine dayalı veya işlemsel bilgi alışverişlerinde ortaya çıkan iletişim sorunlarıyla ve kültürel  meselelerle ifadelerini yeniden düzenleyerek, netleştirerek ve medya (görsel, işitsel, grafik) aracılığıyla örnekler sunarak etkili bir şekilde başa çıkabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2+", "Tanımlayıcı": "Belirlenen hedeflere ulaşmak amacıyla gruba rollerini, sorumluluklarını ve son teslim tarihlerini hatırlatarak grubu görevde tutup uzmanlık alanlarındaki çevrim içi iş birliğine dayalı çalışmalarda lider rolü üstlenebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2+", "Tanımlayıcı": "Koşulların müzakere edilmesini ve karmaşık ayrıntıların ve özel gereksinimlerin açıklanmasını gerektiren uzmanlık alanına giren çevrim içi iş birliğine dayalı veya işlemsel bilgi alışverişlerine katılabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2+", "Tanımlayıcı": "Sorunu çözmeye yardımcı olmak amacıyla nazikçe ve uygun şekilde yanıt vererek çevrim içi iş birliğine dayalı veya işlemsel bilgi alışverişinde ortaya çıkan yanlış anlamalarla ve beklenmeyen sorunlarla baş edebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Ortak görevlerin tamamlanmasını sağlamak amacıyla, önerilerini gerekçelendirerek ve destekleyici bir rol oynayarak bir proje üzerinde çalışan bir grupla çevrim içi iş birliği yürütebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1+", "Tanımlayıcı": "Muhatabın karmaşık dilden kaçınması ve gerektiğinde tekrar etmeye ve yeniden ifade etmeye istekli olması koşuluyla uzayan bir bilgi alışverişi gerektiren çevrim içi işlemlerde bulunabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1+", "Tanımlayıcı": "Karmaşık olmayan yönergeleri izleyerek, açıklık getirilmesini isteyerek ve ortak görevlerin tamamlanmasına yardımcı olarak bir proje üzerinde çalışan bir grupla çevrim içi ortak etkileşimde bulunabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1", "Tanımlayıcı": "Bir kursa, tura veya etkinliğe kaydolmak veya üyelik başvurusu yapmak gibi durumlarda ilgili ayrıntılar hakkında basit bir açıklama yapılmasını gerektiren çevrim içi iş birliğine dayalı veya işlemsel bilgi alışverişlerine katılabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1", "Tanımlayıcı": "Daha karmaşık kavramları açıklığa kavuşturmak için resimler, istatistikler ve grafikler gibi görsel yardımcılar olması koşuluyla bir proje üzerinde çalışan bir ortakla veya küçük grupla çevrim içi etkileşim kurabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1", "Tanımlayıcı": "Paylaşılan çevrim içi bir görevi yerine getirmek amacıyla yönergeleri uygulayabilir, sorular sorabilir veya açıklamalar talep edebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2+", "Tanımlayıcı": "Çevrim içi işlemlerde baş gösteren rutin sorunlara (modeller veya özel tekliflerin bulunup bulunmadığı teslimat tarihleri, adres bilgileri vb.) kalıplaşmış bir dille yanıt verebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2+", "Tanımlayıcı": "İlgili kavramları açıklamak için resimler, istatistikler ve grafikler gibi görsel yardımcıların bulunması koşuluyla, talimatları uygulayarak ve açıklamalar isteyerek basit iş birliğine dayalı bir görevde destekleyici bir ortakla çevrim içi etkileşim kurabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2", "Tanımlayıcı": "Kişisel bilgiler verme, hüküm ve koşulları kabul etme, ilave hizmetleri reddetme ve benzer şeyler için çevrim içi bir form veya anket doldurarak basit çevrim içi işlemleri (ürün sipariş etme, bir kursa kaydolma vb.) gerçekleştirebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2", "Tanımlayıcı": "Bir ürün veya özelliğin var olup olmadığı hakkında temel sorular sorabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2", "Tanımlayıcı": "Destekleyici bir muhatap yardımıyla çevrim içi olarak paylaşılan bir görevi yerine getirmek için basit yönergeleri uygulayabilir ve basit sorular sorabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A1", "Tanımlayıcı": "Temel kişisel bilgileri (ör. isim, e-posta veya telefon numarası) sağlayarak çok basit bir çevrim içi satın almayı veya başvuruyu tamamlayabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Görsel destek olması koşuluyla, basit bir çevrim içi satın alma veya başvuru formunda seçimler yapabilir (ör. bir ürün, beden, renk seçimi)."}, {"Temel Beceri": "Konuşma", "Seviye": "C2", "Tanımlayıcı": "Alıcının önemli noktaları fark etmesine ve hatırlamasına yardımcı olan etkili bir mantıksal yapıya sahip, açık, akıcı, iyi yapılandırılmış söylemler üretebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Karmaşık konularda, alt temaları bütünleştirerek, belirli noktaları geliştirerek ve uygun bir sonuçla tamamlayarak açık, ayrıntılı açıklamalar ve sunumlar yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Önemli noktaların uygun şekilde vurgulandığı ilgili destekleyici ayrıntılarla birlikte açık, sistematik olarak geliştirilmiş açıklamalar ve sunumlar yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "İlgi alanları ile ilgili çok çeşitli konularda, yardımcı/tamamlayıcı noktalar ve ilgili örneklerle fikirleri genişletip destekleyerek açık, ayrıntılı betimlemeler ve sunumlar yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "İlgi alanları dâhilindeki çeşitli konulardan birinin karmaşık olmayanbir tanımını, doğrusal bir noktalar dizisi olarak sunarak, kabul edilebilir ve akıcı bir şekilde sürdürebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "İnsanların yaşam veya çalışma koşullarının, günlük rutinlerin, beğenilen/beğenilmeyen şeylerin vb. kısa bir dizi basit öbekler ve cümleler olarak bağlı bir liste hâlinde basit bir tanımını verebilir veya sunumunu yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "İnsanlar ve yerler hakkında basit, çoğunlukla birbirinden kopuk öbekler üretebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Temel kişisel bilgileri (ör. isim, adres, aile, uyruk) vererek kendisi hakkında kısa öbekler üretebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C2", "Tanımlayıcı": "Açık, akıcı, ayrıntılı ve çoğu zaman akılda kalan betimlemeler verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Karmaşık konuların açık, ayrıntılı betimlemeler verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Alt temaları bütünleştirerek, belirli noktalar geliştirerek ve bunları uygun bir sonuçla tamamlayarak ayrıntılı betimlemeler ve deneyimler/anlatılar verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "İlgi alanlarıyla ilgili çok çeşitli konularda açık, ayrıntılı betimlemeler yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Olayların ve deneyimlerin kişisel önemini ayrıntılı olarak açıklayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Deneyimlenen bir şey hakkındaki duygularını açıkça ifade edebilir ve bu duyguları açıklamak için nedenler sunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "İlgi alanları dâhilindeki çeşitli aşina olduğu konularda karmaşık olmayan açıklamalar yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "CaKarmaşık olmayan bir anlatıyı veya açıklamayı bir olaylar dizisi olarak kabul edilebilir ve akıcı bir şekilde\nilişkilendirebilir. Duyguları ve tepkileri açıklayarak, deneyimlerinin ayrıntılı açıklamalarını verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Öngörülemeyen olayların ayrıntılarını ilişkilendirebilir, örneğin bir kaza."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Bir kitabın veya filmin konusunu ilişkilendirebilir ve tepkilerini anlatabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Hayalleri, umutları ve hırsları tanımlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Gerçek veya hayali olayları anlatabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Bir hikâye anlatabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Bir hikâye anlatabilir veya herhangi bir şeyi basit bir liste şeklinde tanımlayabilir.\nÇevrelerini günlük yönleriyle (ör. insanlar, yerler, bir iş veya eğitim deneyimi) tanımlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Olayların ve etkinliklerin kısa, temel tanımlarını verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Planları ve düzenlemeleri, alışkanlıkları ve rutinleri, geçmiş etkinlikleri ve kişisel deneyimleri tanımlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Nesneler ve varlıklar hakkında kısa açıklamalar yapmak ve bunları karşılaştırmak için basit betimleyici bir dil kullanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Bir konuda neyi sevip neyi sevmediğini açıklayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Ailesini, yaşam koşullarını, eğitim geçmişini, şimdiki veya en son işini tanımlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "İnsanları, yerleri ve eşyaları basit terimlerle tanımlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Nelerde iyi olduğunu ve nelerde o kadar iyi olmadığını ifade edebilir (ör. spor, oyunlar, beceriler, konular)."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Hafta sonu veya tatillerde ne yapmayı planladığını kısaca anlatabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Kendisini, ne yaptığını ve nerede yaşadığını anlatabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Önceden hazırlanabilmesi koşuluyla günlük yaşamlarını basit yönleriyle basit kelimeler/işaretler kullanarak bir dizi basit cümleyle ve temel öbeklerle anlatabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Önceden hazırlanabilmesi koşuluyla basit kelimeler/işaretler ve kalıplaşmış ifadeler kullanarak kendisini (ör. isim, yaş, aile) tanımlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Beden dili eşliğinde “mutlu” veya “yorgun” gibi basit sıfatları kullanarak nasıl hissettiğini ifade edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Birbirine çok benzeyen fikirler, kavramlar ve şeyler arasındaki açık ve ayrıntılı farklılıkları/ayrımları iletebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Bir dizi karmaşık mesleki veya akademik prosedürün uygulanması konusunda talimat verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Mesleki rolleriyle ilgili her çeşit meselelere dair karmaşık bilgiler ve tavsiyeler iletebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Ayrıntılı bilgileri güvenilir bir şekilde iletebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Bir prosedürün nasıl uygulanacağına yönelik açık ve ayrıntılı bir betimleme verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Bir fikir veya problemdeki ana fikirleri kabul edilebilir bir netlikle açıklayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Ayrıntılı talimatlar vererek bir şeyin nasıl yapılacağını tarif edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Önceden hazırlanabilmesi koşuluyla aşina olduğu bir konu hakkında (ör. bir sorunun doğasını belirtmek veya ayrıntılı tarifler vermek gibi) karmaşık olmayan olgusal bilgileri rapor edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "“Sağa dön” ve “düz git” gibi temel ifadelerin yanı sıra “ilk”, “sonra” ve “sonraki” gibi sıralı bağlayıcıları kullanarak  X’ten Y’ye nasıl gidileceğine yönelik basit yönergeler verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Önceden hazırlanabilmesi koşuluyla bir nesneyi adlandırabilir, şeklini ve rengini başkalarına gösterirken temel kelimeler/işaretler, öbekler, deyimler ve kalıplaşmış ifadeler kullanarak gösterebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Konuya yönelik noktaları tam olarak ifade ederek ve vurguyu etkili bir şekilde kullanarak karmaşık bir konuda bir durumu tartışabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "İyi yapılandırılmış bir dilde, sistematik olarak muhatabın bakış açısını dikkate alarak, önemli noktaları destekleyici örneklerle vurgulayarak ve uygun şekilde sonuçlandırarak bir sav geliştirebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Önemli noktaları uygun şekilde vurgulayarak ve ilgili destekleyici ayrıntılarla sistematik olarak bir sav geliştirebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Yardımcı noktalar ve ilgili örneklerle bakış açılarını belirli bir uzunlukta genişleterek ve destekleyerek açık bir sav geliştirebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Mantıklı bir sav zinciri oluşturabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Çeşitli seçeneklerin avantajlarını ve dezavantajlarını vererek güncel bir konu hakkındaki bir bakış açısını açıklayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Çoğu zaman zorlanmadan takip edilebilecek kadar iyi bir sav geliştirebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Aşina olduğu bir konuda bir bakış açısını haklı çıkarmak için basit nedenler sunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Basit ifadeler kullanarak günlük yaşamla ilgili konularda görüşlerini dile getirebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Fikirler, planlar ve eylemler için kısaca nedenler ve açıklamalar sunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Birinin yaptıklarını onaylayıp onaylamadıklarını açıklayabilir ve bu görüşü haklı çıkarmak için gerekçeler sunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Bir konuda neyi sevip neyi sevmediğini, neden bir şeyi diğerine tercih ettiğini basit, doğrudan doğruya karşılaştırmalar yaparak açıklayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Muhatabın sabırlı olması koşuluyla görüşlerini basit terimlerle sunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "İnce anlam ayrımlarını tam olarak iletmek için vurgu ve tonlamayı kullanarak duyuruları akıcı, neredeyse rahat bir biçimde sunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Çoğu genel konuda duyuruları, alıcı için herhangi bir zorlamaya veya rahatsızlığa neden olmayan bir açıklık, akıcılık ve spontanlık derecesi ile sunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Vurgu ve tonlama ile ilgili olası sorunlara rağmen (= işaret dilinde el-dışı işaretler), yine de kendi alanlarındaki günlük olaylarla ilgili kısa, provası yapılmış duyurular yapabilirler."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Konsantre olmaya hazır alıcıların anlayabileceği, öngörülebilir, öğrenilmiş içeriğin çok kısa, prova edilmiş duyurularını sunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C2", "Tanımlayıcı": "Karmaşık bir konuyu, aşina olmadığı izleyiciye kendinden emin ve anlaşılır bir şekilde, konuşmayı izleyicinin ihtiyaçlarını karşılamak için esnek bir şekilde yapılandırarak ve uyarlayarak sunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C2", "Tanımlayıcı": "Zor ve hatta kötü niyetli sorularla başa çıkabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Yardımcı noktalar, nedenler ve ilgili örneklerle bakış açılarını belirli bir uzunlukta genişleterek ve destekleyerek karmaşık bir konuda açık, iyi yapılandırılmış bir sunum yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "İzleyicinin fikir dizisini takip etmesine ve genel tartışmayı anlamasına yardımcı olmak için nispeten uzun bir sunumu uygun şekilde yapılandırabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Karmaşık bir konuyu sunarken öneri seçeneklerini ve savları karşılaştırırken ve değerlendirirken tahmin veya varsayımda bulunabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Konuşmasına yapılan müdahaleleri spontane bir biçimde ve neredeyse hiç çaba göstermeden yanıt vererek iyi idare edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Önemli noktaların altını çizerek ve ilgili destekleyici ayrıntılarla açık, sistematik olarak geliştirilmiş bir sunum yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Hazırlanmış bir metinden spontane bir şekilde ayrılabilir ve genellikle dikkate değer bir akıcılık ve ifade kolaylığı göstererek izleyiciler tarafından belirtilen ilginç noktaları takip edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Belirli bir bakış açısını destekleyen veya aleyhte olan gerekçeleri ve çeşitli seçeneklerin avantaj ve dezavantajlarını vererek açık, hazırlanılmış bir sunum yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "İzleyicilerden kendisi veya izleyici için herhangi bir zorluk yaratmayan, akıcı ve spontane bir dizi takip sorusu alabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Kendi alanındaki aşina olduğu bir konuda, benzerlikleri ve farklılıkları (ör. ürünler, ülkeler/bölgeler, planlar arasında) ana hatlarıyla belirten bir sunum yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Alanında aşina olduğu bir konuda, çoğu zaman zorlanmadan takip edilebilecek kadar açık ve ana fikirlerin kabul edilebilir bir netlikle açıklandığı, önceden hazırlanmış karmaşık olmayan bir sunum yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Takip soruları alabilir ancak hızlı sorulduysa sorunun tekrar edilmesini istemek zorunda kalabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Günlük yaşamıyla ilgili bir konuda kısa, provası yapılmış bir sunum yapabilir ve görüşler, planlar ve eylemler için kısaca gerekçeler ve açıklamalar verebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Sınırlı sayıda karmaşık olmayan takip sorularıyla başa çıkabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Aşina olduğu bir konuda kısa, prova edilmiş, temel bir sunum yapabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Eğer tekrar isteyebilirse ve cevaplarının ifade edilmesinde yardım alması mümkünse karmaşık olmayan takip sorularını cevaplayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Çok kısa hazırlanmış bir metni, provası yapılmış bir ifadeyi iletmek için kullanabilir (ör. birini resmen tanıştırmak, kadeh kaldırmak için)."}, {"Temel Beceri": "Yazma", "Seviye": "C2", "Tanımlayıcı": "Uygun ve etkili bir tarz ve okuyucunun önemli noktaları belirlemesine yardımcı olan mantıklı bir yapıda açık, akıcı, karmaşık metinler üretebilir."}, {"Temel Beceri": "Yazma", "Seviye": "C1", "Tanımlayıcı": "İlgili göze çarpan konuların altını çizerek, bakış açılarını yardımcı noktalar, gerekçeler ve ilgili örneklerle belirli bir uzunlukta genişletip destekleyerek ve uygun bir sonuçla tamamlayarak, karmaşık konulardan açık, iyi yapılandırılmış metinler üretebilir."}, {"Temel Beceri": "Yazma", "Seviye": "C1", "Tanımlayıcı": "Tonu, tarzı ve üslubu muhatabına, metin tipine ve temasına göre çeşitlendirerek çeşitli türlerin yapı ve geleneklerini kullanabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2", "Tanımlayıcı": "Farklı kaynaklardan bilgi ve savları sentezleyip değerlendirerek ilgi alanıyla ilişkili çeşitli konularda açık, ayrıntılı metinler üretebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1", "Tanımlayıcı": "Bir dizi daha kısa ayrı ögeyi doğrusal bir sıraya bağlayarak ilgi alanındaki çeşitli aşina olduğu konular hakkında karmaşık olmayan bağlantılı metinler üretebilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "“Ve”, “ama” ve “çünkü” gibi basit bağlayıcılarla bağlı bir dizi basit öbek ve cümle üretebilir."}, {"Temel Beceri": "Yazma", "Seviye": "A1", "Tanımlayıcı": "Basit sözcükleri/işaretleri ve temel ifadeleri kullanarak kişisel ilgisi olan meseleler (ör. hoşlandığı ve hoşlanmadığı şeyler, aile, evcil hayvanlar) hakkında bilgi verebilir.\n"}, {"Temel Beceri": "Yazma", "Seviye": "A1", "Tanımlayıcı": "Basit, birbirinden kopuk öbekler ve cümleler üretebilir."}, {"Temel Beceri": "Yazma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Belki bir sözlük kullanarak temel kişisel bilgileri (ör. isim, adres, uyruk) verebilir."}, {"Temel Beceri": "Yazma", "Seviye": "C2", "Tanımlayıcı": "Benimsediği metin türüne uygun bir tarzda, açık, akıcı ve ilgi çekici hikâyeleri ve deneyimini anlattığıbetimlemeleri ilişkilendirebilir."}, {"Temel Beceri": "Yazma", "Seviye": "C2", "Tanımlayıcı": "Metnin etkisini artırmak için deyim ve mizahı uygun şekilde kullanabilir."}, {"Temel Beceri": "Yazma", "Seviye": "C1", "Tanımlayıcı": "Okuyucunun zihnine uygun, kendinden emin, kişisel, doğal bir tarzla, açık, ayrıntılı, iyi yapılandırılmış ve gelişmiş betimlemeler ve yaratıcı metinler üretebilir."}, {"Temel Beceri": "Yazma", "Seviye": "C1", "Tanımlayıcı": "Deyim ve mizahı birleştirebilir, ancak mizah kullanımı her zaman uygun değildir."}, {"Temel Beceri": "Yazma", "Seviye": "C1", "Tanımlayıcı": "Kültürel olaylar (ör. oyunlar, filmler, konserler) veya edebî eserler hakkında ayrıntılı bir eleştirel değerlendirme yapabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2+", "Tanımlayıcı": "Açık bağlantılı metinlerdeki fikirler arasındaki ilişkiyi belirterek ve ilgili metin türünün yerleşik geleneklerini izleyerek gerçek veya hayali olayların ve deneyimlerin açık, ayrıntılı betimlemesini yapabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2", "Tanımlayıcı": "İlgi alanları ile ilişkili çeşitli konularda açık, ayrıntılı betimlemeler yapabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2", "Tanımlayıcı": "Bir film, kitap veya oyun hakkında eleştiri yapabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1+", "Tanımlayıcı": "Öyküleyici metinde kronolojik sırayı açıkça belirtebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1+", "Tanımlayıcı": "Sınırlı bir dil varlığı kullanarak bir film, kitap veya TV programı hakkında basit bir eleştiri yapabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1", "Tanımlayıcı": "İlgi alanlarına giren çeşitli aşina olduğu konular hakkında, karmaşık olmayan, ayrıntılı açıklamalar yapabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1", "Tanımlayıcı": "Duyguları ve tepkileri basit, bağlantılı metinlerle açıklayarak deneyimlerini anlatabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1", "Tanımlayıcı": "Gerçek veya hayali bir olayı, yakın tarihli bir geziyi anlatabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1", "Tanımlayıcı": "Bir hikâye anlatabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2+", "Tanımlayıcı": "Çevrelerinin günlük yönlerini, örneğin insanları, yerleri, bir işi veya eğitim deneyimini bağlı cümlelerle tanımlayabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2+", "Tanımlayıcı": "Olayların, geçmiş etkinliklerin ve kişisel deneyimlerin çok kısa, temel betimlemesini yapabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2+", "Tanımlayıcı": "Basit bir hikâye anlatabilir (ör. bir tatildeki olaylar veya uzak bir gelecekte yaşanacak hayat hakkında)."}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "Ailesi, yaşam koşulları, eğitim durumu veya şimdiki veya en son işi hakkında bir dizi basit öbek ve cümle üretebilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "İnsanlar hakkında kısa, basit hayali biyografiler ve basit şiirler yazabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "“Ve”, “ama” ve “çünkü” gibi basit bağlayıcılarla temel, somut sözcükler, öbek ve cümleler kullanarak etkinlikleri (ör. günlük rutin, geziler, spor, hobiler), insanları ve yerleri tanımlayan günlük girdiler yaratabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "Bir sözlüğe ve atıflara (ör. bir ders kitabındaki fiil zamanları tablolarına) başvurabilmeleri koşuluyla bir hikâyeye giriş oluşturabilir veya bir hikâyeyi devam ettirebilir."}, {"Temel Beceri": "Yazma", "Seviye": "A1", "Tanımlayıcı": "Kendisi ve hayalî kişiler, nerede yaşadıkları ve ne yaptıkları hakkında basit öbekler ve cümleler kurabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A1", "Tanımlayıcı": "Bir odanın neye benzediğini çok basit bir dille anlatabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A1", "Tanımlayıcı": "Belirli günlük nesneleri tanımlamak için basit kelimeler/işaretler ve öbekler kullanabilir (ör. büyük veya küçük bir arabanın rengi)."}, {"Temel Beceri": "Yazma", "Seviye": "C2", "Tanımlayıcı": "Bir vakayı sunan veya tekliflerin veya edebî eserlerin eleştirel bir değerlendirmesini yapan, açık, akıcı, karmaşık raporlar, makaleler veya denemeler üretebilir."}, {"Temel Beceri": "Yazma", "Seviye": "C2", "Tanımlayıcı": "Okuyucunun önemli noktaları belirlemesine yardımcı olan, uygun ve etkili bir mantıksal yapı sağlayabilir."}, {"Temel Beceri": "Yazma", "Seviye": "C2", "Tanımlayıcı": "Kendi fikir ve görüşlerini kaynaklardakilerden açıkça ayırarak karmaşık akademik veya mesleki konularda birden çok bakış açısı ortaya koyabilir."}, {"Temel Beceri": "Yazma", "Seviye": "C1", "Tanımlayıcı": "İlgili göze çarpan konuların altını çizerek karmaşık konuların açık, iyi yapılandırılmış açıklamalarını üretebilir.\n"}, {"Temel Beceri": "Yazma", "Seviye": "C1", "Tanımlayıcı": "Yardımcı noktalar, nedenler ve ilgili örneklerle bakış açılarını belirli bir uzunlukta genişletebilir ve destekleyebilir."}, {"Temel Beceri": "Yazma", "Seviye": "C1", "Tanımlayıcı": "Karmaşık bir akademik veya mesleki konu hakkında konunun kendi ilgi alanları dâhilinde olması ve yeniden yazma ve gözden geçirme fırsatları olması koşuluyla nispeten uzun bir rapor, makale veya tez için uygun bir giriş ve sonuç üretebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2+", "Tanımlayıcı": "Önemli noktaların ve ilgili destekleyici ayrıntıların uygun şekilde vurgulanmasıyla sistematik olarak bir sav geliştiren bir makale veya rapor üretebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2+", "Tanımlayıcı": "Karmaşık bir sürecin ayrıntılı bir tanımını üretebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2+", "Tanımlayıcı": "Bir soruna yönelik farklı fikirleri veya çözümleri değerlendirebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2", "Tanımlayıcı": "Belirli bir bakış açısını destekleyen veya onun aleyhine gerekçeler sunan ve çeşitli seçeneklerin avantaj ve dezavantajlarını açıklayan sav geliştiren bir makale veya rapor hazırlayabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2", "Tanımlayıcı": "Bir dizi kaynaktan bilgi ve savları sentezleyebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1+", "Tanımlayıcı": "İlgilendiği konularda kısa, basit denemeler yazabilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1+", "Tanımlayıcı": "Avantajları ve dezavantajları listelemek için basit bir dil kullanarak kişisel ilgi alanına giren güncel bir konu hakkında bir metin üretebilir ve görüşlerini bildirip gerekçelendirebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1+", "Tanımlayıcı": "Kendi alanlarındaki rutin olan veya olmayan aşina olduğu meselelerde birikmiş olgusal bilgileri bir parça güvenle özetleyebilir, onlar hakkında rapor verebilir ve görüşlerini bildirebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1", "Tanımlayıcı": "Rutin olgusal bilgileri ve eylemlerin nedenlerini belirten standart, gelenekselleştirilmiş bir formatta çok kısa raporlar üretebilir.\n"}, {"Temel Beceri": "Yazma", "Seviye": "B1", "Tanımlayıcı": "Fotoğrafları ve kısa metin bloklarını kullanarak kısa bir rapordaki veya posterdeki bir konuyu sunabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "Cümleleri “ve”, “çünkü” veya “sonra” gibi bağlayıcılarla bağlayarak, ilgi duyduğu aşina konularda basit metinler üretebilir.\n"}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "Günlük temel kelime ve ifadeleri kullanarak kişisel ilgi alanları (ör. yaşam tarzları ve kültür, hikâyeler) hakkında izlenimlerini ve görüşlerini aktarabilir."}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "C1", "Tanımlayıcı": "Tutum, ruh hâli ve amaçlar konusunda çıkarım yapmak ve daha sonra ne geleceğini tahmin etmek için bağlamsal, dil bilgisel ve sözcüksel ipuçlarını kullanma konusunda beceri sahibidir. "}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "B2", "Tanımlayıcı": "Ana fikirlere dikkat etme ve bağlamsal ipuçlarını kullanarak kavramayı kontrol etme de dâhil olmak üzere kavramayı gerçekleştirmek için çeşitli stratejiler kullanabilir. "}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "B1+", "Tanımlayıcı": "Bir metindeki tartışmayı daha iyi anlayabilmek için farklı tür bağlayıcılardan (sayısal, zamansal, mantıksal) ve anahtar paragrafların genel organizasyondaki yerinden faydalanabilir."}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "B1+", "Tanımlayıcı": "Metnin bir bölümünün anlamını, metni bir bütün olarak ele alarak tahmin edebilir."}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "B1+", "Tanımlayıcı": "Kendi alanı ve ilgisiyle alakalı olan konularda aşina olmadığı kelimelerin/işaretlerin anlamını bağlamdan çıkarabilir."}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "B1+", "Tanımlayıcı": "Tartışılan konunun aşina olması koşuluyla az rastlanan bilinmeyen kelimelerin/işaretlerin anlamını bağlamdan tahmin edebilir ve cümlenin anlamını çıkarabilir. "}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "B1", "Tanımlayıcı": "Başlıklardan, isimlerden veya manşetlerden metnin içeriğiyle ilgili temel çıkarımlar veya tahminler yapabilir."}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "B1", "Tanımlayıcı": "Kısa bir anlatıyı izleyebilir veya dinleyebilir ve daha sonra ne olacağını tahmin edebilir."}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "B1", "Tanımlayıcı": "Yaygın mantıksal (ör. fakat, çünkü) ve zamansal bağlayıcılara (ör. bundan sonra, önceden) odaklanarak hikâyedeki bir dizi tartışma serisini veya olay dizisini takip edebilir."}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "B1", "Tanımlayıcı": "Bir metindeki bilinmeyen kelimelerin/işaretlerin olası anlamlarını, onları oluşturan parçaların (ör. kökleri, sözcüksel ögeleri, ön ek ve son ekleri belirleme) anlamlarını belirleyerek çıkarabilir."}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "A2+", "Tanımlayıcı": "Bilinmeyen kelimelerin/işaretlerin olası anlamlarını bağlamdan çıkarmak için somut türden gündelik konularda kısa metinlerin ve ifadelerin genel anlamını kullanabilir."}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "A2+", "Tanımlayıcı": "Rutin, gündelik bağlamlarda kullanılan kısa ifadelerde aşina olmadığı kelimeler/işaretlerin anlamını çıkarmak için tanıdığı kelimeler/işaretlerden faydalanabilir."}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "A2", "Tanımlayıcı": "Metin tiplerini belirlemek için metnin biçim, görünüm ve dizgi özelliklerinden yararlanabilir: Gazete makalesi, tanıtım metni, makale, ders kitabı, çevrim içi sohbet veya forum vb."}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "A2", "Tanımlayıcı": "Bir metnin konusunu belirlemek için sayılar, tarihler, isimler, özel isimler vb. faydalanabilir."}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "A2", "Tanımlayıcı": "Bilinmeyen kalıplaşmış ifadelerin anlam ve işlevini metindeki konumlarından (ör. bir mektubun başında ve sonunda) çıkarabilir. "}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "A1", "Tanımlayıcı": "İçinde yer aldığı metnin çok basit ve aşina olduğu gündelik bir konu hakkında olması koşuluyla somut bir eylem veya nesne için kullanılan bilinmeyen bir kelimenin/işaretin anlamını çıkarabilir."}, {"Temel Beceri": "Okuma, Dinleme", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Bir kelimenin/işaretin anlamını, beraberindeki resim veya simgeden çıkarabilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Sözü almak veya zaman kazanmak ve düşünürken sırasını korumak amacıyla sözlerine uygun bir giriş yapmak için anında hazır bulunan çeşitli işlevsel söylemlerden uygun bir öbek seçebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Uygun bir dil kullanarak tartışmaya müdahale edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Etkili şekilde sıra alarak söylemi uygun şekilde başlatabilir, sürdürebilir ve sonlandırabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Konuşmayı başlatabilir, uygun olduğunda sırasını alabilir ve gerektiğinde karşılıklı konuşmayı bitirebilir ancak bunu her zaman zarif bir şekilde yapamayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Zaman kazanmak ve söz sırasını korumak için söylemek istediklerini ifade ederken hazır öbekler (ör. “Bu yanıtlaması zor bir soru”) kullanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Aşina olduğu bir konudaki tartışmaya söz almak için uygun bir öbek kullanarak müdahale edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Aşina olduğu veya kişisel ilgi alanına giren konularda basit, yüz yüze konuşmayı başlatabilir, sürdürebilir ve kapatabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Karşılıklı kısa bir konuşmayı başlatmak, sürdürmek veya bitirmek için basit teknikler kullanabilir.\n"}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Basit, yüz yüze konuşmayı başlatabilir, sürdürebilir ve kapatabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Dikkat verilmesini isteyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C2", "Tanımlayıcı": "Katkıları diğerlerinin katkılarıyla ustaca ilişkilendirebilir, etkileşimin kapsamını genişletebilir ve bir sonuca doğru yönlendirmeye yardımcı olabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Kendi katkısını başkalarınınkiyle ustaca ilişkilendirebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Açıklamalar ve çıkarımlar hakkında geri bildirimde bulunabilir ve bunları takip edebilir ve böylece tartışmanın gelişmesine yardımcı olabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Akademik veya mesleki yetkinliği dâhilindeki meselelerde ilgili ana tartışma noktalarını özetleyebilir ve değerlendirebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Anladığını teyit ederek, başkalarını davet ederek, vs. aşina olduğu bir zeminde tartışmaya yardımcı olabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Bir tartışmada belirli bir aşamada ulaşılan noktayı özetleyebilir ve atılacak sonraki adımları önerebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Karşılıklı bir konuşmanın veya tartışmanın devam etmesine yardımcı olmak için temel bir dil ve strateji birikiminden yararlanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Bir tartışmada ulaşılan noktayı özetleyebilir ve böylece tartışmaya odaklanmaya yardımcı olabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Karşılıklı anlayışı doğrulamak ve fikirlerin doğru yolda gelişmesine yardımcı olmak için birinin söylediklerinin bir kısmını tekrarlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Başkalarını tartışmaya davet edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Takip ettiğini gösterebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Mesleki veya akademik bağlamlarda, canlı veya çevrim içi olarak karmaşık, soyut fikirleri anladığından emin olmak için açıklama ve aydınlatılma isteyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Birinin söylemek istediğini kendisinin anlayıp anlamadığını kontrol etmek için takip soruları sorabilir ve belirsiz noktaların açıklığa kavuşturulmasını sağlayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Karmaşık, soyut fikirleri anladığından emin olmak için açıklama ve aydınlatılma isteyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Bir grubun bir üyesine örtük bir biçimde ifade edilen veya yetersiz bir biçimde ifade edilenbir konuyu açıklığa kavuşturmak için takip soruları sorabilir"}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Tartışmayı ilerletmek amacıyla diğer grup üyelerinden daha fazla ayrıntı ve açıklama isteyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Birinden az önce söylediklerini açıklamasını veya detaylandırmasını isteyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Anlamadığında çok basit bir şekilde tekrar edilmesini isteyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Anahtar kelimeler/işaretler veya anlaşılmayan öbekler hakkında hazır öbekler kullanarak açıklama isteyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Takip etmediğini belirtebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Anlamadığını işaret edebilir ve bir kelimenin/işaretin hecelenmesini isteyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Anlamadığını basit kelimelerle/işaretlerle, tonlamalarla ve hareketlerle gösterebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "Anlamadığını basit bir şekilde ifade edebilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Daha resmî bir metin hazırlarken ilgili metin tipiyle bağlantılı geleneksel yöntemleri (ör. yapı, resmiyet düzeyi) bilinçli olarak benimseyebilir."}, {"Temel Beceri": "0", "Seviye": "B2+", "Tanımlayıcı": "Potansiyel olarak karmaşık veya garip bir duruma hazırlanırken hangi ifadenin uygun olacağını düşünerek farklı tepkiler durumunda ne söyleyeceğini planlayabilir"}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Alıcı(lar) üzerindeki etkisini göz önünde bulundurarak söylenecekleri ve söyleme yollarını planlayabilir."}, {"Temel Beceri": "0", "Seviye": "B1+", "Tanımlayıcı": "Geri bildirim vermeye teşvik ederek yeni birleşimleri ve ifadeleri prova edebilir ve deneyebilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Mevcut tüm kaynakları kullanarak ve mesajı hatırladığı kadarıyla sınırlayarak veya mesajı ifade etmenin yollarını bularak iletmek istediği ana fikri/fikirleri nasıl ileteceğini çözebilir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Dil birikiminden uygun bir dizi öbeği hatırlayabilir ve prova edebilir."}, {"Temel Beceri": "0", "Seviye": "C2", "Tanımlayıcı": "Hatırlayamadığı bir kelime/işaret yerine, yumuşak bir geçişle neredeyse fark edilmeyecek şekilde eş değer bir terimi koyabilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Hemen hemen tüm durumlarda dolaylı ifadeleri anında ve etkin bir şekilde kullanmak için sahip olduğu söz varlığındaki seçeneklerden yaratıcı bir şekilde yararlanabilir."}, {"Temel Beceri": "0", "Seviye": "B2+", "Tanımlayıcı": "Kelime ve yapıdaki boşlukları kapatmak için açımlama ve dolaylama yapabilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Çoğu iletişim sorununu dolaylı ifadeler kullanarak veya zor ifadelerden kaçınarak çözebilir."}, {"Temel Beceri": "0", "Seviye": "B1+", "Tanımlayıcı": "Kelime/işaretini hatırlayamadığı somut bir şeyin özelliklerini tanımlayabilir."}, {"Temel Beceri": "0", "Seviye": "B1+", "Tanımlayıcı": "Bir kelimeyi/işareti niteleyerek benzer bir anlam ifade edebilir (ör. insanlar için bir kamyon = otobüs)."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "İletmek istediği kavrama benzer anlama gelen basit bir kelime/işaret kullanabilir ve “düzeltmeye” davet edebilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Kelime/işaretleri kendi dillerinde “yabancılaştırabilir” ve onay isteyebilir."}, {"Temel Beceri": "0", "Seviye": "A2+", "Tanımlayıcı": "Kelime birikiminden yetersiz bir kelime/işaret kullanabilir ve ne demek istediklerini açıklamak için jestler kullanabilir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "İşaret ederek ne demek istediğini belirtebilir (ör. “Bunu istiyorum, lütfen”)."}, {"Temel Beceri": "0", "Seviye": "A1", "Tanımlayıcı": "Bir ihtiyacı ifade ederken basit kelimeleri/işaretleri desteklemek için jestleri kullanabilir."}, {"Temel Beceri": "0", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Bir şeye işaret edebilir ve ne olduğunu sorabilir."}, {"Temel Beceri": "0", "Seviye": "C2", "Tanımlayıcı": "Muhatabın neredeyse hiç farkına varmayacağı kadar sorunsuz bir şekilde, bir zorluğa geri dönüp onu yeniden yapılandırabilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Bir zorlukla karşılaştıklarında geri gidebilir ve dilin akışını tamamen kesmeden söylemek istediklerini yeniden ifade edebilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Kendini büyük ölçüde etkili bir şekilde düzeltebilir."}, {"Temel Beceri": "0", "Seviye": "B2+", "Tanımlayıcı": "Cümle yapısındaki ara sıra ortaya çıkan “sürçmeleri” veya sistematik olmayan hataları ve küçük kusurları geriye dönük olarak sıklıkla kendi kendine düzeltebilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Farkında oldukları veya yanlış anlamalara yol açan eksik ve hataları düzeltebilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Tekrar eden hatalarını not edebilir ve bilinçli olarak onları izleyebilir."}, {"Temel Beceri": "0", "Seviye": "B1+", "Tanımlayıcı": "Muhatabın bir sorun olduğunu belirtmesi koşuluyla yanlış anlamalara yol açan zaman veya ifadeleri işaret ederek karışıklıkları düzeltebilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Kullanılan bir yapının doğru olduğuna yönelik onay isteyebilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "İletişim bozulduğunda farklı bir taktik kullanarak tekrar başlayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Kişilerin ihtiyaçlarına ve ilgili duruma göre çeşitli roller üstlenerek, ince ayrımları ve örtük eğilimleri belirleyerek ve hassas bir tartışmaya rehberlik ederek, etkin ve doğal bir şekilde aracılık yapabilir. Tutum belirleyen boyutları ve çoğu ince ayrımı doğru bir şekilde aktararak, ayrıca sosyokültürel anlamlara işaret ederek (ör. üslup kullanımı, küçümseme, ironi ve alay), olgular ve savların ifade ediliş şeklini açık, akıcı ve iyi yapılandırılmış bir dille açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Farklı bakış açılarını yorumlayarak, belirsizlikleri yöneterek yanlış anlama olasılıklarını önceden tahmin ederek ve karşılıklı konuşmaya yeni bir doğrultu kazandırmak amacıyla diplomatik bir biçimde müdahale ederek olumlu bir etkileşim sağlayıp etkin bir aracılık gösterebilir. Bir dizi soruyla akıl yürütmeye teşvik ederek bir tartışmaya yapılan çeşitli katkıları temel alıp bunları geliştirebilir. Tutum belirleyen boyutlar ve çoğu ince ayrım da dâhil olmak üzere uzun ve karmaşık metinlerdeki önemli fikirleri, kendi ilgi alanıyla alakalı olsun veya olmasın, açık, akıcı ve iyi yapılandırılmış bir dille açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Farklı bakış açılarını takdir ederek insanları meseleleri keşfetmeye teşvik ederek ve ifade şekillerini hassas bir biçimde düzenleyerek fikir paylaşımını destekleyici bir ortam oluşturabilir ve hassas meselelerin tartışılmasını kolaylaştırabilir. İlerlemeye yönelik önerilerde bulunarak diğer kişilerin fikirlerini temel alıp onları geliştirebilir. Konuşanların/ işaret dili kullanıcısınıngörüşleri ile amaçlarına açıklık getirerek, mesleki, akademik veya kişisel ilgi alanlarına giren konulardaki iyi yapılandırılmış ancak uzun ve savlar açısından önermesel olarak karmaşık metinlerin temel içeriğini aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Destek sunarak, ortak hedefleri belirlemeye yönelik sorular sorarak, bu hedeflere nasıl ulaşılacağına ilişkin seçenekleri karşılaştırarak ve sonraki adımda ne yapılması gerektiğine ilişkin önerileri açıklayarak olumlu bir atmosfer yaratıp farklı altyapılara sahip kişilerle iş birliği içinde çalışabilir. Diğerlerinin fikirlerini daha ileriye taşıyabilir, farklı bakış açılarına dair yorumları teşvik eden sorular yöneltebilir ve çözüme veya sonraki adımlara yönelik öneriler sunabilir. Ayrıntılı bilgi ve savları, ör. mesleki, akademik veya kişisel ilgi alanlarındaki karmaşık ama iyi yapılandırılmış metinlerde yer alan önemli noktayı/noktaları güvenilir bir biçimde aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Basit soru sorup yanıtlayarak, önerilerde bulunarak ve önerilere yanıt vererek, insanların aynı fikirde olup olmadığını sorarak ve alternatif yaklaşımlar önererek, ilgi ve empatisini gösterip farklı altyapılara sahip kişilerle iş birliği içinde çalışabilir. Gerektiğinde belli ifadelerin anlamlarını kontrol etmesi koşuluyla kişisel ilgi alanına giren konularda karmaşık olmayan bir dille ifade edilmiş uzun metinlerde belirtilen ana fikirleri aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Bazı soruların değişik şekillerde algılanabileceği bilincini taşıyarak farklı altyapılara sahip kişileri tanıtabilir ve diğer kişileri de uzmanlıkları, deneyimleri ve görüşleriyle katkı sunmaya davet edebilir. Sözcüksel sınırlılıklar nedeniyle zaman zaman kurgulamakta sıkıntı yaşasa da aşina olduğu veya kişisel ilgi alanına giren konularda veya güncel başlıklarda açık ve iyi yapılandırılmış bilgi içerikli metinlerdeki bilgileri aktarabilir. "}, {"Temel Beceri": "Aracılık", "Seviye": "A2+", "Tanımlayıcı": "Diğer katılımcıların yavaş konuşması/işaretleşmesi ve en az bir katılımcının katkıda bulunmasına ve önerileri ifade etmesine yardımcı olması koşuluyla etkileşimde destekleyici bir rol üstlenebilir. Aşina ve somut konular üzerine basit gündelik dilde ifade edilmiş olmaları koşuluyla açık bir şekilde yapılandırılmış basit bilgi içerikli metinlerindeki ilgili bilgileri aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Bir kişiden bir şeyi açıklamasını istemek için basit sözcükler/işaretler kullanabilir. Güçlükler baş gösterdiğinde bunu fark edebilir ve sorunun görünürdeki nedenini basit bir dille ifade edebilir. Basit bir dilde ve açık bir şekilde ifade edilmiş olmaları koşuluyla yakın ilgisi olan gündelik konulardaki kısa ve basit karşılıklı konuşmaların veya metinlerin ana fikirlerini aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1", "Tanımlayıcı": "Bir fikre duyduğu ilgiyi göstermek için basit sözcükler/işaretler veya ve sözel olmayan belirtkeler kullanabilir. Kısa ve basit işaretler, tabelalar, levhalar veya programlarda yer alan, yakın ilgisi olan basit, tahmin edilebilir bilgileri aktarabilir. "}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "A dilinde) uzun, karmaşık bir metnin belli bir bölümünde yer alan belirli bir bilginin konuyla bağlantısını (B dilinde) açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "(A dilinde) bir konferansta yapılan sunumlardan veya (A dilinde) bir kitapta yer alan makalelerden hangilerinin belli bir amaçla bağlantısı olduğunu (B dilinde) aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "A dilinde) genel konular ve kendi ilgi alanına yönelik konular üzerine olan resmî yazışmalardaki ve/veya raporlardaki ana fikirleri (B dilinde) aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "A dilinde) normal hızda ve anlaşılır bir şekilde yapılan kamusal duyuruların ve mesajların içeriğini (B dilinde) aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "(A dilinde) ayrıntılı talimatlar ve yönlendirmelerin içeriğini, anlaşılır bir şekilde sesletilmesi koşuluyla, (B dilinde) aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "(A dilinde) karmaşık olmayan bilgi metinlerinde (broşürler, kitapçıklar, bildirimler ve resmî yazılar, e-postalar vb.) verilen belirli bilgileri (B dilinde) aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2+", "Tanımlayıcı": "A dilinde) aşina olduğu gündelik konulara ilişkin açık bir şekilde yapılmış bir duyurunun amacını, mesajı basitleştirmesi ve çeşitli sözcükleri/işaretleri araması gerekse bile (B dilinde) aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2+", "Tanımlayıcı": "(A dilinde) aşinaolduğu konular üzerine olan kısa ve basit metinlerde, etiketlerde ve duyurularda yer alan belirli bilgileri (B dilinde) aktarabilir. "}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "A dilinde) kısa, açık ve basit mesajlarda, talimatlarda ve duyurularda belirtilen noktayı, yavaş ve açık bir şekilde basit bir dilde ifade edilmeleri koşuluyla (B dilinde) aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "(A dilinde) bir dizi kısa ve basit yönergeyi, kaynak metnin açık ve yavaş bir şekilde sesletilmesi koşuluyla basit bir şekilde (B dilinde) aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1", "Tanımlayıcı": "(A dilinde iletilen) kısa ve basit ifadelerdeki zaman ve yere ilişkin basit, tahmin edilebilir bilgileri (B dilinde) aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1 Öncesi", "Tanımlayıcı": "(A dilinde verilen) yer ve zamanla ilgili basit yönergeleri, çok yavaş ve açık bir şekilde tekrarlanması koşuluyla (B dilinde) aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1 Öncesi", "Tanımlayıcı": "(A dilinde) kısa, basit, görsel içeren metinlerde yer alan çok temel bilgileri (sayılar, fiyatlar vb.) (B dilinde) aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "A dilinde yapılan) bir konferanstaki sunumlardan hangilerinin daha ayrıntılı ele alınması gerektiğini belirterek sunumlardan hangilerinin konuyla bağlantılı olduğunu (B dilinde) yazılı olarak aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "(A dilinde) mesleki, akademik veya kişisel ilgi alanına giren önermesel olarak karmaşık ancak iyi yapılandırılmış metinlerde yer alan konuyla bağlantılı noktaları (B dilinde) yazılı olarak aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "(A dilinde) akademik veya mesleki yayınlarda yer alan bir makaledeki bağlantılı noktaları (B dilinde) yazılı olarak aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "A dilinde) bir toplantıda alınmış, konuyla bağlantılı kararları (B dilinde) yazılı bir rapor hâlinde aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "(A dilinde) resmî bir yazışmada yer alan önemli noktayı/ noktaları (B dilinde) yazılı olarak aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "A dilinde) aşina olduğu konular üzerine sunulmuş metinlerde (ör. çağrılar, duyurular, yönergeler) yer alan belirli bilgi noktalarını (B dilinde) yazılı olarak aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "(A dilinde) aşina olduğu konulardaki karmaşık olmayan bilgi metinlerinde yer alan belirli bağlantılı bilgiyi (B dilinde) yazılı olarak aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviy

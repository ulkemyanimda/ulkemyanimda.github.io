e": "B1", "Tanımlayıcı": "(A dilinde) kaydedilmiş karmaşık olmayan sesli mesajlarda yer alan belirli bilgileri, konunun aşina olması ve konuşmanın yavaş ve açık yapılması koşuluyla, (B dilinde) yazılı olarak aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2+", "Tanımlayıcı": "(A dilinde) kısa ve basit bilgi içerikli metinlerde yer alan belirli bilgileri, metnin somut ve aşina olduğu konulara ilişkin olması ve basit gündelik dille düzenlenmiş olması koşuluyla, (B dilinde) yazılı olarak aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "A dilinde) kısa, açık ve basit mesajların ve duyuruların ana fikirleerini, anlaşılır ve yavaş bir şekilde sesletilmesi koşuluyla (B dilinde) listeleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Yakın ilgi alanına veya ihtiyacına yönelik gündelik konulara ilişkin (A dilinde) basit metinlerde yer alan belirli bilgileri (B dilinde) listeleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1", "Tanımlayıcı": "(A dilinde) Yakın ilgi alanına yönelik sözlü metinlerde verilen isimleri, sayıları, fiyatları ve çok basit bilgileri, çok yavaş ve açık bir şekilde tekrarlarla sesletilmesi koşuluyla (B dilinde) listeleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1 Öncesi", "Tanımlayıcı": "(A dilinde) çok basit bir dilde oluşturulmuş ve görsel içeren metinlerde yer alan ve yakın ilgi alanına yönelik isimleri, sayıları, fiyatları ve çok basit bilgileri (B dilinde) listeleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "(A dili metindeki) akademik veya mesleki konularla ilgili kavramsal açıdan karmaşık araştırmalardan elde edilen çeşitli deneysel veri biçimlerini ve görsel olarak düzenlenmiş bilgileri (B dilinde) açık ve güvenilir bir şekilde yorumlayabilir ve betimleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "(A dili metindeki) karmaşık akademik veya mesleki konular üzerine, karmaşık diyagramlarda ve diğer görsel olarak düzenlenmiş bilgilerde kapsanan noktaları ve ayrıntıları, (B dilinde) açık ve güvenilir bir şekilde yorumlayabilir ve betimleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "(A dili metindeki) ilgi alanına giren konular üzerine, karmaşık diyagramlarda, grafiklerde ve diğer görsel olarak düzenlenmiş bilgide yer alan ayrıntılı bilgileri, (B dilinde) güvenilir bir şekilde yorumlayabilir ve betimleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "(A dili metindeki) ilgi alanına giren diyagramlardaki ayrıntılı bilgileri, sözcüksel boşluklar nedeniyle tereddüt yaşasa veya tam olarak ifade edemese bile (B dilinde) yorumlayabilir ve betimleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "(A dili metindeki) aşina olduğu konularda düzenlenmiş basit görselleri (ör. hava durumu grafikleri, basit akış şemaları) duraksamalar, hatalı başlangıçlar ve yeniden ifade etmeler çok görünür olsa bile (B dilinde) yorumlayabilir ve betimleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "(A dili metindeki) akademik veya mesleki konular üzerine kavramsal açıdan karmaşık araştırmalardan alınan çeşitli biçimlerdeki deneysel veriyi (B dilinde) yorumlayabilir ve yazılı olarak sunabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "(A dili metindeki) karmaşık akademik veya mesleki konular üzerine karmaşık diyagramlar ve başka görsel olarak düzenlenmiş veride kapsanan ilgili noktaları, (B dilinde) açık ve güvenilir bir şekilde yazılı olarak yorumlayabilir ve sunabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "(A dili metindeki) ilgi alanındaki diyagramlardan ve görsel olarak düzenlenmiş verilerden ayrıntılı bilgileri (B dilinde) yorumlayabilir ve güvenilir bir şekilde yazılı olarak sunabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "(A dili metindeki) basit diyagramlarda (grafikler, çubuk grafikler vb.) gösterilen genel eğilimleri, önemli noktaları daha ayrıntılı bir şekilde açıklayarak sözlükten veya başka başvuru malzemelerinden aldığı yardımla (B dilinde) yorumlayabilir ve sunabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "A dili metindeki) aşina olduğu konularda düzenlenmiş görsellerde (ör. hava durumu grafikleri, basit akış şemaları) yer alan ana olguları, (B dilinde) basit cümlelerle açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Bağlantılar veya dolaylı anlamlar (A dilinde) açık bir şekilde ifade edilmediğinde bunların çıkarımlarını (B dilinde) açıklayabilir ve ifade biçimlerinin sosyokültürel anlamlarına (ör. küçümseme, ironi, alaycılık) dikkat çekebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "(A dilinde) uzun ve zorlayıcı metinleri (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "(A dilinde) akademik veya mesleki yetkinliğidâhilindeki meseleler üzerine olan tartışmaları, farklı bakış açılarını ayrıntılı olarak ele alıp değerlendirerek ve en önemli noktaları belirleyerek, (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "(A dilinde) kendi uzmanlığı dışındaki bir uzmanlık alanına ait karmaşık metinlerde belirtilen ana fikirleri, zaman zaman belli teknik kavramları kontrol etmesi gerekse bile iyi yapılandırılmış bir dille ve açık bir şekilde (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "(A dilinde) olguların ve savların ortaya konmasındaki ince ayrımları (B dilinde) açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "(A dilinde) karmaşık bir metinden alınan bilgi ve savları, değerlendirici yorumlarla açıklayarak ve kendi görüşünü ekleyerek (B dilinde) bir konuyu tartışmak için kullanabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "(A dilinde) bir uzmanlık konusu üzerine kaynak bir metinde ifade edilmiş olan tutumu ve görüşü, kaynak metindeki belli bölümlere atıfta bulunup çıkarımlarını destekleyerek (B dilinde) açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "(A dilinde) ilgi ve uzmanlık alanıyla bağlantılı, geniş çeşitlilikte konular üzerine düzenlenmiş karmaşık metinlerde yer alan bilgi ve savları (B dilinde) açık ve iyi yapılandırılmış bir dille özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "(A dilinde) karmaşık tartışmaların ana fikirlerini, ortaya konulmuş farklı bakış açılarını değerlendirerek (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "(A dilinde) birçok kaynakta yer alan bilgi ve savları (B dilinde) sentezleyebilir ve raporlayabilir. "}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "(A dilinde) geniş çeşitlilikteki olgusal ve kurgusal metinleri, karşıt bakış açılarını ve ana temaları yorumlayıp tartışarak (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Uzmanlık alanı da dâhil olmak üzere kişisel ve yakın ilgi alanına ait konularda (A dilinde) uzun ve karmaşık metinlerde yer alan önemli noktaları (B dilinde) özetleyebilir.\n"}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "İlgi duyduğu bir konuda (A dilinde) bir metnin hedef okurunu belirleyebilir ve yazarın amacını, tutumunu ve görüşünü (B dilinde) açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Görüşler, savlar ve tartışmalar içeren (A dilinde) haber yazıları, röportajlar ve belgeselleri (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "(A dilinde) bir filmin veya bir oyunun konusunu ve olay örgüsünü (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "İlgi alanındaki konular hakkındaki (A dilinde) uzun metinlerde ortaya konulan ana fikirleri, belli ifadelerin anlamını kontrol edebilmesi koşuluyla (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "(A dilinde) kısa anlatıları, makaleleri, konuşmaları, tartışmaları, röportajları ve belgeselleri (B dilinde) özetleyebilir ve ayrıntılara ilişkin ilave soruları yanıtlayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "(A dilinde) çeşitli kaynaklardan kısa bilgi parçalarını derleyebilir ve bunları başka bir kişi için (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Aşina olduğu veya kişisel ilgi alanındaki konular üzerine (A dilinde) açık ve iyi yapılandırılmış metinlerin ana fikirlerini, sözcüksel kısıtlar nedeniyle zaman zaman yapılandırmada güçlük yaşasa bile (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Aşina olduğu konulardaki (A dilinde) karmaşık olmayan metinlerin (ör. kısa bir röportaj kaydı, dergi makalesi, seyahat broşürü) ana bilgi içeriğini (B dilinde) basitçe özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Kişisel veya o anki ilgi alanına giren bir konu üzerine (A dilinde) karşılıklı konuşma sırasında ortaya konan ana fikirleri, anlaşılır bir şekilde sesletilmesi koşuluyla (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "İlgi alanındaki konular üzerine (A dilinde) sözlü olarak sunulan uzun metinlerin ana fikirlerini, birkaç kez dinleme veya izleme olanağı bulması koşuluyla (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "(A dilinde) TV programlarındaki ve video kliplerdeki ana fikirleri veya olayları, birkaç kez izleyebilmesi koşuluyla (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2+", "Tanımlayıcı": "A dilinde) olayları, spor etkinliklerini, kazaları vb. içeren basit TV veya radyo haberlerinde ortaya konan ana fikirleri, konunun aşina olması ve yavaş, açık bir şekilde ifade edilmesi koşuluyla, (B dilinde) rapor edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2+", "Tanımlayıcı": "(A dilinde) illüstrasyonlar veya tablolar içeren, açık bir şekilde yapılandırılmış kısa, basit metinlerde yer alan bilgileri (B dilinde) basit cümlelerle rapor edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2+", "Tanımlayıcı": "(A dilinde) aşina olduğu konular üzerine kısa, basit bilgi metinlerinde yer alan ana fikri/fikirleri (B dilinde) özetleyebilir. "}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "A dilinde) açık bir şekilde yapılandırılmış, kısa ve basit metinlerdeki ana fikri/fikirleri sınırlı sözcük birikimini başka araçlarla (jestler, çizimler, diğer dillerden sözcükler/işaretler) destekleyerek (B dilinde) aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1", "Tanımlayıcı": "(A dilinde) kısa, çok basit tabelalarda ve duyurularda, afişlerde ve programlarda yer alan basit ve tahmin edilebilir bilgileri (B dilinde) aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "A dilindeki) bir metindeki olgu veya savların sunulma şeklini, özellikle başka birinin görüşü aktarılırken küçümseme, örtülü eleştiri, ironi ve alaycılık kullanımına dikkat çekerek yazılı olarak (B dilinde) açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Savlar ve anlatıları genel sonucun tutarlı sunumunda yeniden yapılandırarak farklı kaynaklardan alınan bilgileri özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "(A dilinde) uzun ve karmaşık metinlerin içeriğini doğru bir şekilde yorumlayarak alışılmadık, teknik terimlerin tam anlamını zaman zaman kontrol edebilmesi koşuluyla yazılı olarak (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "(A dilinde) uzun ve karmaşık bir metni (ör. akademik bir makale, politik bir analiz, roman özeti, başyazı, edebî bir eleştiri, bilimsel bir kitaptan rapor veya alıntı) belli bir okur kitlesi için, kaynak metnin üslup ve tarzına sadık kalarak yazılı olarak (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "(A dilinde) mesleki, akademik ve kişisel ilgi alanına giren konularda iyi düzenlenmiş ancak önermesel olarak karmaşık olan metinlerin temel içeriğini yazılı olarak (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "(A dilinde) özel ilgi alanına giren akademik ve mesleki yayınlardaki bilgi ve bakış açılarını yazılı olarak (B dilinde) karşılaştırabilir, kıyaslayabilir ve sentezleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "(A dilinde) karmaşık bir metinde ifade edilen bakış açısını metinde yer alan belirli bilgilere atıfta bulunup yaptığı çıkarımları destekleyerek yazılı olarak (B dilinde) açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "A dilinde) ilgi ve uzmanlık alanıyla ilgili konularda yazılmış karmaşık metinlerin ana içeriğini yazılı olarak (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Genel veya kişisel ilgi alanına giren konular hakkındaki (A dilinde) metinlerde bulunan bilgi ve savları yazılı olarak (B dilinde) özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Kişisel ilgi alanına giren veya güncel (A dilinde) karmaşık olmayan bilgilendirici metinlerdeki ana fikirleri, sözlü metinlerin açık bir şekilde sesletilmesi koşuluyla, (B dilinde) yazılı olarak özetleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Kaynak metindeki cümle yapısı ve sıralamasını kullanarak kısa metinleri basit bir şekilde açımlayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2+", "Tanımlayıcı": "(A dilinde) kısa basit metinlerdeki ilgili bilgiyi bir dizi madde şeklinde, metinlerin somut ve aşina olduğu konular hakkında olması ve sadece basit günlük dil içermesi koşuluyla, (B dilinde) listeleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2+", "Tanımlayıcı": "Sınırlı yetkinliği ve deneyimi içinde, kısa bir metinden anahtar sözcükleri ve öbekleri veya kısa cümleleri seçebilir ve bunları tekrar üretebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Çok yüksek kullanım sıklığına sahip kelimeleri içeren aşina olduğu ve günlük temalar hakkındaki (A dilinde) çok kısa metinlerde yer alan ana fikri/fikirleri aktarmak için (B dilinde) basit bir dil kullanabilir, hatalara rağmen metin anlaşılabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Basılı hâlde veya açık bir el yazısıyla yazılmış kısa metinleri kopya edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1", "Tanımlayıcı": "Aşina olduğu ve günlük temalar hakkındaki (A dilinde) basit öbeklerin anlamını sözlük yardımıyla (B dilinde) aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1", "Tanımlayıcı": "Standart basılı bir biçimde sunulan, tek kelime ve kısa metinlerin kopyasını çıkarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "(A dilinde yazılmış) kişisel, akademik veya mesleki ilgi alanlarına yönelik geniş çeşitlilikteki konular üzerine olan soyut metinleri, ilgili ince ayrımlar ve çıkarımlar da dâhil olmak üzere yargı belirten boyutları ve savları başarıyla aktararak (B diline) akıcı bir şekilde sözlü tercüme edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "A dilinde yazılmış) genel ve uzmanlık gerektiren konulardan oluşan geniş çeşitlilikteki karmaşık metinleri, ince ayrımların büyük kısmını yansıtarak, (B diline) akıcı bir şekilde sözlü tercüme edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "(A dilinde yazılmış), kendi mesleki, akademik ve kişisel ilgi alanlarına giren konulardaki bilgi ve savlar içeren karmaşık metinleri (B diline) sözlü tercüme edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "(A dilinde yazılmış) kendi mesleki, akademik ve kişisel ilgi alanına giren konularda bilgi ve savlar içeren metinleri, karmaşık olmayan, standart bir dille yazılmış olması koşuluyla, (B diline) sözlü tercüme edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "(A dilinde) kişisel ilgi alanlarına yönelik veya aşinaolduğu konularda yazılmış, anlaşılır ve iyi yapılandırılmış bilgi içerikli metinleri, sözcüksel kısıtlamalar nedeniyle zaman zaman ifade etmede güçlükler çekse bile (B diline) sözlü tercüme edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2+", "Tanımlayıcı": "(A dilinde yazılmış) kısa, basit ve gündelik metinleri (ör. broşürler, duyurular, yönergeler, resmî yazılar, e-postalar) yaklaşık olarak (B diline) sözlü tercüme edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "(A dilinde yazılmış) kısa ve basit metinleri (aşina olduğu konulara yönelik duyurular vb.), en önemli noktayı yansıtarak (B diline) basit ve kabataslak biçimde sözlü tercüme edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "(A dilinde yazılmış) basit cümlelerle düzenlenmiş, aşina olduğu günlük konulara ilişkin rutin bilgiler içeren metinleri (ör. kişisel haberler, kısa anlatılar, yönlendirmeler, duyurular, yönergeler), basit ve kabataslak biçimde (B diline) sözlü tercüme edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1", "Tanımlayıcı": "(A dilinde yazılmış) tabelalar ve duyurularda, afişlerde, programlarda, broşürlerde vb. karşılaşılan basit günlük sözcükler/işaretler ve öbekleri (B diline) basit ve kabataslak biçimde sözlü tercüme edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "(A dilinde yazılmış) kendi uzmanlık alanı dışında kalan teknik materyalleri, ilgili alanda faaliyet gösteren bir uzman tarafından doğruluğu kontrol edilmek koşuluyla, (B diline) tercüme edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "(A dilinde yazılmış) kendi alanına giren toplumsal, akademik ve mesleki konularda yazılmış soyut metinleri, ilgili çıkarımların pek çoğunu da dâhil ederek, yargı belirten boyutları ve savları başarıyla aktarıp bazı ifadelerinde asıl metnin fazlaca etkisi görülse bile, (B diline) tercüme edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "(A dilinden B diline) dilin normal kullanımını yansıtan anlaşılır bir biçimde düzenlenmiş tercümeler üretebilir ancak kaynak metnin düzeninden, paragraf yapısından, noktalama kullanımından ve kendine özgü biçimlendirmesinden fazlaca etkilenmiş olabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "(A dilinde) kaynak metindeki cümle ve paragraf yapısını sıkı sıkıya takip eden ama o metnin ana fikirlerini doğru bir şekilde aktaran (B dilinde) tercümeler üretebilir ancak tercüme okunduğunda kulağa tuhaf gelme olasılığı vardır."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Kaynak metnin yapısına sıkı sıkıya bağlı kalarak, (A dilinden B diline) karmaşık olmayan, standart bir dille yazılmış, karmaşık olmayan olgusal metinlerin yaklaşık tercümelerini üretebilir; tercüme dil hataları barındırsa bile anlaşılabilir niteliktedir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "(A dilinden B diline), karmaşık olmayan, standart bir dilde yazılmış, olgusal kısa metinlerde yer alan bilgilerin yaklaşık tercümelerini üretebilir, dil hataları olsa da tercüme anlaşılabilir niteliktedir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "(A dilinden B diline) en yüksek kullanım sıklığındaki sözcükleri içeren aşina ve günlük temalar hakkındaki çok kısa metinlerin yaklaşık bir tercümesini sağlamak için basit bir dil kullanabilir, hataları olsa da tercüme anlaşılabilir niteliktedir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1", "Tanımlayıcı": "(A dilinden B diline), sözlük yardımıyla basit sözcükler/işaretler ve öbeklerin tercümelerini üretebilir ancak her zaman en uygun anlamı seçemeyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Bir toplantıya veya seminere katıldığı sırada, işlenen konu karmaşık ve/veya aşina olmasa bile orada bulunmayan kişiler için güvenilir notlar alabilir (veya toplantı tutanağı tutabilir)."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Söylenen şeylerdeki çıkarımların ve imaların farkındadır ve fiili olarak kullanılan sözcüklere ek olarak bunlar hakkında da notlar alabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Soyut kavramları ve fikirler arasındaki bağıntıları yakalamak için açımlama ve kısaltmalar kullanarak seçici bir şekilde notlar alabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Kendi ilgi alanına giren konulara yönelik bir ders sırasında ayrıntılı not alabilir; sunulan bilgileri o kadar doğru ve aslına sadık bir şekilde kayda geçirir ki notlar başka kişilerin de işine yarar."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Aşina olmadığı konularda bile, ders veya seminer sırasında, hangi noktaları not etmesi, hangilerini atlaması gerektiğine karar verebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Sunumun normal hızda yapılmış olması koşuluyla, çeşitli sözlü kaynaklardan (ör. dersler, ses kayıtları, resmî tartışma ve münazaralar, röportajlar) gelen karmaşık ve soyut konular hakkındaki uygun, detaylı bilgi ve savları seçebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Aşina olduğu bir konuya dair, açık bir şekilde yapılandırılmış bir dersi anlayabilir ve o andaki ifade ediş biçimine odaklanma eğilimi gösterip bazı bilgileri gözden kaçırsa bile kendisine önemli gelen noktalara yönelik notlar alabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Kendi ilgi alanında ortaya çıkması olası çoğu meseleye yönelik toplantı ve seminerlerde doğru notlar alabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Konunun ilgi alanına girmesi ve dersin açık, iyi yapılandırılmış bir şekilde sunulması koşuluyla, bir ders sırasında ileride tekrar kullanabileceği kadar doğru notlar alabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Konunun aşina olması ve dersin hem basit bir şekilde oluşturulması hem de anlaşılır bir şekilde sesletilmesikoşuluyla karmaşık olmayan bir ders anlatımı sırasında önemli noktaları sıralayan bir liste tutabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Basit bir dille ifade edilmiş olmaları ve not almak için yeterli sürenin tanınması koşuluyla aşina olduğu bir konuya yönelik bir toplantıdaki rutin yönergeleri not edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Konunun aşina ve tahmin edilebilir olması ve sunum yapan kişinin gerektiğinde açıklamalar yapması ve not alma olanağı tanıması koşuluyla, bir sunum/gösteri sırasında basit notlar alabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Eserin belli özelliklerine tepkisini ana hatlarıyla ortaya koyarak ve bu özelliklerin önemini açıklayarak bir esere yönelik kişisel yorumlamasını ayrıntılı şekilde betimleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Bir eserdeki bir karaktere yönelik kişisel yorumlamasını (karakterin psikolojik/duygusal durumu, eylemlerinin güdüleri ve bu eylemlerin sonuçları) ana hatlarıyla belirtebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Bir öykü, roman, film veya oyundaki olay örgüsünün gelişimine, karakterlere ve temalara yönelik kişisel yorumunu ortaya koyabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Fikirlerini ortaya koyarak ve onları örnekler ve savlarla destekleyerek bir esere yönelik tepkilerinin açık bir sunumunu yapabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Bir esere yönelik duygusal tepkisini betimleyebilir ve tepkinin ne şekilde ortaya çıktığını ayrıntılı olarak anlatabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Bir eserde neleri fark edip hangi nedenle takdir ettiğini açıklayarak eserdeki ifade yapısına, tarza ve içeriğe yönelik tepkilerini belli ayrıntılar vererek ifade edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Bir eserin belli bölümlerinin veya yönlerinin neden özellikle ilgisini çektiğini açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Kendisini en çok hangi karakterle ve hangi nedenle özdeşleştirdiğini belli ayrıntılar vererek açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Bir öykü, film veya oyundaki olaylar ile deneyimlediği veya duyduğu benzer olayları ilişkilendirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Bir karakterin yaşadığı duygularla kendi yaşadığı duyguları ilişkilendirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Hikâyenin belli bir noktasında deneyimlediği duyguları, ör. hangi noktalarda bir karakter için kaygıya kapıldığını nedenleriyle birlikte betimleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Bir eserin kendisinde uyandırdığı his ve düşünceleri kısaca açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Bir karakterin kişilik özelliklerini betimleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Bir karakterin duygularını betimleyebilir ve bu duyguların nedenlerini açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Duygularını ve görüşlerini basit bir dille ileterek bir esere yönelik tepkisini ifade edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Bir eserin hangi yönlerinin özellikle ilgisini çektiğini basit bir dille ifade edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Bir eserden hoşlanıp hoşlanmadığını, nedenlerini de belirterek basit bir dille ifade edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2+", "Tanımlayıcı": "Edebî bir eserden özellikle beğendiği basit bölümleri alıntılamak için seçebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1", "Tanımlayıcı": "Bir eserin kendisini nasıl hissettirdiğini basit sözcükler/işaretler kullanarak ifade edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Farklı dönem ve türlerden eserlerin (ör. roman, şiir, oyun) ince tarz farklılıklarını ve hem örtük hem de açık anlamlarını fark edip takdir ederek bu metinlere yönelik eleştirel değerlendirmeler yapabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Metin dilinin daha incelikli ayrımlarını, retorik etkileri ve dilin üslup biçimsel kullanımını (ör. metafor, olağan dışı söz dizimi, muğlaklık) anlam ve yan anlamları yorumlayıp “açığa çıkararak” fark edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Bir eserde yer alan yapı, dil ve retorik ögelerin belli bir amaç için kullanım şeklini eleştirel olarak değerlendirebilir ve bunların uygunluğu ile etkinliği hakkında gerekçelendirilmiş savlar ortaya koyabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Bir yazıdaki dil kullanım geleneklerinin kasıtlı ihlallerine yönelik bir eleştirel değerlendirme yapabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Farklı dönem ve türlerden edebî eserleri de içeren geniş çeşitlilikteki metinlerin eleştirel olarak değerini takdir edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Bir eserin, kendi türüne ait gelenekleri ne ölçüde benimsediğini değerlendirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Bir eserin okuru hangi yollarla içine çektiğini (ör. beklentiler oluşturup bunları altüst ederek) betimleyebilir ve yorumlayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Temaları, karakterleri ve sahneleri dikkate alarak, benzerlik ve zıtlıkları açığa çıkartarak ve bunların aralarındaki bağlantıların uyumunu ortaya koyarak, iki eser arasında karşılaştırmalar yapabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Tematik, yapısal ve biçimsel özelliklerin farkına vararak ve diğer kişilerin görüşleri ile savlarına gönderimde bulunarak, bir eser hakkında gerekçelendirilmiş görüş sunabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Örnekler vererek bir eserin karakterlerle özdeşleşmeyi nasıl teşvik ettiğini değerlendirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Farklı eserlerin aynı temayı işlemeleri açısından nasıl farklılaştıklarını betimleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Bir eserdeki en önemli bölümleri ve olayları, açıkça yapılandırılmış günlük dille ortaya koyabilir ve olayların önemi ile bu olaylar arasındaki bağlantıları açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Yalnızca yüksek kullanım sıklığında olan günlük dil içeren aşina olduğu durumları kapsayan kısa, basit anlatılardaki anahtar temaları ve karakterleri betimleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Yalnızca yüksek kullanım sıklığı olan günlük dil içeren aşina olduğu durumları kapsayan kısa anlatılardaki ana temaları ve karakterleri basit kalıplaşmış bir dille belirleyebilir ve kısaca betimleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Yapılan katkıları dikkate alarak, çekinceleri, anlaşmazlıkları, eleştirileri ve tepkileri en aza indirecek şekilde dile getirerek grup içindeki farklı bakış açılarına duyarlılık gösterebilir,"}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Etkileşimi geliştirebilir ve zarif bir biçimde tartışmayı sonuca ulaştırmaya yardımcı olabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "İnsanların tepkilerine bağlı olarak, sorularını ifade etme biçimini ayarlayabilir ve/veya grup etkileşimine müdahale edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Bir grup tartışmasında, belirtilen fikirleri ve kararları not ederek, bunları grupla birlikte tartışarak ve daha sonra grubun görüşlerini genele yapılan bir toplantıda özetleyerek grup sözcüsü olarak hareket edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "İş birliğine dayalı çalışmanın nasıl düzenleneceğine yönelik tartışmayı teşvik etmek için sorular sorabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Takım çalışması için hedeflerin belirlenmesine yardımcı olabilir ve bu hedeflerin nasıl gerçekleştirileceğine yönelik seçenekleri karşılaştırabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Bir sonraki adımda neyin dikkate alınacağını ve nasıl ilerleneceğini önererek, bir tartışmayı yeniden odaklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Örneğin kendi önerilerini ifade ederek ve başkasının önerilerine yanıt vererek, insanların hemfikir olup olmadığını sorarak ve alternatif yaklaşımlar önererek paylaşılan bir görev üzerine iş birliği yapabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Karmaşık olmayan sorular sorarak ve bu tip soruları yanıtlayarak, yerine getirmesi kolay, ortak görevlerde iş birliği yapabilir ve bir grupta ortak bir amaç doğrultusunda çalışabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Bir tartışmadaki görevi temel terimlerle tanımlayabilir ve diğerlerinin uzmanlıklarıyla ve deneyimleriyle katkıda bulunmalarını isteyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Grupta diğerlerini görüşleriyle katkıda bulunmaya davet edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2+", "Tanımlayıcı": "Diğer katılımcıların yavaş biçimde sesletmelerive bir/birden fazla kişinin kendisine tartışmaya katılırken ve önerilerini dile getirirken yardımcı olması koşuluyla basit, pratik, paylaşılmış görevlerde iş birliği yapabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Zaman zaman karşı tarafın söylediğini tekrar etmesini veya farklı biçimde ifade etmesini istemek koşuluyla başkalarının ne düşündüğünü sorarak, öneriler sunarak ve verilen yanıtları anlayarak yapması kolay ve pratik görevlerde iş birliği yapabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1", "Tanımlayıcı": "Önceden hazırlanmış kısa, basit öbekler kullanarak çok basit görevlere başkalarının katkılarını davet edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Bir çözüm veya atılacak adım üzerinde anlaşmayı kolaylaştırmak amacıyla, yapılan çeşitli katkıları özetleyebilir, değerlendirebilir ve ilişkilendirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Başkalarının söylediklerini bildirerek, farklı pek çok bakış açısını özetleyerek, detaylandırarak ve tartarak ikili çalışma ortağıyla veya grupla bir eylem planına karar vermek için tartışmayı şekillendirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Atılacak adıma karar vermek amacıyla, iş birliğine dayalı bir tartışmada sorunları, zorlukları ve önerileri değerlendirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Düşüncedeki tutarsızlıkları vurgulayabilir ve fikir birliğine varma sürecinde başkalarının görüşlerine meydan okuyabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Karmaşık bir görevde çözülmesi gereken ana sorunu ve dikkate alınması gereken önemli hususları vurgulayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Fikirleri ifade ederek ve onları ortaklaşa geliştirerek, ayrıntıları açıklayarak ve gelecek eylem için önerilerde bulunarak, iş birliği içinde karar vermeye ve problem çözmeye katkıda bulunabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Başkalarının söylediklerini ileterek, farklı bakış açılarını özetleyerek, detaylandırarak ve değerlendirerek bir gruptaki tartışmayı düzenlemeye yardımcı olabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Başkalarının fikir ve görüşlerini daha da geliştirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Fikirlerini bir grup içinde sunabilir ve diğer grup üyelerinin kendi bakış açılarını yansıtan tepkilerini dile getirmeleri için onlara sorular yöneltebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Bir meselenin iki farklı yönünü lehte ve aleyhte savlar sunarak ele alabilir ve bir çözüm veya uzlaşma önerebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Amacı belirterek ve çözülmesi gereken ana meseleyi basit bir şekilde açıklayarak, karmaşık olmayan bir iş birliğine dayalı görevdeki çalışmayı düzenleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Bir tartışmanın odağını korumak için, sorular, yorumlar ve yeniden yapılandırmalar kullanabilir. "}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Bir grup üyesinden görüşlerinin gerekçesini/gerekçelerini vermesini isteyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Karşılıklı anlayışı kontrol etmek ve fikirlerin farklı yönlere sapmadan geliştirilmesine yardımcı olmak için birinin söylediklerinin bir kısmını tekrarlayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2+", "Tanımlayıcı": "Uygun sorular sorarak, hitap ettiği kişinin kendisinin ne demek istediğini anlayıp anlamadığından emin olabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Takip ettiğini göstermek için basit yorumlar yapabilir ve ara sıra soru yöneltebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Basit bir şekilde önerilerde bulunabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1", "Tanımlayıcı": "Önceden hazırlanması koşuluyla, çok basit sözcükleri/işaretleri ve öbekleri kullanarak bir fikri ifade edebilir ve başkalarının ne düşündüğünü sorabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Katılımcıların ihtiyaçlarına ve etkinliğin gerekliliklerine göre farklı roller (kaynak kişi, aracı, üst denetçi vb.) üstlenebilir ve bireyselleştirilmiş destek sağlayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Etkileşimdeki örtük eğilimleri fark edebilir ve tartışma gidişatına rehberlik etmek için uygun adımlar atabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Aşamalar arasında yumuşak geçişler sağlayarak çeşitli ve dengeli genel toplantı, grup ve bireysel çalışma düzenleyebilir.\n"}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Tartışmayı yeniden yönlendirmek, bir kişinin baskın olmasını engellemek veya rahatsız edici davranışların üstüne gitmek için diplomatik olarak müdahalede bulunabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "İş birliğine dayalı grup çalışmasını verimli bir şekilde düzenleyebilir ve yönetebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Bir grubu göreve geri döndürmek veya eşit dağılımlı katılım sağlamak için, araya girip müdahale etmeden bireysel ve grup çalışmalarını izleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "İnsanların dikkatini görevin çeşitli yönlerine odaklamak amacıyla, yerinde sorular sorarak ve önerilerde bulunarak destekleyici bir şekilde araya girebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Grup çalışması için açık yönergeler vererek iş birliği sürecinde katılımcıların farklı rollerini açıklayabilir.\n"}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Problem çözümünü veya öneri seçeneklerini değerlendirmeyi içeren küçük gruplardaki iş birliğine dayalı tartışmanın temel kurallarını açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Bir grubu yeni yönlendirmelerle göreve döndürmek veya daha eşit dağılımlı bir katılıma teşvik etmek için gerektiğinde müdahale edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Bir tartışma sırasında gruptakileri görüşlerini ifade etmeye davet ederek söz alma sırasını düzenleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Bir etkinliği düzenlemek için basit, açık yönergeler verebilir. "}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Gerektiğinde ifadesini oluşturmada destek alması durumunda, ortaklaşa çalışan bir gruba çok basit yönergeler verebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Karmaşık soyut konular üzerine olan bir tartışmada, sorular yöneltip ve başkalarını akıl yürütmelerini detaylandırmaya teşvik edip tartışmaya yön verip, fikirlerin geliştirilmesine etkili bir şekilde öncülük edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Mantıksal akıl yürütmeyi (ör. varsayımda bulunma, çıkarım yapma, çözümleme, doğrulama ve tahmin etme) teşvik etmek amacıyla farklı katkıları temel alıp geliştiren bir dizi açık soru sorabilir.\n"}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Bir kavram veya çözüm bulmak amacıyla, bir gruptaki kişileri birbirlerinin bilgi ve fikirlerini temel alıp bu bilgi ve fikirleri geliştirmeye teşvik edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Bir gruptaki kişileri düşüncelerini betimlemeye ve detaylandırmaya teşvik edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "İnsanları düşüncelerini genişletmeye ve görüşlerini doğrulamaya veya netleştirmeye teşvik etmek için sorular sorabilir ve geri bildirimler verebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "İnsanların fikirlerini temel alıp onları geliştirebilir ve bu fikirleri tutarlı bir düşünce serisiyle ilişkilendirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "İnsanlardan bir fikrin nasıl tartışılan ana konuya uyduğunu açıklamalarını isteyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "İnsanlardan yapmış oldukları bir açıklamadaki belirli noktaları detaylandırmalarını isteyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Açıklanan kavramların anlaşılıp anlaşılmadığını denetlemek için uygun sorular sorabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "İnsanlara nasıl akıl yürüttüklerini açıklamaları için sorular sorabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Birine neden bir şeyi düşündüğünü veya bir şeyin nasıl olacağını düşündüğünü sorabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Birinin belli bir fikir hakkında ne düşündüğünü sorabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1", "Tanımlayıcı": "Bir fikre yönelik ilgisini göstermek için basit, birbirinden kopuk kelimeler/işaretler ve sözel olmayan belirtkeler kullanabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Sosyokültürel ve toplumdilbilimsel farklılıkları dikkate alarak kendi topluluğunun ve diğer toplulukların üyeleri arasında etkili ve doğal bir şekilde aracılık yapabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Hassas bir tartışmayı ince ayrımların ve örtük eğilimlerin farkında olarak etkili bir şekilde yönlendirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Belirsizlikle başa çıkarak, tavsiye ve destek sunarak ve yanlış anlamaları önleyerek kültürlerarası karşılaşmalarda ortak iletişim kültürüne katkıda bulunan bir aracı olarak hareket edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "İnsanların söylenenleri veya yazılanları nasıl yanlış anlayabileceklerini tahmin edebilir ve farklı kültürel bakış açılarına yorum yaparak ve onları yorumlayarak ilgili meseleye yönelik olumlu etkileşimin sürdürülmesine yardımcı olabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "İçinde yer alanların aşina olmadığı belirli bir durumda nasıl ilerleneceğine yönelik bir fikir birliği oluşturmak için sosyokültürel gelenekler hakkındaki bilgisinden yararlanabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Kültürlerarası karşılaşmalarda kendi dünya görüşü dışındaki bakış açılarını takdir ettiğini gösterebilir ve kendisini bağlama uygun bir şekilde ifade edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Kültürlerarası karşılaşmalar sırasında meydana gelen yanlış anlamaları ve yanlış yorumlamaları, şüpheleri gidermek ve tartışmayı ilerletmek amacıyla aslında kastedileni belirterek, açığa kavuşturabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Farklı fikirleri, duyguları ve bakış açılarını anladığını ve takdir ettiğini ifade ederek ve katılımcıları birbirlerinin fikirlerine katkıda bulunmaya ve o fikirlere yönelik görüşlerini belirtmeye davet ederek ortak bir iletişim kültürünü teşvik edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Farklı kültürel yönelimlere sahip insanlarla, görüş ve bakış açılarındaki benzerlikleri ve farklılıkları tartışarak, iş birliği içinde çalışabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Diğer kültürlerden insanlarla iş birliği yaparken ortak prosedürler oluşturmak amacıyla çalışma şeklinde uyarlamalar yapabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Karşılıklı konuşma başlatarak, basit soru ve yanıtlarla ilgi ve empati göstererek ve aynı fikirde olduğunu ve karşı tarafı anladığını ifade ederek kültürlerarası iletişimi destekleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Kültürlerarası karşılaşmalarda grupta bulunan diğer kişilerin farklı duygu ve dünya görüşleri olduğunun ayırdına vararak destekleyici bir şekilde hareket edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Farklı kültürel geçmişe sahip insanları tanıtmak ve bazı soruların ilgili kültürlerde başka biçimde algılanabileceğinin farkında olarak soru sorup cevaplamak için sınırlı bir birikim kullanarak kültürlerarası alışverişi destekleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Dil ve kültüre ilişkin değerler ve tutumlar hakkında basit bir şekilde bilgi alışverişinde bulunarak ortak bir iletişim kültürünün gelişmesine yardımcı olabilir. "}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Bir konuda anlaşmaya varıldığını belirtmek, davet etmek, teşekkür etmek vb. şeyler için sınırlı bir birikimden yararlanırken insanlardan bir şeyleri açıklamalarını ve söylediklerine açıklık getirmelerini istemek için basit sözcükler/işaretler kullanarak kültürlerarası bilgi alışverişine katkıda bulunabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1", "Tanımlayıcı": "Basit sözcük, işaret ve sözel olmayan belirtkelerle samimi bir tavır ve ilgi göstererek başkalarını katkıda bulunmaya davet ederek ve doğrudan doğruya kendisine hitap edildiğinde anlayıp anlamadığını belirterek, kültürlerarası bilgi alışverişini kolaylaştırabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Çok çeşitli genel ve uzmanlık gerektiren konularda (A dilinde) söylenenlerin anlamını, uygun tarz ve üslubu koruyarak, daha ince anlam ayrımlarını ileterek ve sosyokültürel imaları detaylandırarak, (B dilinde) açık, akıcı, iyi yapılandırılmış bir şekilde iletebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Önemli bilgileri açık ve öz bir şekilde aktararak ve kültürel göndermeleri açıklayarak kişisel, akademik ve mesleki ilgi alanına giren (A dilinde) geniş çeşitlilikteki konularda söylenenlerin anlamını (B dilinde) akıcı bir şekilde iletebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Ayrıntılı bilgileri aktararak, her iki tarafın da dikkatini arka plan bilgilerine ve sosyokültürel ipuçlarına çekerek ve gerektiğinde açıklayıcı ve tamamlayıcı sorular yönelterek /açıklamalar yaparak, (A ve B dilleri arasında) aracılık yapabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Kültürel ipuçlarını uygun şekilde yorumlayarak ve gerektiğinde ek açıklamalar yaparak, kendi alanında (A dilinde) yapılan bir karşılama konuşmasında, bir anekdot/anı paylaşımında veya bir sunumda, sunan kişinin konuşma sırasında sık sık aracılığa yönelik duraklaması koşuluyla, söylenenlerin anlamını (B dilinde) iletebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "İlgi alanına giren konularda, (A dilinde) söylenenlerin anlamını, önemli açıklamaların ve bakış açılarının önemini aktararak ve gerektiğinde açıklayarak, ihtiyaç olursa muhatapların açıklama yapması koşuluyla, (B dilinde) iletebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Karmaşık olmayan olgusal bilgileri ve açık kültürel göndermeleri aktararak, ilgi alanlarındaki konularda (A dilinde) söylenenlerin ana anlamını, önceden hazırlanabilmesi ve muhatapların günlük dilde açıkça sesletmeleri koşuluyla, (B dilinde) iletebilir"}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Muhatapların açık bir biçimde sesletmelerive kendisinin açıklama isteyebilmesi ve kendini nasıl ifade edeceğini planlamak için ara verebilmesi koşuluyla, önemli nezaket kurallarına uyarak, kişisel ilgi alanındaki konular hakkında (A dilinde) söylenenlerin ana anlamını (B dilinde) iletebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2+", "Tanımlayıcı": "Açık bir biçimde sesletilmesi ve kendisinin tekrar ve açıklama talep edebilmesi koşuluyla temel kültürel âdetlere uyarak ve önemli bilgileri aktararak günlük durumlarda (A dilinde) söylenenlerin genel anlamını (B dilinde) iletebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Başkalarının kendisine ifade ederken yardımcı olması koşuluyla kişisel isteklerine ve ihtiyaçlarına yönelik bilgi paylaşarak tahmin edilebilir günlük durumlarda (A dilinde) söylenenlerin ana fikrini (B dilinde) aktarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A1", "Tanımlayıcı": "Başkalarının ifade ederken kendisine yardımcı olması koşuluyla başkaları hakkındaki (A dilinde) kişisel detayları ve basit, tahmin edilebilir bilgileri (B dilinde) iletebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Duruma ve kültürel algılara bağlı olarak herhangi bir yorumu diplomatik bir biçimde ifade ederek rahatsız edici bir katılımcıyla zarif bir biçimde ilgilenebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "İlkesel bir mesele üzerinde, başkalarının bakış açılarına saygı gösterirken kendinden emin ama diplomatik bir duruş sergileyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Taraflardan her birinin anlaşmaya yönelik gereksinimlerinin ayrıntılı olarak anlaşıldığını göstermek için tekrar ve açımlama kullanarak farklı bakış açılarına hassasiyet gösterebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Anlaşmazlık içindeki her iki tarafın görüşünün merkezinde ne olduğunu ve belirli durumlarda nelerden vazgeçmeye istekli olduklarını belirlemeleri için diplomatik bir talepte bulunabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Anlaşmazlık içindeki tarafların bakış açılarını değiştirmelerini önermek için ikna edici bir dil kullanabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Anlaşmazlık içindeki tarafların fikir birliğine varmalarına yardımcı olmak amacıyla mahcubiyet veya gücenmeyi en aza indirmek için açık uçlu, tarafsız sorular sorarak muhtemel çözümleri ortaya çıkarabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Anlaşmazlık içindeki tarafların görüşünü daha açık bir şekilde yeniden belirleyerek ve ihtiyaç ve hedeflerine öncelik vererek birbirlerini daha iyi anlamalarına yardımcı olabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Neyin üzerinde anlaşmaya varıldığının ve tarafların her birinden ne beklendiğinin açık ve doğru bir özetini yapabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Sorular sorarak ortak payda alanlarını belirleyebilir ve her iki tarafı da olası çözümleri vurgulamaya davet edebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Bir anlaşmazlıktaki ana fikirleri kabul edilebilir bir netlik içinde özetleyebilir ve ilgili tarafların bakış açılarını açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "İki tarafın yaptığı açıklamaları özetleyebilir, anlaşma alanlarını ve anlaşmanın önündeki engelleri vurgulayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Anlaşmazlık içinde olan taraflardan kendi bakış açılarını açıklamalarını isteyebilir ve konunun aşina olması ve tarafların kendini açıkça ifade etmeleri koşuluyla onların görüşlerine kısaca yanıt verebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Aşina olduğu bir konuda, anlaşmazlık yaşanan bir durumdaki anahtar meseleleri anladığını gösterebilir ve basit onaylanma ve/veya açıklama taleplerinde bulunabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "İnsanların ne zaman aynı fikirde olmadığını veya etkileşimde zorlukların ne zaman oluştuğunu fark edebilir ve uzlaşmayı ve anlaşmayı sağlamak için ezberlenmiş, basit öbeklere başvurabilir. "}, {"Temel Beceri": "Aracılık", "Seviye": "A1", "Tanımlayıcı": "İnsanların aynı fikirde olmadığını veya birinin bir sorunu olduğunu fark edebilir ve anlayış göstermek için ezberlenmiş, basit ifadeler (ör. “Anlıyorum.” veya “İyi misin?”) kullanabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Var olduğu düşünülen mevcut bilgilerine dayanan genişletilmiş tanımlar ve açıklamalar sağlayarak karmaşık kavramları (ör. bilimsel kavramlar) tanıtabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "İnsanları soyut bir konuyla ilgili mevcut bilgileri hakkında düşünmeye teşvik etmek ve açıklanacak olan bir şeyle bağlantı kurmalarına yardımcı olmak için spontane bir dizi soru sorabilir. "}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Oturumun amaçları ile katılımcının/ katılımcıların kişisel veya mesleki ilgi alanları ve deneyimleri arasındaki bağlantıları belirgin bir şekilde açıklayabilir.\n"}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "İnsanları mevcut bilgi ve deneyimleri ile bağlantı kurmaya teşvik etmek için, onlara soru sorabilir ve geri bildirimde bulunabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Yeni bir kavram veya prosedürü, insanların aşina olduğu bir kavramla karşılaştırarak açıklayabilir"}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "İnsanların günlük deneyimlerini kaynak olarak kullanan örnekler sunarak bir şeyin nasıl işlediğini açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Basit sorular sorarak, yeni bir bilginin insanların aşina olduklarıyla nasıl alakalı olduğunu gösterebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Çok çeşitli metinlerde geçen dili, ana içeriği ilgili izleyiciye/ okura uygun üslupta ve karmaşıklık derecesinde ve detaylarla sunmak amacıyla uyarlayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Kendi uzmanlık alanına ait teknik terimleri ve karmaşık kavramları kendi alanındaki meseleler hakkında konuşurken o alanda uzman olmayan kişilere açıklayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Aşina olmadığı bir alıcının karmaşık ve uzmanlık gerektiren bir konuyu anlaması için dili (ör. cümle yapısı, deyimler, jargon açısından) uyarlayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Karmaşık teknik metinleri, o alana yönelik uzmanlık bilgisine sahip olmayan bir alıcının anlayabilmesi için teknik olmayan bir dil kullanarak açımlayabilir ve yorumlayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Kendi alanına ait teknik konuları, o alana yönelik uzmanlık bilgisine sahip olmayan bir alıcının anlayabilmesi için teknik olmayan bir dil kullanarak açıklayabilir.\n"}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Kendi alanı ile ilgili karmaşık bir bilgiyi, basit bir dilde açımlayarak, başkaları için daha açık ve belirgin bir hâle getirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "İlgi duyulan bir konu üzerine yazılmış bir metnin ana içeriğini (ör. bir deneme, herkese açık bir tartışma forumu, bir sunum), daha basit bir dilde açımlayarak başkaları için erişilebilir hâle getirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Aşina olduğu konular hakkında kısa ve karmaşık olmayan metinlerdeki (ör. bir dergi makalesi, bir mülakat) ana fikirleri, içeriğin başkaları için erişilebilir olması amacıyla daha basit biçimde açımlayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Kaynak metindeki sırayı takip ederek kısa bir parçayı basit bir biçimde açımlayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Günlük bir konu üzerine basit bir mesajın ana fikrini, başkasının anlamasına yardımcı olmak için farklı şekilde ifade ederek tekrarlayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Parça-bütün ilişkisini açıklayarak ve o konuya farklı yaklaşım yollarını teşvik ederek karmaşık bir konunun anlaşılmasını kolaylaştırabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Ana fikirleri mantıklı bir bağlantılı kalıpta sunup onları vurgulayarak ve sınıflandırarak ve verilen mesajın anahtar boyutlarını farklı yollardan tekrarlayıp o mesajı pekiştirerek karmaşık bir meselenin anlaşılmasını kolaylaştırabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Bir savın içeriğini ayrı ayrı sunarak karmaşık bir meseleyi anlaşılması basit hâle getirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Karmaşık bir süreci bir dizi küçük adıma bölerek daha kolay anlaşılır hâle getirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Kısa eğitici veya bilgilendirici bir metni ayrı ayrı maddeler hâlinde sunarak daha kolay anlaşılır hâle getirebilir. "}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Bir yönerge serisini, her defasında birkaç sözcüğü/işareti yavaş bir şekilde tekrar ederek ve anlaşılmayı kolaylaştırmak için sözlü ve sözsüz vurgu yaparak daha kolay hâle getirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Detaylandırarak ve örnekler vererek karmaşık akademik ve mesleki konular üzerine olan metinlerdeki bilgiyi açıklığa kavuşturabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Zor açıklanır boyutları daha belirgin bir şekilde açıklayarak ve yardımcı detaylar ekleyerek karmaşık, zorlu içeriği daha erişilebilir hâle getirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Anlatımı uzatarak, açıklama, tarz ve üslupta değişiklikler yaparak karmaşık bir metinde yer alan ana fikirleri hedef okur için daha erişilir yapabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "Örnekler, gerekçeler, açıklayıcı yorumlar ekleyerek ilgi alanındaki bir metnin içeriğini hedef okur için daha erişilir yapabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Somut örnekler vererek, adım adım özetleyerek, ana fikirleri tekrar ederek, ilgi duyduğu alandaki konulara yönelik kavramları daha erişilir yapabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Tekrarlama kullanarak ve örnekler ekleyerek yeni bir bilgiyi daha erişilir yapabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1+", "Tanımlayıcı": "Ana bilgiyi başka bir biçimde ifade ederek günlük bir konunun bir boyutunu daha belirgin ve açık hâle getirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Basit örnekler vererek günlük bir konunun bir boyutunu daha açık hâle getirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C2", "Tanımlayıcı": "Karmaşık bir kaynak metni tutarlılığı, uyumu ve bir fikir akışını iyileştirirken metnin amacı için gerekli olmayan bölümleri çıkararak yeniden tasarlayabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "C1", "Tanımlayıcı": "Hedef okura göre en alakalı noktaların üzerinde durmak için karmaşık bir kaynak metni yeniden düzenleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2+", "Tanımlayıcı": "İlgisiz ve tekrar eden bilgiyi çıkararak ve hedef okuru dikkate alarak kaynak metni basitleştirebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Önemli içeriği daha erişilebilir hâle getirmek amacıyla, belirli bir hedef kitle için alakalı yeni bilgi eklemeyen kısımları çıkartarak kaynak metni düzenleyebilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B2", "Tanımlayıcı": "Bir metnin farklı yerlerinde geçen ilgili ve tekrar eden bilgiyi ayırt edebilir ve gerekli mesajı daha açık hâle getirmek için kaynaştırabilir."}, {"Temel Beceri": "Aracılık", "Seviye": "B1", "Tanımlayıcı": "Karmaşık olmayan, bilgilendirici bir metindeki temel bilgileri başka birine iletmek amacıyla tanımlayabilir ve işaretleyebilir (ör. altını çizebilir, vurgulayabilir)."}, {"Temel Beceri": "Aracılık", "Seviye": "A2", "Tanımlayıcı": "Kısa günlük bir metindeki anahtar cümleleri ayırt edebilir ve işaretleyebilir (ör. altını çizme, renkli vurgulama ile)."}, {"Temel Beceri": "0", "Seviye": "C2", "Tanımlayıcı": "Düşünceleri tam olarak ifade etmek, vurgu yapmak, ayırt etmek ve belirsizliği ortadan kaldırmak için çok engin bir dil varlığından kapsamlı ve güvenilir bir ustalıkla yararlanabilir. Söylemek istediklerini kısıtlamak zorunda olduğuna dair bir işaret yoktur."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Engin çeşitlilikteki karmaşık dil bilgisi yapılarını uygun şekilde ve önemli ölçüde bir esneklikle kullanabilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Söylemek istediklerini kısıtlamak zorunda kalmadan, kendini belirgin bir şekilde ifade etmek için engin bir dil varlığından uygun bir yapı seçebilir."}, {"Temel Beceri": "0", "Seviye": "B2+", "Tanımlayıcı": "Söylemek istediklerini kısıtlamak zorunda kalmadan kendini açıkça ifade edebilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Açık betimlemeler yapabilmek, bakış açılarını ifade edebilmek ve bunu yapmak için bazı karmaşık cümle yapılarını kullanarak çok fazla kelime/işaret aramadan savlar geliştirebilmek için yeterli bir dil varlığına sahiptir."}, {"Temel Beceri": "0", "Seviye": "B1+", "Tanımlayıcı": "Öngörülemeyen durumları tanımlamak, bir fikir veya problemdeki ana fikirleri kabul edilebilir bir netlikle açıklamak ve müzik ve film gibi soyut veya kültürel konularda düşünceleri ifade etmek için yeterli bir dil varlığına sahiptir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Aile, hobiler ve ilgi alanları, iş, seyahat ve güncel olaylar gibi konularda biraz tereddüt ve dolaylı ifadelerle kendini ifade etmek için yeterli kelime birikimine sahiptir ancak sözcük sınırlamaları tekrara ve hatta zaman zaman ifade etmede zorluklara neden olur.\n"}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Genelde mesajdan ödün vermek ve kelimeler/işaretler aramak zorunda kalacak olsa bile tahmin edilebilir içeriğe sahip günlük durumlarla başa çıkmasını sağlayan temel bir dil birikimine sahiptir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Somut türden basit ihtiyaçları (ör. kişisel ayrıntılar, günlük rutinler, istekler ve ihtiyaçlar, bilgi talepleri) karşılamak için kısa, günlük ifadeler üretebilir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Temel cümle kalıplarını kullanabilir ve ezberlenmiş öbekler, birkaç kelime/işaret grupları ve kalıp ifadeler kullanarak, ör. kendisi ve diğer insanlar, yaptığı şeyler, mekânlar, sahip oldukları vb. hakkında iletişim kurabilir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Öngörülebilir hayatta kalma durumlarını kapsayan, sınırlı bir kısa ve ezberlenmiş öbek birikimine sahiptir; rutin dışı durumlarda sık sık aksama ve yanlış anlamalar meydana gelir."}, {"Temel Beceri": "0", "Seviye": "A1", "Tanımlayıcı": "Kişisel ayrıntılar ve somut türden ihtiyaçlar hakkında çok temel basit ifade genişliğine sahiptir."}, {"Temel Beceri": "0", "Seviye": "A1", "Tanımlayıcı": "Bazı temel yapıları, tek bir yan cümleden oluşan cümlelerde bazı ögeleri eksik veya azaltılmış olarak kullanabilir."}, {"Temel Beceri": "0", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Kendisi hakkında basit bilgiler vermek için birbirinden kopuk sözcükleri/işaretleri ve temel ifadeleri kullanabilir."}, {"Temel Beceri": "0", "Seviye": "C2", "Tanımlayıcı": "Deyimsel ifadeler ve gündelik anlatım içeren çok geniş bir sözlük birikimine iyi derecede hâkimdir, anlamın yan anlam düzeylerinin farkındadır."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Dolaylı ifadelerle boşlukların anında üstesinden gelmeye izin veren geniş bir sözcük birikimine iyi bir şekilde hâkimdir, az da olsa ifade ve kaçınma stratejileri arayışı içindedir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Daha az karşılaşılan kelimelerin/işaretlerin bile eş anlamlılarını kullanarak hemen hemen tüm durumlarda birkaç kelime seçeneği arasında seçim yapabilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Yaygın deyimsel ifadelere ve gündelik anlatıma hâkimdir; kelimeleri/işaretleri oldukça iyi kullanabilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Kendi uzmanlık alanında ortak olan teknik kelime ve deyimsel ifade genişliğini anlayabilir ve uygun şekilde kullanabilir."}, {"Temel Beceri": "0", "Seviye": "B2+", "Tanımlayıcı": "Uzmanlık alanlarını diğer uzmanlarla tartışırken kendi alanının temel teknik terminolojisini anlayabilir ve kullanabilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Alanıyla bağlantılı meseleler ve çoğu genel konu için iyi bir söz varlığına sahiptir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Sık tekrardan kaçınmak için ifadesini çeşitlendirebilir ancak sözlüksel boşluklar yine de tereddüte ve dolambaçlı ifadelere neden olabilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Çoğu bağlamda oldukça sistematik biçimde birçok kelimenin/işaretin uygun eş dizimlerini üretebilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Uzmanlık gerektiren kelimelerin çoğunu anlayabilir ve kullanabilir ancak bunun dışında uzmanlık gerektiren terminolojisiyle ilgili sorunları vardır."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Aile, hobiler ve ilgi alanları, iş, seyahat ve güncel olaylar gibi günlük yaşamıyla ilgili çoğu konuda biraz dolaylı ifadelerle kendini ifade edecek yeterli kelimeye sahiptir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Aşina olduğu konular ve günlük durumlarla ilgili iyi bir söz varlığına sahiptir."}, {"Temel Beceri": "0", "Seviye": "A2+", "Tanımlayıcı": "Aşina olduğu durumları ve konuları içeren rutin günlük işlemleri yürütmek için yeterli kelimeye sahiptir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Temel iletişim ihtiyaçlarının ifadesi için yeterli kelime birikimine sahiptir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Basit hayatta kalma ihtiyaçlarıyla başa çıkmak için yeterli kelimeye sahiptir."}, {"Temel Beceri": "0", "Seviye": "A1", "Tanımlayıcı": "Belirli somut durumlarla ilgili temel kelime/işaret ve öbek birikimine sahiptir."}, {"Temel Beceri": "0", "Seviye": "C2", "Tanımlayıcı": "İlgisi başka bir şey üzerinde olsa bile (ör. ileriye yönelik planlama, diğerlerinin tepkilerini izleme), karmaşık dil yapısının tutarlı dil bilgisi denetimini sağlar."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Sürekli olarak yüksek derecede dil bilgisel doğruluğu korur, hatalar nadirdir ve fark edilmesi zordur."}, {"Temel Beceri": "0", "Seviye": "B2+", "Tanımlayıcı": "İyi dil bilgisi kontrolü vardır, ara sıra “sürçmeler” veya sistematik olmayan hatalar ve cümle yapısında küçük kusurlar meydana gelebilir ancak bunlar nadirdir ve çoğu zaman geriye dönük olarak düzeltilebilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Nispeten yüksek derecede dil bilgisi kontrolü vardır. Yanlış anlamaya neden olan hatalar yapmaz."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Karmaşık yapıları sabit bir şekilde bazı hatalarla kullanma eğiliminde olmasına rağmen basit dil yapılarına ve bazı karmaşık dil bilgisi kalıplarına iyi derecede hâkimdirç"}, {"Temel Beceri": "0", "Seviye": "B1+", "Tanımlayıcı": "Aşina olduğu bağlamlarda gözle görülür ana dilinin etkisine rağmen genel olarak iyi bir kontrol ile ve kabul edilebilir doğrulukta iletişim kurar. Hatalar yapsa da neyi ifade etmeye çalıştığı açıktır."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Sık kullanılan “rutinler” ve daha öngörülebilir durumlarla ilişkili kalıplardan oluşan bir birikimi kabul edilebilir bir doğrulukla kullanır."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Bazı basit yapıları doğru kullanır ancak yine de sistematik olarak temel hatalar yapar, yine de genellikle ne söylemeye çalıştığı açıktır."}, {"Temel Beceri": "0", "Seviye": "A1", "Tanımlayıcı": "Öğrenilmiş bir birikimde yer alan birkaç basit dil bilgisi yapısının ve cümle kalıbının yalnızca sınırlı denetime sahiptir."}, {"Temel Beceri": "0", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Kısa ifadelerde çok basit kelime/işaret sıralaması ilkelerini kullanabilir."}, {"Temel Beceri": "0", "Seviye": "C2", "Tanımlayıcı": "Kelime birikiminin sürekli olarak doğru ve uygun kullanır."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Daha az yaygın olan kelimeleri deyimsel olarak ve uygun şekilde kullanır."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Ara sıra küçük sürçmeler var ancak önemli kelime hataları yok."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "İletişimi engellemeden bazı karışıklıklar ve yanlış sözcük/işaret seçimi oluşsa bile sözlüksel doğruluk genellikle yüksektir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Temel kelime birikimini iyi kontrol eder ancak daha karmaşık düşünceleri ifade ederken veya aşina olmadığı konuları ve durumları ele alırken büyük hatalar hâlâ meydana gelir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Aşina olduğu konuları tartışırken çok çeşitli basit kelimeleri uygun şekilde kullanır."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Somut, günlük ihtiyaçlarla ilgili dar bir sözcük birikimini kontrol edebilir."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "C2", "Tanımlayıcı": "Mesajlarının daha ince noktalarının açık ve net olması için, hedef dildeki çeşitli ses bilimsel özelliklerin tamamını -kelime ve cümle vurgusu, ritim ve tonlama gibi bürünsel özellikler dâhil- yüksek düzeyde kontrol ile kullanabilir. Anlaşılabilirlik ve anlamın etkili bir şekilde iletilmesi ve geliştirilmesi, diğer dilden/dillerden alınabilecek aksan özelliklerinden hiçbir şekilde etkilenmez."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "C1", "Tanımlayıcı": "Baştan sona anlaşılırlığı sağlamak için hedef dildeki çeşitli ses bilim özelliklerinin tümünü yeterli denetimle kullanabilir. Hedef dilin neredeyse tüm seslerini sesletebilir, aksan(lar)ın diğer dilden/dillerden korunan bazı özellikleri fark edilebilir ancak anlaşılabilirliği etkilemez."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "B2", "Tanımlayıcı": "Genellikle uygun tonlamayı kullanabilir, vurguyu doğru yerleştirebilir ve tek sesleri açık bir şekilde sesletebilir aksan, konuştuğu diğer dilden/dillerden etkilenme eğilimindedir ama bunun anlaşılabilirlik üzerinde çok az etkisi vardır veya hiç etkisi yoktur."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "B1", "Tanımlayıcı": "Söyleyiş genellikle anlaşılırdır, hem ifade hem de sözcük düzeyindeki tonlama ve vurgu, mesajın anlaşılmasını engellemez. Aksan genellikle konuştuğu diğer dillerden etkilenir.\n"}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "A2", "Tanımlayıcı": "Söyleyiş genellikle anlaşılacak kadar açıktır ancak karşılıklı konuşmadaki ortaklarının zaman zaman söylenenin tekrar edilmesini istemesi gerekecektir. Vurgu, ritim ve tonlama üzerinde konuştuğu diğer dilden/dillerden güçlü bir etki, anlaşılabilirliliği etkileyebilir ve muhatapların iş birliğini gerektirebilir. Yine de aşinaolduğu kelimelerin söyleyişi açıktır."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "A1", "Tanımlayıcı": "Öğrenilmiş kelime ve öbeklerin çok sınırlı bir birikiminin söyleyişi, [içinde bulunduğu] dil grubunun konuşmacılarıyla uğraşmaya alışkın muhataplar tarafından biraz çaba sarf edilerek anlaşılabilir. Basit, aşina olduğu kelimeler ve öbekler için vurgunun yanı sıra sınırlı bir çeşitlilikteki sesi doğru bir şekilde tekrar üretebilir.\n"}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "C2", "Tanımlayıcı": "Hedef dilin neredeyse tüm seslerini açıklık ve netlikle sesletebilir."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "C1", "Tanımlayıcı": "Hedef dilin neredeyse tüm seslerini yüksek derecede denetleyerek sesletebilir. Bir sesi belirgin bir şekilde yanlış söyleyişi olsa da bile genellikle kendi kendisini düzeltebilir."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "B2", "Tanımlayıcı": "Hedef dildeki seslerin büyük bir kısmını uzayan dil üretimlerinde açık biçimde sesletebilir, birkaç sistematik yanlış söyleyişe rağmen baştan sona anlaşılabilirdir."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "B2", "Tanımlayıcı": "Aşina olmadığı çoğu kelimenin ses bilimsel özelliklerini (ör. kelime vurgusu) kabul edilebilir bir doğrulukla (ör. okurken) tahmin etmek için birikiminden genelleme yapabilir."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "B1", "Tanımlayıcı": "Tek seslerde ve daha az aşina olduğu kelimelerde düzenli olarak yanlış söyleyişi olmasına rağmen genel olarak anlaşılabilirdir."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "A2", "Tanımlayıcı": "Söyleyiş basit günlük durumlarda iletişim kurarken muhatabın belirli sesleri anlamak için çaba göstermesi koşuluyla, genellikle anlaşılabilirdir."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "A2", "Tanımlayıcı": "Sesbirimlerin sistematik olarak yanlış sesletilmesi, muhatabın konuşmacının dil geçmişinin söyleyiş üzerindeki etkisini tanımak ve ayarlamak için çaba göstermesi koşuluyla anlaşılırlığı engellemez."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "A1", "Tanımlayıcı": "Dikkatli bir şekilde yönlendirilirse sesleri hedef dilde tekrar üretebilir."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "A1", "Tanımlayıcı": "Sınırlı sayıda sesi sesletebilir, böylece konuşma ancak muhatap destek sağladığında (ör. sesleri doğru şekilde tekrar ederek ve yeni sesleri tekrarla çıkararak) anlaşılır olur."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "C2", "Tanımlayıcı": "İnce anlam ayrımlarını iletmek (ör. ayırt etmek ve vurgulamak) için bürünsel özelliklerden (ör. vurgu, ritim ve tonlama) uygun ve etkili bir şekilde yararlanabilir."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "C1", "Tanımlayıcı": "Vurgu, ritim ve/veya tonlamanın denetiminde [söylediklerinin] anlaşılabilirliğine veya tesirine etki etmeyen, yalnızca ara sıra meydana gelen gecikmelerle akıcı, anlaşılır sözlü söylem üretebilir.\n"}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "C1", "Tanımlayıcı": "Kastettiğini tam olarak ifade etmek için tonlamayı değiştirebilir ve vurguyu doğru yere yerleştirebilir."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "B2", "Tanımlayıcı": "Konuştuğu diğer dillerden biraz etkilenmiş olsa bile, iletmek istediği mesajı desteklemek için bürünsel özellikler (ör. vurgu, tonlama, ritim) kullanabilir."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "B1", "Tanımlayıcı": "Konuştuğu diğer dilin/ dillerin vurgu, tonlama ve/veya ritim üzerindeki güçlü etkisine rağmen mesajlarını anlaşılır bir şekilde iletebilir."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "A2", "Tanımlayıcı": "Konuştuğu diğer dilden/dillerden gelen vurgu, tonlama ve/veya ritim üzerinde güçlü bir etkiye sahip olmalarına rağmen günlük sözcük ve öbeklerin bürünsel özelliklerini anlaşılır bir şekilde kullanabilir."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "A2", "Tanımlayıcı": "Bürünsel özellikler (ör. kelime vurgusu), aşina olduğu günlük kelimeler ve basit ifadeler için yeterlidir."}, {"Temel Beceri": "Ses Bilimsel", "Seviye": "A1", "Tanımlayıcı": "Konuştuğu diğer dilden/dillerden vurgu, ritim ve/veya tonlama üzerinde çok güçlü bir etkiye sahip olmasına rağmen, basit sözcük ve öbeklerden oluşan sınırlı bir birikimin bürünsel özelliklerini anlaşılır bir şekilde kullanabilir; muhatabının iş birliği içinde olması gerekir."}, {"Temel Beceri": "Yazma", "Seviye": "C2", "Tanımlayıcı": "Yazı, yazımsal açıdan hatasızdır."}, {"Temel Beceri": "Yazma", "Seviye": "C1", "Tanımlayıcı": "Düzen, paragraflar ve noktalama işaretleri tutarlı ve faydalıdır."}, {"Temel Beceri": "Yazma", "Seviye": "C1", "Tanımlayıcı": "Ara sıra kalem kaymaları/sürçmeleri dışında yazım doğrudur."}, {"Temel Beceri": "Yazma", "Seviye": "B2", "Tanımlayıcı": "Standart düzen ve paragraflama kurallarını izleyen, açıkça anlaşılır, aralıksız yazı üretebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B2", "Tanımlayıcı": "Yazım ve noktalama işaretleri kabul edilebilir ölçüde doğrudur ancak ana dili etkisi görülebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1", "Tanımlayıcı": "Genel olarak baştan sona anlaşılır olan aralıksız yazı üretebilir."}, {"Temel Beceri": "Yazma", "Seviye": "B1", "Tanımlayıcı": "Yazım, noktalama ve düzen çoğu zaman takip edilecek kadar doğrudur."}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "Günlük konularda kısa cümleleri kopyalayabilir, ör. bir yere nasıl gidileceğine dair yönergeler."}, {"Temel Beceri": "Yazma", "Seviye": "A2", "Tanımlayıcı": "Sözlü kelime birikiminde bulunan kısa kelimeleri kabul edilebilir bir ses bilgisel doğrulukla (ancak tam olarak standart yazım şart değil) yazabilir."}, {"Temel Beceri": "Yazma", "Seviye": "A1", "Tanımlayıcı": "Aşina olduğu sözcükleri ve kısa öbekleri kopyalayabilir, ör. basit işaretler veya yönergeler, günlük nesnelerin adları, mağaza adları ve düzenli olarak kullanılan kalıp öbekler."}, {"Temel Beceri": "Yazma", "Seviye": "A1", "Tanımlayıcı": "Adresini, uyruğunu ve diğer kişisel bilgilerini heceleyebilir."}, {"Temel Beceri": "Yazma", "Seviye": "A1", "Tanımlayıcı": "Temel noktalama işaretlerini kullanabilir (ör. nokta, soru işareti)."}, {"Temel Beceri": "0", "Seviye": "C2", "Tanımlayıcı": "Anlamın yan anlam düzeylerinin farkında olarak deyimsel ifadelere ve gündelik anlatıma hâkimdir.\n"}, {"Temel Beceri": "0", "Seviye": "C2", "Tanımlayıcı": "Hedef dilin yetkin kullanıcıları tarafından kullanılan dilin neredeyse tüm toplumdilbilimsel ve sosyokültürel çıkarımlarını fark edip takdir eder ve buna göre davranabilir."}, {"Temel Beceri": "0", "Seviye": "C2", "Tanımlayıcı": "Sosyokültürel ve toplumdilbilimsel farklılıkları dikkate alarak hedef dil kullanıcıları ile kendi topluluğunun üyeleri arasında etkili ve doğal bir şekilde aracılık yapabilir."}, {"Temel Beceri": "0", "Seviye": "C2", "Tanımlayıcı": "Yönetmek, tartışmak, ikna etmek, caydırmak, müzakere etmek ve danışmanlık yapmak için etkin bir şekilde hem sözlü hem de yazılı olarak çok çeşitli ve çok yönlü dil kullanabilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Üslup geçişlerini fark edip takdir ederek geniş çeşitlilikteki deyimsel ifadeleri ve gündelik anlatımı tanıyabilir ancak ara sıra, özellikle aksan aşina değilse, ayrıntıları doğrulaması gerekebilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Mizah, ironi ve örtük kültürel göndermeleri anlayabilir ve ince anlam ayrımlarını yakalayabilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Önemli ölçüde argo ve deyimsel kullanımın geçtiği filmleri takip edebilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Duygusal, kinayeli ve şaka amaçlı kullanım dâhil olmak üzere sosyal amaçlar için dili esnek ve etkili bir şekilde kullanabilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Resmîlik düzeylerini (üslup ve tarz) sosyal bağlama uygun olduğu şekilde resmî, resmî olmayan veya günlük gündelik anlatıma uyacak şekilde ayarlayabilir ve tutarlı bir üslup sürdürebilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Eleştirel yorumlarını şekillendirebilir veya diplomatik olarak aynı fikirde olmadığını kuvvetli bir şekilde ifade edebilir."}, {"Temel Beceri": "0", "Seviye": "B2+", "Tanımlayıcı": "Resmî veya resmî olmayan üslupta, duruma ve ilgili kişiye/kişilere uygun olarak, kendini güvenle, açık ve nazikçe ifade edebilir."}, {"Temel Beceri": "0", "Seviye": "B2+", "Tanımlayıcı": "Sosyokültürel/toplumdilbilimsel ipuçlarını tanıyabilir ve yorumlayabilir ve kendini uygun şekilde ifade etmek için duruma göre dilsel ifade biçimlerini bilinçli olarak değiştirebilir."}, {"Temel Beceri": "0", "Seviye": "B2+", "Tanımlayıcı": "Konuşma hızlı ve gündelik anlatıma dayalı olsa bile biraz çaba göstererek grup tartışmalarına ayak uydurabilir ve katkıda bulunabilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Resmî ve resmî olmayan ifade biçimleri arasında bir ayrım yapmak için ifadelerini ayarlayabilir ancak bunu her zaman uygun şekilde yapamayabilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Hedef dil kullanıcılarıyla, istemeyerek onları güldürmeden veya kızdırmadan veya onların başka bir yeterlik sahibi kullanıcıyla iletişimleri esnasında davranacaklarından daha farklı davranmalarını gerektirmeden ilişkilerini sürdürebilir"}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Durumlara göre kendini uygun şekilde ifade edebilir ve kaba ifade hatalarından kaçınabilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Herhangi bir resmiyet niteliği taşımayan bir üslupta en yaygın örneklerini/biçimlerini kullanarak çok geniş çeşitlilikteki dil işlevlerini gerçekleştirebilir ve bunlara yanıt verebilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Belirgin nezaket kurallarının farkındadır ve uygun şekilde davranır."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "İlgili toplulukta yaygın olan gelenekler, âdetler, tutumlar, değerler ve inançlar ile kendi topluluğundakiler arasındaki en önemli farklılıkların ayırdındadır ve bunların belirtilerini gösteren işaretleri arar."}, {"Temel Beceri": "0", "Seviye": "A2+", "Tanımlayıcı": "Temel dil işlevlerini (ör. bilgi alışverişi ve r

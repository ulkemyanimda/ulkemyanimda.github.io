icalar) yerine getirebilir ve bunlara yanıt verebilir. Düşünce ve tutumları basit bir şekilde ifade edebilir."}, {"Temel Beceri": "0", "Seviye": "A2+", "Tanımlayıcı": "En basit ortak ifadeleri kullanarak ve temel rutinleri izleyerek basit ama etkili bir şekilde sosyalleşebilir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Gündelik selamlama ve hitap amaçlı nezaket yapılarını kullanarak çok kısa sosyal alışverişleri halledebilir."}, {"Temel Beceri": "0", "Seviye": "A1", "Tanımlayıcı": "En basit günlük nezaket yapılarını kullanarak temel sosyal iletişim kurabilir: Selamlama ve veda, tanıtımlar, “lütfen, teşekkür ederim, özür dilerim vb.” diyerek. "}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C2", "Tanımlayıcı": "Vurgu yapmak, duruma, muhataplara vb. göre farklılaştırmak ve belirsizliği ortadan kaldırmak için düşünceleri farklı dilsel biçimlerde yeniden ifade etmede büyük esneklik gösterir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "İfade tarzını ve cümle uzunluğunu, gelişmiş kelime birikimini ve kelime sırasını etkili bir şekilde değiştirerek hedef kitle üzerinde olumlu bir etki yaratabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Bağlılık veya tereddüt, güven veya belirsizlik derecelerini ifade etmek için ifadelerini değiştirebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2+", "Tanımlayıcı": "Söylediklerini ve ifade etme araçlarını duruma ve alıcıya göre ayarlayabilir ve koşullara uygun bir resmiyet düzeyi benimseyebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Normalde karşılıklı konuşmada bulunan yön, tarz ve vurgu değişikliklerine uyum sağlayabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Söylemek istediği şeyin ifade ediliş biçimini değiştirebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Bir noktayı vurgulamak veya açıklamak için bir fikri yeniden ifade edebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1", "Tanımlayıcı": "Daha az rutin, hatta zor durumlarla başa çıkmak için ifadelerini uyarlayabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1", "Tanımlayıcı": "İstediğinin çoğunu ifade etmek için çok çeşitli basit dil [kelime, yapı vb.] yapılarından esnek bir şekilde yararlanabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2", "Tanımlayıcı": "İyi prova edilmiş, ezberlenmiş, basit öbekleri sınırlı sözcük değiştirme yoluyla belirli koşullara uyarlayabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2", "Tanımlayıcı": "Söz öbeklerine ait unsurların basit yeniden düzenlenmesi yoluyla öğrenilen öbekleri genişletebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Sözü almak veya zaman kazanmak ve düşünürken sırasını korumak amacıyla sözlerine uygun bir giriş yapmak için anında hazır bulunan çeşitli işlevsel söylemlerden uygun bir öbek seçebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Uygun bir dil kullanarak tartışmaya müdahale edebilir. "}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Etkili şekilde sıra alarak, söylemi uygun şekilde başlatabilir, sürdürebilir ve sonlandırabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Konuşmayı başlatabilir, uygun olduğunda sırasını alabilir ve gerektiğinde karşılıklı konuşmayı bitirebilir ancak bunu her zaman zarif bir şekilde yapamayabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Zaman kazanmak ve söz sırasını korumak için söylemek istediklerini ifade ederken hazır öbekler (ör. “Bu yanıtlaması zor bir soru”) kullanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Aşina olduğu bir konudaki tartışmaya söz almak için uygun bir öbek kullanarak müdahale edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Aşina olduğu veya kişisel ilgi alanına giren konularda basit, yüz yüze konuşmayı başlatabilir, sürdürebilir ve kapatabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Kısa karşılıklı bir konuşmayı başlatmak, sürdürmek veya bitirmek için basit teknikler kullanabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Basit, yüz yüze konuşmayı başlatabilir, sürdürebilir ve kapatabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Dikkat verilmesini isteyebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C2", "Tanımlayıcı": "Hedef okurun ilgisini kolaylıkla canlı tutarak ve tüm iletişim amaçlarını yerine getirerek karmaşık fikirleri etkili bir şekilde iletmek için yeterli esneklikle ilgili metin tipinin kurallarını kullanabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Hedef okuyucunun dikkatini çekmek ve karmaşık fikirleri iletmek için ilgili metin tipinin kurallarını kullanabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Alt temaları bütünleştirerek, belirli noktaları geliştirerek ve uygun bir sonuçla tamamlayarak ayrıntılı betimlemeler ve anlatılar verebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Uzun ve karmaşık bir metne uygun bir giriş ve sonuç yazabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Yardımcı fikirler, sebepler ve ilgili örneklerle ana fikirleri belirli bir uzunlukta genişletebilir ve destekleyebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2+", "Tanımlayıcı": "Önemli noktaları uygun şekilde vurgulayarak ve ilgili destekleyici ayrıntılarla sistematik olarak bir sav geliştirebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2+", "Tanımlayıcı": "Karmaşık bir savın ana hatlarını ikna edici bir şekilde sunabilir ve bunlara yanıt verebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Fikirlerini iletirken ilgili iletişimsel görevin geleneksel yapısını takip edebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Ana fikirlerini ilgili destekleyici ayrıntılar ve örneklerle genişleterek ve destekleyerek belirgin bir açıklama veya anlatı geliştirebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Yardımcı noktalar ve ilgili örneklerle bakış açılarını belirli bir uzunlukta genişleterek ve destekleyerek açık bir sav geliştirebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Çeşitli seçeneklerin avantaj ve dezavantajlarını değerlendirebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Gerçek ve görüş arasındaki farkı açıkça gösterebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1+", "Tanımlayıcı": "Öyküleyici metinde açık bir şekilde kronolojik sırayı işaret edebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1+", "Tanımlayıcı": "Çoğu zaman zorlanmadan takip edilecek kadar iyi düzeyde bir sav geliştirebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1", "Tanımlayıcı": "Fikirlerini iletirken ilgili metin tipinin geleneksel yapısının farkında olduğunu gösterir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1", "Tanımlayıcı": "Karmaşık olmayan bir anlatıyı veya açıklamayı bir dizi madde olarak kabul edilebilir ölçüde akıcı bir şekilde ilişkilendirebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2+", "Tanımlayıcı": "Basit bir liste hâlinde bir hikâye anlatabilir veya bir şeyi tanımlayabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2+", "Tanımlayıcı": "“Gibi” veya “örneğin” kullanarak çok basit bir metinde bir şeye örnek verebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C2", "Tanımlayıcı": "Farklı [metin] düzenleme kalıplarını ve çok çeşitli bağdaşıklık ögelerini tam ve uygun şekilde kullanarak kendi içinde tutarlı ve bağdaşık metinler oluşturabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Metin düzenleme kalıplarının bağlayıcıların ve bağdaşıklık ögelerinin kontrollü kullanımını gösteren, açık, sorunsuz akan, iyi yapılandırılmış bir dil üretebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Çeşitli bağdaşıklık ögeleri ve metin düzenleme kalıpları kullanarak iyi düzenlenmiş kendi içinde tutarlı metinler üretebilir"}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2+", "Tanımlayıcı": "Fikirler arasındaki ilişkileri açıkça belirtmek için çeşitli bağlantı ifadelerini verimli bir şekilde kullanabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Uzun bir katkıda bir miktar “sıçrama” olsa bile ifadelerini açık ve tutarlı bir söylemle ilişkilendirmek için sınırlısayıda bağdaşıklık ögeleri kullanabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Çeşitli bağlantı ifadeleri ve bağdaşıklık ögelerini kullanarak genellikle iyi düzenlenmiş ve kendi içinde tutarlı metinler üretebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Nispeten uzun metinleri açık, mantıklı paragraflar hâlinde yapılandırabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1+", "Tanımlayıcı": "Basit bir söylemsel metinde bir karşı sav sunabilir (ör. “ancak” ile)."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1", "Tanımlayıcı": "Bir dizi daha kısa, ayrık basit unsurları bağlantılı, doğrusal bir maddeler dizisine bağlayabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1", "Tanımlayıcı": "Sınırlı sayıda bağdaşıklık ögelerini kullanarak, örneğin, bir hikâyede, nispeten uzun cümleler kurabilir ve bunları birbirine bağlayabilir.\n"}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1", "Tanımlayıcı": "Nispeten uzun bir metinde basit, mantıklı paragraf sonları oluşturabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2+", "Tanımlayıcı": "Bir hikâye anlatmak veya bir şeyi basit bir nokta/maddeler listesi olarak tanımlamak amacıyla basit cümleleri bağlamak için en sık rastlanan bağlayıcıları kullanabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2", "Tanımlayıcı": "Basit bağlayıcılarla (ör. “ve”, “ama” ve “çünkü”) sözcük/işaret gruplarını bağlayabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A1", "Tanımlayıcı": "Sözcükleri/işaretleri veya sözcük/işaret gruplarını çok temel doğrusal bağlayıcılarla (ör. “ve” veya “sonra”) bağlayabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C2", "Tanımlayıcı": "Çok çeşitli niteleme ögelerini (ör. derecelendirme ifade eden zarflar, sınırlamaları ifade eden yan cümleler) kabul edilebilir bir doğrulukla kullanarak daha ince anlam ayrımlarını tam olarak iletebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C2", "Tanımlayıcı": "Vurgu yapabilir, ayırt edebilir ve belirsizliği ortadan kaldırabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Görüşleri ve açıklamaları emin olma/olmama, inanç/şüphe, olabilirlik vb. derecelerle tam olarak nitelendirebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "C1", "Tanımlayıcı": "Bir iddianın, bir savın veya bir pozisyonun gücünü belirtmek için dilsel iletişim kanalını etkili bir şekilde kullanabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Ayrıntılı bilgileri güvenilir bir şekilde aktarabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B2", "Tanımlayıcı": "Dilleri ifade gücü ve deyimsellikten yoksun olsa bile daha zorlu durumlarda bile ana fikirleri aktarabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1+", "Tanımlayıcı": "Bir fikir veya problemdeki ana noktaları kabul edilebilir bir kesinlikle açıklayabilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1", "Tanımlayıcı": "En yakın öncelikte olan noktayı aktararak basit, karmaşık olmayan bilgileri hemen iletebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "B1", "Tanımlayıcı": "Anlatmak istediği ana fikri anlaşılır bir şekilde ifade edebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A2", "Tanımlayıcı": "Aşina ve rutin meselelerde basit ve doğrudan doğruya sınırlı bilgi alışverişinde söylemek istediklerini iletebilir ancak diğer durumlarda genellikle mesajdan ödün vermek durumunda kalır."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A1", "Tanımlayıcı": "Kişisel ayrıntılar ve somut türden ihtiyaçlar hakkında temel bilgileri basit bir şekilde iletebilir."}, {"Temel Beceri": "Konuşma, Yazma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Kişisel ayrıntılarla ilgili çok temel bilgileri basit bir şekilde iletebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "C2", "Tanımlayıcı": "Doğal, zahmetsiz, tereddütsüz bir akışla kendini uzun uzadıya ifade edebilir. Yalnızca düşüncelerini ifade etmenin tam olarak doğru yolu üzerinde düşünmek veya uygun bir örnek veya açıklama bulmak için duraklar."}, {"Temel Beceri": "Konuşma", "Seviye": "C1", "Tanımlayıcı": "Kendini akıcı ve spontane, neredeyse hiç çaba harcamadan ifade edebilir. Yalnızca kavramsal olarak zor bir konu, doğal, pürüzsüz bir dil akışını engelleyebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2+", "Tanımlayıcı": "Genellikle daha da uzun karmaşık dil kullanımında dikkate değer bir akıcılık ve ifade kolaylığı göstererek spontane bir biçimde iletişim kurabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Oldukça dengeli bir tempoda, farklı uzunluklarda dil kullanımı üretebilir fakat kalıplar ve ifadeler ararken tereddüt yaşasa bile az sayıda fark edilir derecede uzun duraksama vardır."}, {"Temel Beceri": "Konuşma", "Seviye": "B2", "Tanımlayıcı": "Her iki tarafı da zorlamadan hedef dilin kullanıcıları ile düzenli etkileşim kurulmasını oldukça mümkün kılan bir akıcılık ve doğallık ile etkileşimde bulunabilir"}, {"Temel Beceri": "Konuşma", "Seviye": "B1+", "Tanımlayıcı": "Kendini nispeten kolaylıkla ifade edebilir. Duraklara ve “çıkmazlara” [sonu bir yere varmayan cümleler] neden olan ifade etme ile ilgili bazı sorunlara rağmen yardım almadan etkili bir şekilde devam edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "B1", "Tanımlayıcı": "Dil bilgisi ve sözcüksel planlama ve onarma için duraklaması özellikle nispeten uzun serbest dil üretimlerinde çok belirgin olmasına rağmen anlaşılır bir şekilde devam edebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2+", "Tanımlayıcı": "Duraklamalar, yanlış başlangıçlar ve yeniden düzenlemeler çok belirgin olsa da kısa katkılarla kendini anlatabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A2", "Tanımlayıcı": "Çok belirgin tereddütlere ve yanlış başlangıçlara rağmen kısa konuşmaları idare etmek için yeterli kolaylıkla aşina olduğu konularda öbekler kurabilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1", "Tanımlayıcı": "İfadeleri aramak, daha az aşina olduğu sözcükleri/ işaretleri sesletmek ve iletişimi onarmak için çok duraklayarak oldukça kısa, birbirinden kopuk, çoğunlukla hazır ifadeleri yönetebilir."}, {"Temel Beceri": "Konuşma", "Seviye": "A1 Öncesi", "Tanımlayıcı": "Gerektiğinde jest ve işaretle yardım ricalarını kullanarak çok kısa, birbirinden kopuk, prova edilmiş ifadeleri yönetebilir."}, {"Temel Beceri": "0", "Seviye": "C2", "Tanımlayıcı": "Yanlış anlamaları ve kültürel anlaşmazlıkları engellemek ve/veya onarmak amacıyla denge sağlayarak ve kültürel farklılıklara yönelik farkındalık göstererek, bağlama göre hareketlerini ve ifade yapılarını başlatabilir ve kontrol edebilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Toplumdilbilimsel/toplum-edimsel geleneklerdeki farklılıkları tanıyabilir, bunlar üzerinde eleştirel olarak derin düşünebilir ve buna göre iletişimini ayarlayabilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Kültürlerarası karşılaşma, okuma, film vb. yararlanarak kültürel değerlerin ve uygulamaların arka planını hassas bir şekilde açıklayabilir ve bunların boyutlarını yorumlayıp tartışabilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Kültürlerarası iletişimde belirsizliklerle başa çıkabilir ve açıklık getirmek için düşüncesini yapıcı ve kültürel olarak uygun bir şekilde ifade edebilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Kendi toplumunun ve aşina olduğu diğer toplumların kültürel varsayımları, yerleşmiş fikirleri, basmakalıp inanışları ve önyargıları hakkındaki yorumlarını açıklayabilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Yargıların ve önyargıların sıklıkla temellendiği örtük değerlere farkındalık göstererek kendisinin ve diğer sosyal grupların bakış açıları ve uygulamalarını tanımlayabilir ve değerlendirebilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Kendi toplumunun ve aşina olduğu diğer toplumların kültürel varsayımları, yerleşmiş fikirleri, basmakalıp inanışları ve önyargıları hakkındaki yorumlarını açıklayabilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Kendi toplumu ve diğer toplumlarla ilgili iletişim araçlarında yer alan bilgi ve görüşlerin tarafsızlığını ve dengesini tartışabilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Kültürel olarak belirlenmiş davranış kalıplarındaki (ör. mimikler ve ses tonu veya işaret dilleri için işaret boyutu) benzerlik ve farklılıkları belirleyip bunların üzerine derin düşünebilir ve karşılıklı anlayışı müzakere etmek amacıyla bunların önemini tartışabilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Kültürlerarası bir temasta birinin belirli bir durumda mutlak kabul ettiği bir şeyin başkaları tarafından aslında kabul görmediğini fark edebilir ve tepki verip kendini uygun bir şekilde ifade edebilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Söz konusu kültürdeki kültürel ipuçlarını genellikle uygun bir şekilde yorumlayabilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Kendi kültürü ve diğer kültürlerdeki belirli iletişim yolları ve bunların ortaya çıkarabileceği yanlış anlaşılma riskleri üzerine derin düşünebilir ve bunları açıklayabilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Duruş, göz teması ve diğerleriyle arasındaki mesafe ile ilgili genellikle geleneklere göre hareket edebilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "En yaygın kullanılan kültürel ipuçlarına göre genellikle uygun karşılığı verebilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Kendi kültürünün özelliklerini başka kültürdeki kişilere veya diğer kültürün özelliklerini kendi kültüründeki kişilere açıklayabilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Değerlerinin ve davranışlarının kendinin diğer insanların değer ve davranışları hakkındaki görüşlerini nasıl etkilediğini basitçe açıklayabilir"}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Başka bir toplumsal kültürel bağlamda kendine “garip” görünen şeylerin diğer ilgili bağlamdaki insanlar için nasıl gayet “normal” olabileceğini basit şekilde tartışabilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Kendi kültürel olarak belirlenmiş eylemlerinin diğer kültürlerden insanlar tarafından nasıl farklı algılanabileceğini basitçe tartışabilir"}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Günlük sosyal temaslarla (ör. farklı selamlaşmalar, âdetler) ilişkili temel kültürel gelenekleri tanıyabilir ve uygulayabilir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Her ne kadar rutinden sapma ile baş etmek konusunda zorluk yaşasa da günlük selamlaşma, vedalaşma, teşekkür ve özür ifadelerinde uygun şekilde davranabilir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Günlük işlemsel bir etkileşimdeki davranışının kastettiğinden farklı bir mesaj verebileceğini fark edebilir ve bunu basitçe açıklamaya çalışabilir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Diğer kültürlere mensup kişilerle iletişimde güçlük yaşadığında nasıl davranacağından emin olmasa bile böyle durumlar yaşanabileceğini fark edebilir."}, {"Temel Beceri": "0", "Seviye": "A1", "Tanımlayıcı": "Somut türden basit günlük işlemlerde bile zorluk yaşasa da numaralandırmanın, mesafe ölçümünün, saati söylemenin vb. ayrı yolları olduğunu fark edebilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Kavramayı desteklemek amacıyla, çoğul dilli birikimlerinde bulunan dillerdeki zıt metin türü gelenekleri ve metin kalıpları hakkındaki bilgisini kullanabilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Bir başka dildeki metnin konu ve ana mesajını anlamak için (ör. farklı dillerde aynı temayla ilgili kısa gazete makalelerini okurken) farklı bir dilde anladığını kullanabilir"}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Farklı dillerde kavramayı geliştirmek için, metinlerin paralel çevirilerini (ör. dergi makaleleri, hikâyeler, romanlardan bölümler) kullanabilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Farklı dillerde aynı temadaki metinlerden (ör. kısa haberler, müze broşürleri, çevrim içi eleştiriler) anladıklarından yararlanarak bir metnin mesajını ortaya çıkarabilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Farklı dillerde alanıyla ilgili belgelerden bilgi alabilir (ör. bir sunuma eklemek için)."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Aynı kelime/işaret ve yanıltıcı eş asıllıların benzer kullanımlarını birbirinden ayırt etmek amacıyla, kavramların farklı dillerde ifade ediliş şekilleri arasındaki benzerlik ve farklılıkları tanıyabilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Kavramayı desteklemek amacıyla çoğul dilli birikimlerindeki diller inzıt/çelişen dil bilgisel yapılar ve işlevsel ifadeler üzerine olan bilgisini kullanabilir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Kısa ve açık bir şekilde sesletilenduyuruları, farklı dillerde mevcut biçimlerinden anladıklarını bir araya getirerek anlayabilir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Kısa ve belirgin bir şekilde ifade edilen mesaj ve yönergeleri farklı dillerdeki biçimlerinden anladıklarını birleştirerek anlayabilir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "İlgili bilgiyi bulmak için farklı dillerde bir arada verilen basit uyarı, yönerge ve ürün bilgilerini kullanabilir."}, {"Temel Beceri": "0", "Seviye": "A1", "Tanımlayıcı": "Uluslararasılaşmış ödünç sözcükleri ve farklı dillerde ortak olan kelimeleri/işaretleri (ör. haus/hus/house [3 dilde “ev” kelimesi örnek olarak verilmiştir]) aşağıdaki etkinlikler için tanıyabilir: - Basit işaret ve duyuruların anlamını çıkarma, - Basit ve kısa bir metnin olası mesajını belirleme, - Katıldığı yavaş ve belirgin bir şekilde gerçekleşen kısa ve basit sosyal sohbetleri ana hatlarıyla takip etme, - Çok yavaş ve belirgin bir biçimde sesletilmesi ve gerekirse tekrarlanması koşuluyla insanların doğrudan doğruya kendisine ne söylemeye çalıştıklarını çıkarsama."}, {"Temel Beceri": "0", "Seviye": "C2", "Tanımlayıcı": "Çoğul dilli birikimindeki diller arasında esnek bir şekilde geçiş yaparak ve gerektiğinde yapılan farklı katkıları açıklayarak çok dilli bağlamlarda soyut ve uzmanlık gerektiren konular hakkında iletişimde bulunabilir."}, {"Temel Beceri": "0", "Seviye": "C2", "Tanımlayıcı": "Retorik etki veya eğlence için çoğul dilli birikimindeki dillerdeki metaforlar ve diğer söz sanatları arasındaki benzerlikleri ve farklılıkları keşfedebilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Tartışmaya yapılan katkıları ve gönderimde bulunulan metinleri çoğul dilli birikimindeki farklı dillerde özetleyerek ve açıklayarak çok dilli bir bağlamda iletişimi kolaylaştırmak için esnek bir şekilde diller arasında geçiş yapabilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Dil değişikliklerine uyum sağlayarak ve muhatapların ihtiyaçlarını ve dil becerilerini karşılayarak çoğul dilli birikimindeki iki veya daha fazla dilde karşılıklı konuşmaya etkin bir şekilde katılabilir. "}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Soyut ve uzmanlık gerektiren konuların tartışılmasında anlamayı geliştirmek için çoğul dilli birikimindeki başka bir dilden muhataba/muhataplara daha aşina olduğu uzmanlık gerektiren terminolojiyi açıklayabilir."}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Başkası kendisinin çoğul dilli birikimindeki başka bir dile geçtiğinde spontane ve esnek bir biçimde uygun bir dilde yanıt verebilir. "}, {"Temel Beceri": "0", "Seviye": "C1", "Tanımlayıcı": "Bir dildeki sözlü, işaretlenen veya yazılı bir metni çoğul dilli birikimindeki başka bir dilde açıklayarak, özetleyerek, belirginleştirerek ve genişleterek, o metnin kavranmasını ve tartışılmasını destekleyebilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "İletişimin verimliliğini artırmak amacıyla belirli bir durumda çoğul dilli birikimindeki farklı dillerden esnek bir şekilde yararlanmanın ne derece uygun olduğunu fark edebilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Ortak bir dil bilmeyen üçüncü kişilerle veya o kişilerin birbirleriyle arasındaki kavramaya yardımcı olmak amacıyla çoğul dilli birikimindeki diller arasında etkili bir şekilde geçiş yapabilir. "}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Özellikle tartışılan durum/kavram için uygun olan çoğul dilli birikimindeki başka bir dilden bir ifadeyi/ anlatımı, gerektiğinde muhatabı için açıklayarak başka bir ifadenin içine yerleştirebilir. "}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Uzmanlık gerektiren bilgiyi ve ilgi alandaki bir konuyla ilgili meseleleri farklı muhataplara aktarmak amacıyla çoğul dilli birikimindeki diller arasında geçiş yapabilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "İş birliğine dayalı iletişim sırasında bir görevin doğasını, temel basamaklarını, alınacak kararları ve beklenen sonuçları belirginleştirmek amacıyla çoğul dilli birikimindeki farklı dillerden yararlanabilir."}, {"Temel Beceri": "0", "Seviye": "B2", "Tanımlayıcı": "Diğer insanların kendilerini rahat hissettikleri bir dili kullanmaları için cesaretlendirmek amacıyla çoğul dilli birikimindeki farklı dillerden yararlanabilir."}, {"Temel Beceri": "0", "Seviye": "B1", "Tanımlayıcı": "Beklenmedik bir durumla başa çıkmak amacıyla, günlük bağlamları içeren çoğul dilli birikimindeki farklı dillerdeki sınırlı birikiminden yaratıcı bir şekilde yararlanabilir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Bir sorunu açıklamak veya yardım veya açıklama istemek amacıyla farklı dillerdeki sınırlı birikimini harekete geçirebilir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Basit ve pratik bir işlemi veya bilgi alışverişini yürütmek için çoğul dilli birikimindeki farklı dillerden basit kelimeler/işaretler ve öbekler kullanabilir."}, {"Temel Beceri": "0", "Seviye": "A2", "Tanımlayıcı": "Kullanılan dilde yeterli ifadeyi bulamadığı zaman sıradan günlük bir durumda kendini ifade edebilmek için çoğul dilli birikimindeki başka bir dilden basit bir kelime/işaret kullanabilir."}, {"Temel Beceri": "0", "Seviye": "A1", "Tanımlayıcı": "İş birlikçi bir muhatapla çok basit, somut ve günlük bir işlemi yürütmek için farklı dillerde oldukça sınırlı bir birikim kullanabilir."}];
    const uniqueSkills = ["0", "Aracılık", "Dinleme", "Dinleme, Görsel", "Konuşma", "Konuşma, Yazma", "Okuma", "Okuma, Dinleme", "Ses Bilimsel", "Yazma"];

    // State
    let currentLevel = 'all';
    let activeSkills = new Set(uniqueSkills);
    let searchTerm = '';

    // DOM Elements
    const grid = document.getElementById('cardsGrid');
    const stats = document.getElementById('stats');
    const searchInput = document.getElementById('searchInput');
    const skillFiltersContainer = document.getElementById('skillFilters');

    // Beceri Filtrelerini Oluştur
    uniqueSkills.forEach(skill => {
        const label = document.createElement('label');
        label.className = 'skill-item';
        label.innerHTML = `<input type="checkbox" checked value="${skill}"> ${skill}`;
        skillFiltersContainer.appendChild(label);
    });

    // Seviye butonlarına class ekleme helper
    function getLevelClass(level) {
        return 'level-' + level.toLowerCase().replace('+', '-plus').replace(' ', '-');
    }

    function getBadgeColor(level) {
        const colors = {
            'A1 Öncesi': '#94a3b8', 'A1': '#10b981', 'A1+': '#10b981',
            'A2': '#059669', 'A2+': '#059669', 'B1': '#3b82f6', 'B1+': '#3b82f6',
            'B2': '#2563eb', 'B2+': '#2563eb', 'C1': '#7c3aed', 'C2': '#5b21b6'
        };
        return colors[level] || '#64748b';
    }

    function renderCards() {
        const filteredData = rawData.filter(item => {
            const matchLevel = currentLevel === 'all' || item['Seviye'] === currentLevel;
            const matchSkill = activeSkills.has(item['Temel Beceri']);
            const matchSearch = searchTerm === '' || 
                                item['Tanımlayıcı'].toLowerCase().includes(searchTerm) ||
                                item['Temel Beceri'].toLowerCase().includes(searchTerm);
            return matchLevel && matchSkill && matchSearch;
        });

        stats.textContent = `Toplam ${filteredData.length} sonuç gösteriliyor.`;

        if (filteredData.length === 0) {
            grid.innerHTML = '<div class="no-results">Aradığınız kriterlere uygun sonuç bulunamadı.</div>';
            return;
        }

        // Performans için DocumentFragment kullanıyoruz
        const fragment = document.createDocumentFragment();
        
        filteredData.forEach(item => {
            const card = document.createElement('div');
            card.className = `card ${getLevelClass(item['Seviye'])}`;
            card.innerHTML = `
                <div class="card-header">
                    <span class="card-skill">${item['Temel Beceri']}</span>
                    <span class="badge" style="background-color: ${getBadgeColor(item['Seviye'])}">${item['Seviye']}</span>
                </div>
                <div class="card-text">${item['Tanımlayıcı']}</div>
            `;
            fragment.appendChild(card);
        });

        grid.innerHTML = '';
        grid.appendChild(fragment);
    }

    // Event Listeners
    document.getElementById('levelFilters').addEventListener('click', (e) => {
        if (e.target.classList.contains('level-btn')) {
            document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            currentLevel = e.target.dataset.level;
            renderCards();
        }
    });

    skillFiltersContainer.addEventListener('change', (e) => {
        if (e.target.type === 'checkbox') {
            if (e.target.checked) {
                activeSkills.add(e.target.value);
            } else {
                activeSkills.delete(e.target.value);
            }
            renderCards();
        }
    });

    let debounceTimer;
    searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            searchTerm = e.target.value.toLowerCase().trim();
            renderCards();
        }, 300); // Arama yaparken kasılmayı önlemek için debounce
    });

    // İlk Yükleme
    renderCards();
</script>

</body>
</html>
